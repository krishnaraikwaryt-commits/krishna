<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-24">

    <div id="login" class="fixed inset-0 z-[5000] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-4">NEXUS CRM</h2>
            <input type="password" id="pin" maxlength="4" placeholder="ENTER PIN" oninput="if(this.value==='1321') startApp()" class="w-full p-4 bg-slate-100 rounded-xl text-center text-2xl font-bold outline-none">
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="p-6 flex justify-between items-center bg-white border-b sticky top-0 z-40">
            <h1 id="title" class="text-xl font-black text-indigo-600">DASHBOARD</h1>
            <button onclick="syncData()" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-lg"><i id="sync-icon" class="fas fa-sync"></i></button>
        </header>

        <main class="p-6 space-y-6">
            <div id="dash-view" class="space-y-6">
                <div class="grid grid-cols-2 gap-4 text-white">
                    <div class="bg-indigo-600 p-5 rounded-3xl">
                        <p class="text-[10px] font-bold opacity-70">REVENUE</p>
                        <h3 id="stat-rev" class="text-xl font-black">₹0</h3>
                    </div>
                    <div class="bg-emerald-600 p-5 rounded-3xl">
                        <p class="text-[10px] font-bold opacity-70">TOTAL LEADS</p>
                        <h3 id="stat-total" class="text-xl font-black">0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="filterView('today')" class="bg-white border-l-4 border-orange-500 p-5 rounded-2xl shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400">TODAY'S TASK</p>
                        <h3 id="stat-today" class="text-2xl font-black text-orange-600">0</h3>
                    </div>
                    <div onclick="filterView('overdue')" class="bg-white border-l-4 border-red-500 p-5 rounded-2xl shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400">OVERDUE</p>
                        <h3 id="stat-over" class="text-2xl font-black text-red-600">0</h3>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl border flex gap-2 justify-center">
                    <button onclick="exportCSV()" class="text-[10px] font-bold bg-slate-100 p-3 rounded-lg">EXPORT CSV</button>
                    <label class="text-[10px] font-bold bg-slate-100 p-3 rounded-lg cursor-pointer">IMPORT CSV <input type="file" hidden onchange="importCSV(this)"></label>
                </div>
            </div>

            <div id="list-view" class="hidden space-y-3"></div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-6">
            <button onclick="showDash()" class="text-slate-400"><i class="fas fa-home text-xl"></i></button>
            <button onclick="UI.openModal()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl -mt-10 shadow-lg"><i class="fas fa-plus"></i></button>
            <button onclick="filterView('all')" class="text-slate-400"><i class="fas fa-list text-xl"></i></button>
        </nav>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-[6000] p-6 flex items-center justify-center">
        <div class="bg-white w-full rounded-3xl p-6">
            <form onsubmit="saveLead(event)" class="space-y-4">
                <input type="hidden" id="f-id">
                <input type="text" id="f-name" placeholder="Name" class="w-full p-4 bg-slate-100 rounded-xl" required>
                <input type="tel" id="f-phone" placeholder="Phone" class="w-full p-4 bg-slate-100 rounded-xl" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="p-4 bg-slate-100 rounded-xl"><option value="Prospect">Prospect</option><option value="Closed Won">Closed Won</option></select>
                    <input type="number" id="f-value" placeholder="Value" class="p-4 bg-slate-100 rounded-xl">
                </div>
                <input type="date" id="f-date" class="w-full p-4 bg-slate-100 rounded-xl">
                <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">SAVE</button>
                <button type="button" onclick="UI.closeModal()" class="w-full text-slate-400 text-xs">CANCEL</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let masterData = [];

        function startApp() {
            document.getElementById('login').remove();
            document.getElementById('app').classList.remove('hidden');
            syncData();
        }

        async function syncData() {
            document.getElementById('sync-icon').classList.add('fa-spin');
            const res = await fetch(API);
            masterData = await res.json();
            renderStats();
            showDash();
            document.getElementById('sync-icon').classList.remove('fa-spin');
        }

        function renderStats() {
            const today = new Date().toISOString().split('T')[0];
            const rev = masterData.filter(l => l.status === 'Closed Won').reduce((a, b) => a + Number(b.value || 0), 0);
            document.getElementById('stat-rev').innerText = "₹" + rev.toLocaleString();
            document.getElementById('stat-total').innerText = masterData.length;
            document.getElementById('stat-today').innerText = masterData.filter(l => l.followup === today).length;
            document.getElementById('stat-over').innerText = masterData.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won').length;
        }

        function showDash() {
            document.getElementById('dash-view').classList.remove('hidden');
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('title').innerText = "DASHBOARD";
        }

        function filterView(type) {
            document.getElementById('dash-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            let list = masterData;
            if(type === 'today') list = masterData.filter(l => l.followup === today);
            if(type === 'overdue') list = masterData.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won');
            
            document.getElementById('title').innerText = type.toUpperCase();
            renderCards(list);
        }

        function renderCards(data) {
            document.getElementById('list-view').innerHTML = data.map(l => `
                <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border">
                    <div onclick="UI.openModal('${l.id}')">
                        <h4 class="font-bold">${l.name}</h4>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">${l.status} • ₹${l.value || 0}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${l.phone}" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center"><i class="fas fa-phone"></i></a>
                        <a href="https://wa.me/91${l.phone}" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('');
        }

        async function saveLead(e) {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const data = { id: id || Date.now().toString(), name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, status: document.getElementById('f-status').value, value: document.getElementById('f-value').value, followup: document.getElementById('f-date').value };
            UI.closeModal();
            await fetch(id ? `${API}/id/${id}` : API, { method: id ? 'PATCH' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? data : [data]}) });
            syncData();
        }

        const UI = {
            openModal: (id = null) => {
                document.getElementById('modal').classList.remove('hidden');
                if(id) {
                    const l = masterData.find(x => x.id == id);
                    document.getElementById('f-id').value = l.id;
                    document.getElementById('f-name').value = l.name;
                    document.getElementById('f-phone').value = l.phone;
                    document.getElementById('f-status').value = l.status;
                    document.getElementById('f-value').value = l.value;
                    document.getElementById('f-date').value = l.followup;
                } else { document.querySelector('form').reset(); document.getElementById('f-id').value = ''; }
            },
            closeModal: () => document.getElementById('modal').classList.add('hidden')
        };

        function exportCSV() {
            const rows = masterData.map(l => `${l.id},${l.name},${l.phone},${l.status},${l.value},${l.followup}`).join("\n");
            const blob = new Blob(["id,name,phone,status,value,followup\n" + rows], {type: 'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "nexus.csv"; a.click();
        }

        function importCSV(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const data = e.target.result.split("\n").slice(1).map(row => {
                    const v = row.split(",");
                    return { id: v[0], name: v[1], phone: v[2], status: v[3], value: v[4], followup: v[5] };
                });
                await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data}) });
                syncData();
            };
            r.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
