<!DOCTYPE html>
<html>
<head>
    <title>KRISHNA CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-5 text-center text-blue-600">KRISHNA CRM</h2>
        <div class="space-y-4">
            <input type="text" id="n" placeholder="Name" class="w-full p-3 border rounded">
            <input type="text" id="p" placeholder="Phone" class="w-full p-3 border rounded">
            <input type="text" id="s" placeholder="Service" class="w-full p-3 border rounded">
            <button onclick="save()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">SAVE NOW</button>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-10">
        <div id="display" class="space-y-2"></div>
    </div>

    <script>
        function show() {
            const data = JSON.parse(localStorage.getItem('leads') || '[]');
            const div = document.getElementById('display');
            div.innerHTML = '';
            data.reverse().forEach(item => {
                div.innerHTML += `
                    <div class="bg-white p-4 rounded shadow mb-2 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${item.name}</p>
                            <p class="text-sm text-gray-500">${item.service}</p>
                        </div>
                        <a href="https://wa.me/${item.phone}" target="_blank" class="text-green-500 font-bold">WA</a>
                    </div>`;
            });
        }

        function save() {
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const service = document.getElementById('s').value;

            if(!name || !phone) return alert("Fill Name and Phone");

            const data = JSON.parse(localStorage.getItem('leads') || '[]');
            data.push({name, phone, service});
            localStorage.setItem('leads', JSON.stringify(data));
            
            document.getElementById('n').value = '';
            document.getElementById('p').value = '';
            document.getElementById('s').value = '';
            
            show();
            alert("Saved!");
        }

        window.onload = show;
    </script>
</body>
</html>
