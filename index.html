<script>
    // 1. ADDED: Enhanced Brand Config with Dynamic Greeting
    const BrandConfig = {
        name: "Nexus", 
        accent: "CRM",
        logo: "https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss",
        getGreeting: () => {
            const hr = new Date().getHours();
            if (hr < 12) return "Good Morning";
            if (hr < 17) return "Good Afternoon";
            return "Good Evening";
        }
    };
</script>

<header class="flex justify-between items-center mb-8">
    <div>
        <h2 id="view-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">
            <span class="text-indigo-600" id="dynamic-greet">Hello</span>, Krishna
        </h2>
        <div class="flex items-center gap-2 mt-1">
            <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <p class="text-slate-400 text-sm font-bold" id="live-timer"></p>
        </div>
    </div>
    <div class="hidden md:flex gap-3">
        <div class="glass-panel px-6 py-3 rounded-2xl flex flex-col items-end justify-center">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Database</span>
            <span id="header-lead-count" class="text-lg font-bold text-indigo-600">0 Leads</span>
        </div>
        <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center hover:bg-slate-50"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
        <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-xl shadow-indigo-200 active:scale-95 transition-all">+ Add Intel</button>
    </div>
</header>

<script>
    // 2. UPDATED: Card Template with Delete Action
    UI.cardTemplate = (l) => {
        const isClosed = l.status === 'Closed Won';
        return `
        <div class="glass-panel p-5 rounded-[2rem] lead-card flex justify-between items-center animate-in fade-in slide-in-from-bottom-2 duration-500">
            <div class="flex items-center gap-4">
                <button onclick="System.toggleStatus('${l.id}', '${l.status}')" class="w-8 h-8 rounded-2xl border-2 border-indigo-100 flex items-center justify-center transition-all ${isClosed ? 'bg-indigo-600 border-indigo-600' : 'bg-white shadow-sm'}">
                    ${isClosed ? '<i class="fas fa-check text-xs text-white"></i>' : ''}
                </button>
                <div onclick="UI.modal('open', '${l.id}')" class="cursor-pointer ${isClosed ? 'opacity-40' : ''}">
                    <h5 class="font-bold text-slate-800 text-sm leading-tight">${l.name}</h5>
                    <p class="text-[10px] font-black ${l.followUpDate < System.Today && !l.status.includes('Closed') ? 'text-red-500' : 'text-slate-400'} uppercase mt-1">
                        ${l.status} • ${l.followUpDate || 'No Date'} • ₹${Number(l.value).toLocaleString()}
                    </p>
                </div>
            </div>
            <div class="flex gap-2">
                 <button onclick="System.delete('${l.id}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform"><i class="fas fa-trash-alt text-xs"></i></button>
                 <a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" class="w-10 h-10 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform"><i class="fab fa-whatsapp"></i></a>
                 <a href="tel:${l.phone}" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform"><i class="fas fa-phone-alt"></i></a>
            </div>
        </div>`;
    };

    // 3. UPDATED: Render function to include Dynamic elements
    const originalRender = UI.renderAll;
    UI.renderAll = () => {
        originalRender(); // Run original logic
        
        // Add new dynamic updates
        document.getElementById('dynamic-greet').innerText = BrandConfig.getGreeting();
        document.getElementById('header-lead-count').innerText = `${System.Data.length} Leads`;
    };
</script>
