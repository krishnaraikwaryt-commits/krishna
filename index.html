<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM | Pro Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --brand-primary: #6366f1; --brand-dark: #0f172a; --surface-100: #f8fafc; --sidebar-bg: #ffffff;
            --bg-image: none;
        }

        /* Themes */
        body.theme-midnight { --brand-primary: #38bdf8; --brand-dark: #f8fafc; --surface-100: #0f172a; --sidebar-bg: #1e293b; }
        body.theme-forest { --brand-primary: #10b981; --brand-dark: #064e3b; --surface-100: #f0fdf4; --sidebar-bg: #ffffff; }
        body.theme-sunset { --brand-primary: #f43f5e; --brand-dark: #4c0519; --surface-100: #fff1f2; --sidebar-bg: #ffffff; }
        body.theme-electric { --brand-primary: #8b5cf6; --brand-dark: #ffffff; --surface-100: #1e1b4b; --sidebar-bg: #312e81; }
        body.theme-mono { --brand-primary: #000000; --brand-dark: #000000; --surface-100: #ffffff; --sidebar-bg: #f1f5f9; }
        body.theme-sakura { --brand-primary: #ec4899; --brand-dark: #831843; --surface-100: #fdf2f8; --sidebar-bg: #ffffff; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--surface-100); 
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--brand-dark); 
            transition: all 0.3s ease; 
            min-height: 100vh; 
        }

        aside { background-color: var(--sidebar-bg) !important; border-color: rgba(0,0,0,0.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        
        body.theme-midnight .glass-panel, body.theme-electric .glass-panel { background: rgba(15, 23, 42, 0.7); border-color: rgba(255,255,255,0.1); color: #f8fafc; }
        body.theme-midnight h2, body.theme-electric h2 { color: #fff; }

        .active-link { color: var(--brand-primary) !important; background: rgba(99, 102, 241, 0.1); border-right: 4px solid var(--brand-primary); }
        .lead-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .lead-card:hover { transform: translateY(-2px); border-color: var(--brand-primary); }
        .stat-card { cursor: pointer; transition: all 0.3s ease; }
        .stat-card:hover { transform: scale(1.05); }
        .alert-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .hidden { display: none !important; }
        .theme-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.2); }
        .wallpaper-dot { width: 30px; height: 20px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; background-size: cover; }
    </style>
</head>
<body class="overflow-x-hidden" onload="System.checkAuth()">

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[2.5rem] p-10 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-indigo-600 text-white text-3xl mb-6"><i class="fas fa-shield-halved"></i></div>
            <h1 class="text-3xl font-black text-slate-900">Nexus<span class="text-indigo-600">CRM</span></h1>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="PIN" class="w-full mt-8 p-5 rounded-2xl bg-slate-100 border-none text-center text-2xl font-bold tracking-[0.5em]">
        </div>
    </div>

    <div id="app-shell" class="hidden flex flex-col md:flex-row">
        <aside class="w-full md:w-64 border-r p-6 flex-shrink-0 flex flex-col min-h-screen relative z-10">
            <div class="flex items-center gap-3 mb-10 px-2 font-black text-xl"><i class="fas fa-cube text-indigo-600"></i> Nexus</div>
            <nav class="flex md:flex-col gap-2">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold active-link"><i class="fas fa-th-large"></i> Dashboard</button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold"><i class="fas fa-list"></i> Pipeline</button>
                <button onclick="UI.navigate('clients')" id="btn-clients" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold"><i class="fas fa-user-tie"></i> Clients</button>
            </nav>

            <div class="mt-8 px-2">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Themes</p>
                <div class="grid grid-cols-4 gap-2 mb-4">
                    <div onclick="System.setTheme('default')" class="theme-dot bg-indigo-600" title="Default"></div>
                    <div onclick="System.setTheme('midnight')" class="theme-dot bg-slate-900" title="Midnight"></div>
                    <div onclick="System.setTheme('forest')" class="theme-dot bg-emerald-600" title="Forest"></div>
                    <div onclick="System.setTheme('sunset')" class="theme-dot bg-rose-500" title="Sunset"></div>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Wallpapers</p>
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="System.setWP('none')" class="wallpaper-dot bg-slate-200" title="None"></div>
                    <div onclick="System.setWP('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800')" class="wallpaper-dot" style="background-image:url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=100')"></div>
                    <div onclick="System.setWP('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&w=800')" class="wallpaper-dot" style="background-image:url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&w=100')"></div>
                    <div onclick="System.setWP('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=800')" class="wallpaper-dot" style="background-image:url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=100')"></div>
                    <div onclick="System.setWP('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=800')" class="wallpaper-dot" style="background-image:url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=100')"></div>
                    <div onclick="System.setWP('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=800')" class="wallpaper-dot" style="background-image:url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=100')"></div>
                </div>
            </div>

            <div class="mt-8 px-2">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Actions</p>
                <button onclick="UI.exportCSV()" class="w-full text-left p-2 text-sm font-bold text-slate-500 hover:text-indigo-600"><i class="fas fa-download mr-2"></i> Export Data</button>
                <label class="w-full block p-2 text-sm font-bold text-slate-500 hover:text-indigo-600 cursor-pointer">
                    <i class="fas fa-upload mr-2"></i> Import CSV
                    <input type="file" id="csv-import" class="hidden" accept=".csv" onchange="UI.importCSV(event)">
                </label>
            </div>

            <button onclick="System.logout()" class="mt-auto flex items-center gap-3 p-4 rounded-xl font-bold text-red-400"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full relative z-10">
            <header class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="view-title" class="text-4xl font-black tracking-tight">Intelligence</h2>
                    <p class="text-slate-500 font-medium mt-1" id="live-timer"></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
                    <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg">+ Add Lead</button>
                </div>
            </header>

            <section id="view-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <div onclick="UI.filterBy('revenue')" class="stat-card glass-panel p-6 rounded-3xl border-indigo-100"><p class="text-[10px] font-black text-indigo-500 uppercase">Revenue</p><h3 id="meta-revenue" class="text-2xl font-black mt-1">₹0</h3></div>
                    <div onclick="UI.filterBy('overdue')" class="stat-card glass-panel p-6 rounded-3xl border-red-100"><p class="text-[10px] font-black text-red-500 uppercase">Overdue</p><h3 id="meta-overdue" class="text-2xl font-black mt-1">0</h3></div>
                    <div onclick="UI.filterBy('today')" class="stat-card glass-panel p-6 rounded-3xl border-emerald-100"><p class="text-[10px] font-black text-emerald-500 uppercase">Today</p><h3 id="meta-today" class="text-2xl font-black mt-1">0</h3></div>
                    <div onclick="UI.navigate('clients')" class="stat-card glass-panel p-6 rounded-3xl border-amber-100"><p class="text-[10px] font-black text-amber-500 uppercase">Closed</p><h3 id="meta-closed" class="text-2xl font-black mt-1">0</h3></div>
                    <div onclick="UI.filterBy('all')" class="stat-card glass-panel p-6 rounded-3xl bg-indigo-600 text-white shadow-xl"><p class="text-[10px] font-black opacity-70 uppercase">Total</p><h3 id="meta-total" class="text-2xl font-black mt-1">0</h3></div>
                </div>
                <div id="alert-container" class="space-y-3"></div>
                <div>
                    <h4 class="text-lg font-black mb-4 flex items-center gap-2"><i class="fas fa-calendar-day text-indigo-500"></i> Today's Schedule</h4>
                    <div id="today-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <div class="flex gap-2">
                    <input type="text" id="lead-search" oninput="UI.search('full-pipeline')" placeholder="Search pipeline..." class="flex-1 p-5 rounded-3xl glass-panel outline-none">
                    <button onclick="UI.renderAll()" class="px-6 rounded-3xl bg-slate-100 text-slate-500 font-bold">Reset</button>
                </div>
                <div id="full-pipeline" class="space-y-3"></div>
            </section>

            <section id="view-clients" class="hidden space-y-6">
                <div class="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-black text-indigo-900">Active Clients</h3>
                        <p class="text-indigo-600 text-sm font-medium">Successful Conversions</p>
                    </div>
                    <i class="fas fa-crown text-3xl text-indigo-200"></i>
                </div>
                <input type="text" id="client-search" oninput="UI.search('client-list')" placeholder="Search clients..." class="w-full p-5 rounded-3xl glass-panel outline-none">
                <div id="client-list" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-slate-800">Lead Intel</h2>
            <form id="core-form" class="space-y-4">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="entry-name" placeholder="Name" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <input type="tel" id="entry-phone" placeholder="Phone" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                        <option value="Prospect">Prospect</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Closed Won">Closed Won</option>
                        <option value="Closed Lost">Closed Lost</option>
                    </select>
                    <input type="date" id="entry-date" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                </div>
                <input type="number" id="entry-value" placeholder="Value ₹" class="w-full p-4 rounded-2xl bg-slate-50 outline-none">
                <textarea id="entry-note" placeholder="Note..." class="w-full p-4 rounded-2xl bg-slate-50 outline-none"></textarea>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black">SAVE ENTRY</button>
                    <button type="button" onclick="UI.modal('close')" class="px-6 py-4 rounded-2xl bg-slate-100 text-slate-400 font-bold">X</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            Today: new Date().toISOString().split('T')[0],

            setTheme: (theme) => {
                document.body.classList.remove('theme-midnight', 'theme-forest', 'theme-sunset', 'theme-electric', 'theme-mono', 'theme-sakura');
                if(theme !== 'default') document.body.classList.add(`theme-${theme}`);
                localStorage.setItem('nexus_theme', theme);
            },

            setWP: (url) => {
                if(url === 'none') {
                    document.body.style.setProperty('--bg-image', 'none');
                    localStorage.removeItem('nexus_wp');
                } else {
                    document.body.style.setProperty('--bg-image', `url('${url}')`);
                    localStorage.setItem('nexus_wp', url);
                }
            },

            checkAuth: () => {
                System.setTheme(localStorage.getItem('nexus_theme') || 'default');
                System.setWP(localStorage.getItem('nexus_wp') || 'none');
                if(localStorage.getItem('nexus_auth') === 'true') {
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },

            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    localStorage.setItem('nexus_auth', 'true');
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },

            logout: () => { localStorage.removeItem('nexus_auth'); location.reload(); },

            sync: async () => {
                const icon = document.getElementById('sync-icon');
                if(icon) icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } finally { if(icon) icon.classList.remove('fa-spin'); }
            },

            deleteLead: async (id) => {
                if(!confirm('Delete this entry?')) return;
                await fetch(`${System.API}/id/${id}`, { method: 'DELETE' });
                System.sync();
            }
        };

        const UI = {
            navigate: (view) => {
                ['dashboard', 'leads', 'clients'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.add('hidden');
                    document.getElementById(`btn-${v}`).classList.remove('active-link');
                });
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.getElementById(`btn-${view}`).classList.add('active-link');
                if(view === 'dashboard') UI.renderAll();
            },

            modal: (action, id = null) => {
                const m = document.getElementById('lead-modal');
                if(action === 'open') {
                    m.classList.remove('hidden');
                    if(id) {
                        const l = System.Data.find(x => x.id === id);
                        document.getElementById('entry-id').value = l.id;
                        document.getElementById('entry-name').value = l.name;
                        document.getElementById('entry-phone').value = l.phone;
                        document.getElementById('entry-status').value = l.status;
                        document.getElementById('entry-value').value = l.value;
                        document.getElementById('entry-date').value = l.followUpDate || '';
                        document.getElementById('entry-note').value = l.note || '';
                    } else { document.getElementById('core-form').reset(); document.getElementById('entry-id').value = ''; }
                } else { m.classList.add('hidden'); }
            },

            card: (l) => `
                <div class="glass-panel p-6 rounded-3xl lead-card flex justify-between items-center mb-1">
                    <div onclick="UI.modal('open', '${l.id}')">
                        <h5 class="font-bold">${l.name}</h5>
                        <p class="text-[10px] font-bold ${l.status === 'Closed Won' ? 'text-emerald-500' : 'text-slate-400'} uppercase">${l.status} • ₹${l.value}</p>
                    </div>
                    <div class="flex gap-2">
                         <a href="tel:${l.phone}" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-phone"></i></a>
                         <a href="https://wa.me/91${l.phone}" target="_blank" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center shadow-sm"><i class="fab fa-whatsapp"></i></a>
                         <button onclick="System.deleteLead('${l.id}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `,

            renderList: (targetId, data) => {
                document.getElementById(targetId).innerHTML = data.length ? data.slice().reverse().map(UI.card).join('') : `<p class="text-slate-400 text-center py-10">No data found.</p>`;
            },

            renderAll: () => {
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                const overdue = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && l.status !== 'Closed Won' && l.status !== 'Closed Lost');
                const todayTasks = System.Data.filter(l => l.followUpDate === System.Today && l.status !== 'Closed Won');
                const clients = System.Data.filter(l => l.status === 'Closed Won');

                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('meta-overdue').innerText = overdue.length;
                document.getElementById('meta-today').innerText = todayTasks.length;
                document.getElementById('meta-closed').innerText = clients.length;

                UI.renderList('full-pipeline', System.Data);
                UI.renderList('client-list', clients);
                UI.renderList('today-grid', todayTasks);

                document.getElementById('alert-container').innerHTML = overdue.map(l => `
                    <div class="p-5 bg-red-50/80 backdrop-blur-md border-l-4 border-red-500 rounded-2xl flex justify-between items-center alert-pulse">
                        <div><p class="text-[10px] font-black text-red-500 uppercase">OVERDUE</p><h5 class="font-bold text-slate-900">${l.name}</h5></div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="w-10 h-10 bg-white text-red-500 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-phone-alt"></i></a>
                            <button onclick="UI.modal('open', '${l.id}')" class="w-10 h-10 bg-white text-slate-400 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            },

            filterBy: (type) => {
                UI.navigate('leads');
                let filtered = [];
                if(type === 'revenue') filtered = System.Data.filter(l => l.status === 'Closed Won');
                else if(type === 'overdue') filtered = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && l.status !== 'Closed Won' && l.status !== 'Closed Lost');
                else if(type === 'today') filtered = System.Data.filter(l => l.followUpDate === System.Today);
                else filtered = System.Data;
                UI.renderList('full-pipeline', filtered);
            },

            search: (targetId) => {
                const q = document.getElementById(targetId === 'full-pipeline' ? 'lead-search' : 'client-search').value.toLowerCase();
                const source = targetId === 'client-list' ? System.Data.filter(l => l.status === 'Closed Won') : System.Data;
                const filtered = source.filter(l => l.name.toLowerCase().includes(q) || l.phone.includes(q));
                UI.renderList(targetId, filtered);
            },

            exportCSV: () => {
                const headers = ['id', 'name', 'phone', 'status', 'value', 'followUpDate', 'note'];
                const rows = System.Data.map(l => headers.map(h => `"${l[h] || ''}"`).join(','));
                const csvContent = [headers.join(','), ...rows].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `Nexus_Backup_${System.Today}.csv`; a.click();
            },

            importCSV: (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.split('\n').slice(1);
                    const newData = lines.filter(line => line.trim()).map(line => {
                        const values = line.split(',').map(v => v.replace(/"/g, ''));
                        return { id: values[0] || "NX"+Date.now(), name: values[1], phone: values[2], status: values[3], value: values[4], followUpDate: values[5], note: values[6] };
                    });
                    if(confirm(`Import ${newData.length} records?`)) {
                        await fetch(System.API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: newData}) });
                        System.sync();
                    }
                };
                reader.readAsText(file);
            }
        };

        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('entry-id').value;
            const payload = {
                id: id || "NX" + Date.now(),
                name: document.getElementById('entry-name').value,
                phone: document.getElementById('entry-phone').value,
                status: document.getElementById('entry-status').value,
                value: document.getElementById('entry-value').value || 0,
                followUpDate: document.getElementById('entry-date').value,
                note: document.getElementById('entry-note').value
            };
            UI.modal('close');
            const method = id ? 'PATCH' : 'POST';
            await fetch(id ? `${System.API}/id/${id}` : System.API, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? payload : [payload]}) });
            System.sync();
        });
    </script>
</body>
