<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        body.light-mode { background-color: #f0f4f1; color: #1a2e21; }
        body.dark-mode { background-color: #0a0f0b; color: #e8f5e9; }
        .glass-card { border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .light-mode .glass-card { background: white; }
        .dark-mode .glass-card { background: #141d16; border-color: #1e2e22; }
        .lead-done { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
        .active-filter { border: 2px solid var(--primary) !important; }
    </style>
</head>
<body class="light-mode p-3 md:p-6 transition-all duration-500">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-[#1e6b3e] p-5 rounded-[2rem] shadow-xl text-white">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 h-12 w-12 rounded-2xl flex items-center justify-center backdrop-blur-md">
                    <i class="fas fa-filter text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tight">LeadFlow Filters</h1>
                    <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">Krishna Raikwar</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i id="theme-icon" class="fas fa-moon"></i></button>
                <button onclick="fetchLeads()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div id="card-New" onclick="filterByStatus('New')" class="glass-card p-5">
                <p class="text-[10px] font-bold opacity-50 uppercase">New</p>
                <h2 id="s-new" class="text-3xl font-black text-blue-500">0</h2>
            </div>
            <div id="card-Contacted" onclick="filterByStatus('Contacted')" class="glass-card p-5">
                <p class="text-[10px] font-bold opacity-50 uppercase">Contacted</p>
                <h2 id="s-cont" class="text-3xl font-black text-orange-500">0</h2>
            </div>
            <div id="card-Overdue" onclick="filterByStatus('Overdue')" class="glass-card p-5 border-b-4 border-red-500">
                <p class="text-[10px] font-bold text-red-500 uppercase">Overdue</p>
                <h2 id="s-over" class="text-3xl font-black text-red-500">0</h2>
            </div>
            <div id="card-Closed" onclick="filterByStatus('Closed')" class="glass-card p-5 border-b-4 border-[#1e6b3e]">
                <p class="text-[10px] font-bold text-[#1e6b3e] uppercase">Won</p>
                <h2 id="s-won" class="text-3xl font-black text-[#1e6b3e]">0</h2>
            </div>
        </div>

        <div onclick="filterByStatus('All')" class="text-center mb-6">
            <button class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] hover:opacity-100 transition-all">
                <i class="fas fa-list-ul mr-2"></i> Show All Leads (<span id="total-count">0</span>)
            </button>
        </div>

        <div id="main-list" class="grid gap-4 mb-24"></div>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white dark:bg-[#141d16] w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black mb-6 text-[#1e6b3e]">Edit Lead</h2>
            <form id="leadForm" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="name" placeholder="Name" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                <input type="text" id="phone" placeholder="WhatsApp" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                <div>
                    <label class="text-[10px] font-bold opacity-40 ml-2 uppercase">Update Follow-up Date</label>
                    <input type="date" id="fDate" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                </div>
                <select id="status" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5">
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Interested">Interested</option>
                    <option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-[#1e6b3e] text-white p-5 rounded-2xl font-black shadow-lg">UPDATE CLOUD</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-400 font-bold py-2 text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let leads = [];
        let currentFilter = 'All';
        let completed = JSON.parse(localStorage.getItem('k_done') || '[]');

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('k_theme', isDark ? 'dark' : 'light');
        }
        if(localStorage.getItem('k_theme') === 'dark') toggleTheme();

        async function fetchLeads() {
            const res = await fetch(API);
            leads = await res.json();
            updateStats();
            render();
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            let stats = { New: 0, Contacted: 0, Interested: 0, Closed: 0, Overdue: 0 };
            
            leads.forEach(l => {
                stats[l.status]++;
                if(l.followUpDate < today && l.status !== 'Closed') stats.Overdue++;
            });

            document.getElementById('s-new').innerText = stats.New;
            document.getElementById('s-cont').innerText = (stats.Contacted || 0) + (stats.Interested || 0);
            document.getElementById('s-over').innerText = stats.Overdue;
            document.getElementById('s-won').innerText = stats.Closed;
            document.getElementById('total-count').innerText = leads.length;
        }

        function filterByStatus(status) {
            currentFilter = status;
            // UI Update: Highlight active card
            document.querySelectorAll('.glass-card').forEach(c => c.classList.remove('active-filter'));
            if(status !== 'All') document.getElementById(`card-${status}`)?.classList.add('active-filter');
            render();
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const mainList = document.getElementById('main-list');
            mainList.innerHTML = '';
            
            let filteredLeads = leads;
            if(currentFilter === 'Overdue') {
                filteredLeads = leads.filter(l => l.followUpDate < today && l.status !== 'Closed');
            } else if(currentFilter !== 'All') {
                filteredLeads = leads.filter(l => l.status === currentFilter);
            }

            filteredLeads.reverse().forEach(l => {
                const isOverdue = l.followUpDate < today && l.status !== 'Closed';
                mainList.innerHTML += createCard(l, isOverdue);
            });
        }

        function createCard(l, isOverdue) {
            const isDone = completed.includes(l.id);
            const statusColor = l.status === 'Closed' ? 'green' : (l.status === 'Interested' ? 'purple' : 'blue');
            return `
                <div class="glass-card p-5 flex flex-col md:flex-row justify-between items-center gap-4 ${isDone ? 'lead-done' : ''} ${isOverdue ? 'border-l-4 border-red-500' : ''}">
                    <div class="flex items-center gap-4 w-full">
                        <button onclick="toggleDone(event, '${l.id}')" class="w-10 h-10 rounded-2xl border-2 border-gray-100 flex items-center justify-center bg-gray-50 dark:bg-black">
                            ${isDone ? '<i class="fas fa-check text-green-500"></i>' : ''}
                        </button>
                        <div class="flex-1" onclick="openEditModal('${l.id}')">
                            <h4 class="font-bold text-base tracking-tight">${l.name}</h4>
                            <div class="flex flex-wrap items-center gap-3 mt-1 text-[10px]">
                                <span class="font-black px-2 py-0.5 bg-gray-100 dark:bg-white/5 rounded uppercase">${l.status}</span>
                                <span class="opacity-50 font-bold"><i class="fas fa-phone-alt"></i> ${l.phone}</span>
                                <span class="${isOverdue ? 'text-red-500 font-black' : 'opacity-50'}">
                                    <i class="far fa-calendar-alt"></i> ${l.followUpDate || 'No Date'}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <a href="https://wa.me/91${l.phone}" class="flex-1 bg-[#25D366] text-white px-4 py-3 rounded-2xl text-[10px] font-black text-center shadow-md">WHATSAPP</a>
                        <a href="tel:${l.phone}" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-2xl text-[10px] font-black text-center shadow-md">CALL</a>
                    </div>
                </div>`;
        }

        function openEditModal(id) {
            const l = leads.find(x => x.id === id);
            document.getElementById('editId').value = l.id;
            document.getElementById('name').value = l.name;
            document.getElementById('phone').value = l.phone;
            document.getElementById('fDate').value = l.followUpDate || "";
            document.getElementById('status').value = l.status;
            toggleModal('edit');
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const payload = { 
                name: document.getElementById('name').value, 
                phone: document.getElementById('phone').value, 
                status: document.getElementById('status').value, 
                followUpDate: document.getElementById('fDate').value 
            };
            
            await fetch(`${API}/id/${editId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: payload })
            });
            
            toggleModal();
            fetchLeads();
        });

        function toggleDone(event, id) {
            event.stopPropagation();
            completed.includes(id) ? completed = completed.filter(i => i !== id) : completed.push(id);
            localStorage.setItem('k_done', JSON.stringify(completed));
            render();
        }

        function toggleModal() { document.getElementById('leadModal').classList.toggle('hidden'); }
        window.onload = fetchLeads;
    </script>
</body>
</html>
