<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="tab-title">Nexus CRM | Pro Intelligence</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --brand-primary: #6366f1; 
            --brand-dark: #0f172a; 
            --surface-100: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body.theme-midnight { --brand-primary: #818cf8; --brand-dark: #f8fafc; --surface-100: #020617; --card-bg: rgba(30, 41, 59, 0.8); }
        body.theme-emerald { --brand-primary: #10b981; --brand-dark: #064e3b; --surface-100: #ecfdf5; --card-bg: rgba(255, 255, 255, 0.9); }
        body.theme-rose { --brand-primary: #f43f5e; --brand-dark: #4c0519; --surface-100: #fff1f2; --card-bg: rgba(255, 255, 255, 0.9); }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--surface-100); 
            color: var(--brand-dark); 
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); 
        }

        input, select, textarea { font-size: 16px !important; }

        .active-link { 
            color: var(--brand-primary) !important; 
            background: rgba(99, 102, 241, 0.08); 
            border-radius: 12px;
        }

        /* Desktop Sidebar Adjusted - Thin & Sleek */
        @media (min-width: 769px) {
            .sidebar-desktop { 
                width: 70px; /* Slim width */
                transition: width 0.3s ease;
                overflow: hidden;
            }
            .sidebar-desktop:hover {
                width: 240px; /* Expand on hover */
            }
            .nav-text { 
                opacity: 0; 
                white-space: nowrap; 
                transition: opacity 0.2s; 
            }
            .sidebar-desktop:hover .nav-text { 
                opacity: 1; 
            }
            .logo-text { display: none; }
            .sidebar-desktop:hover .logo-text { display: block; }
        }

        @media (max-width: 768px) {
            .mobile-nav {
                position: fixed; bottom: 0; left: 0; right: 0;
                background: rgba(255,255,255,0.8);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(0,0,0,0.05);
                z-index: 100; padding: 10px 20px 25px 20px;
                display: flex; justify-content: space-around;
            }
            .main-content { padding-bottom: 100px; }
            .sidebar-desktop { display: none; }
        }
        
        .theme-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="overflow-x-hidden">

    <script>
        const BrandConfig = {
            name: "Nexus", 
            accent: "CRM",
            logo: "https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss" 
        };
    </script>

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-950 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[3rem] p-10 text-center">
            <img id="login-logo" src="" class="w-24 h-24 mx-auto mb-6 rounded-[2rem] shadow-2xl object-cover border-4 border-white/10">
            <h1 class="text-3xl font-extrabold text-slate-900">
                <span id="l-name"></span><span class="text-indigo-600" id="l-accent"></span>
            </h1>
            <input type="password" id="sys-pin" pattern="\d*" inputmode="numeric" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="PIN" class="w-full p-5 mt-6 rounded-3xl bg-slate-100 border-none text-center text-3xl font-bold tracking-[0.5em] focus:ring-2 ring-indigo-500/20">
        </div>
    </div>

    <div id="app-shell" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <aside class="sidebar-desktop bg-white border-r border-slate-100 p-4 flex-shrink-0 flex flex-col z-50">
            <div class="flex items-center gap-3 mb-10">
                <img id="side-logo" src="" class="w-10 h-10 rounded-xl shadow-sm object-cover flex-shrink-0">
                <div class="logo-text">
                    <span class="font-black text-xl leading-tight" id="s-name"></span>
                </div>
            </div>
            
            <nav class="flex flex-col gap-2 flex-1">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex items-center gap-4 p-3 rounded-xl font-bold text-slate-500 active-link">
                    <i class="fas fa-home w-5 text-center"></i> <span class="nav-text text-sm">Dashboard</span>
                </button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex items-center gap-4 p-3 rounded-xl font-bold text-slate-500">
                    <i class="fas fa-rocket w-5 text-center"></i> <span class="nav-text text-sm">Pipeline</span>
                </button>
                <button onclick="UI.navigate('closed')" id="btn-closed" class="flex items-center gap-4 p-3 rounded-xl font-bold text-slate-500">
                    <i class="fas fa-crown w-5 text-center"></i> <span class="nav-text text-sm">Success</span>
                </button>
                
                <div class="mt-4 pt-4 border-t border-slate-50">
                    <button onclick="System.exportCSV()" class="w-full flex items-center gap-4 p-3 rounded-xl text-sm font-bold text-slate-600">
                        <i class="fas fa-download w-5 text-center text-indigo-500"></i> <span class="nav-text">Export</span>
                    </button>
                </div>
            </nav>

            <div class="p-2 bg-slate-50 rounded-xl mt-4 flex flex-col gap-2 items-center">
                <div onclick="UI.setTheme('default')" class="theme-dot bg-indigo-500"></div>
                <div onclick="UI.setTheme('midnight')" class="theme-dot bg-slate-900"></div>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 w-full main-content">
            <header class="flex justify-between items-start mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">Intelligence</h2>
                    <p class="text-slate-400 text-sm font-bold" id="live-timer"></p>
                </div>
                <div class="hidden md:flex gap-3">
                    <button onclick="System.sync()" class="w-10 h-10 glass-panel rounded-xl flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt text-sm"></i></button>
                    <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100">+ Add Intel</button>
                </div>
            </header>

            <div id="system-alerts" class="mb-6 space-y-3"></div>

            <section id="view-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div onclick="UI.navigate('closed')" class="stat-card glass-panel p-5 border-b-4 border-indigo-500">
                        <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Revenue</p>
                        <h3 id="meta-revenue" class="text-xl font-black mt-1">₹0</h3>
                    </div>
                    <div onclick="UI.filterDashboard('overdue')" class="stat-card glass-panel p-5 border-b-4 border-red-500">
                        <p class="text-[10px] font-black text-red-500 uppercase tracking-widest">Overdue</p>
                        <h3 id="meta-overdue" class="text-xl font-black mt-1">0</h3>
                    </div>
                    <div onclick="UI.filterDashboard('today')" class="stat-card glass-panel p-5 border-b-4 border-emerald-500">
                        <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Today</p>
                        <h3 id="meta-today" class="text-xl font-black mt-1">0</h3>
                    </div>
                    <div onclick="UI.navigate('leads')" class="stat-card glass-panel p-5 bg-indigo-600 text-white border-none shadow-indigo-200">
                        <p class="text-[10px] font-black opacity-80 uppercase tracking-widest">Total</p>
                        <h3 id="meta-total" class="text-xl font-black mt-1">0</h3>
                    </div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-5">
                        <h4 id="grid-title" class="text-lg font-extrabold text-slate-800 flex items-center gap-2"><i class="fas fa-bolt text-indigo-500"></i> Active Focus</h4>
                    </div>
                    <div id="today-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <div id="full-pipeline" class="space-y-4"></div>
            </section>
            <section id="view-closed" class="hidden space-y-6">
                <div id="closed-pipeline" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-950/40 backdrop-blur-md flex items-end md:items-center justify-center">
        <div class="bg-white w-full max-w-xl rounded-t-[3rem] md:rounded-[2rem] p-8 md:p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">Lead Intel</h2>
            <form id="core-form" class="space-y-5">
                <input type="hidden" id="entry-id">
                <input type="text" id="entry-name" placeholder="Name" class="w-full p-4 rounded-xl bg-slate-50 outline-none" required>
                <input type="tel" id="entry-phone" placeholder="Phone" class="w-full p-4 rounded-xl bg-slate-50 outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="w-full p-4 rounded-xl bg-slate-50 outline-none">
                        <option value="Prospect">Prospect</option>
                        <option value="Closed Won">Closed Won</option>
                    </select>
                    <input type="date" id="entry-date" class="w-full p-4 rounded-xl bg-slate-50 outline-none">
                </div>
                <input type="number" id="entry-value" placeholder="Value (₹)" class="w-full p-4 rounded-xl bg-slate-50 outline-none">
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-bold">SAVE</button>
                    <button type="button" onclick="UI.modal('close')" class="px-6 py-4 rounded-xl bg-slate-100 text-slate-500 font-bold">CLOSE</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // System & UI Objects (Copy-pasted from your original logic to ensure everything works)
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            Today: new Date().toISOString().split('T')[0],
            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    localStorage.setItem('userLogin', 'true');
                    document.getElementById('auth-gateway').style.display = 'none';
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },
            sync: async () => {
                const icon = document.getElementById('sync-icon');
                if(icon) icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } finally { if(icon) icon.classList.remove('fa-spin'); }
            }
        };

        const UI = {
            navigate: (view) => {
                ['dashboard', 'leads', 'closed'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
                    const btn = document.getElementById(`btn-${v}`);
                    if(btn) btn.classList.toggle('active-link', v === view);
                });
            },
            renderAll: () => {
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('today-grid').innerHTML = System.Data.slice(0,4).map(UI.cardTemplate).join('');
                document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
            },
            cardTemplate: (l) => `
                <div class="glass-panel p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <h5 class="font-bold text-slate-800 text-sm">${l.name}</h5>
                        <p class="text-[10px] text-slate-400 uppercase mt-1">${l.status}</p>
                    </div>
                    <div class="flex gap-2">
                         <a href="tel:${l.phone}" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center"><i class="fas fa-phone-alt text-xs"></i></a>
                    </div>
                </div>`,
            modal: (action) => {
                document.getElementById('lead-modal').classList.toggle('hidden', action !== 'open');
            },
            setTheme: (t) => { document.body.className = t === 'midnight' ? 'theme-midnight' : ''; }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-logo').src = BrandConfig.logo;
            document.getElementById('side-logo').src = BrandConfig.logo;
            document.getElementById('l-name').innerText = BrandConfig.name;
            document.getElementById('l-accent').innerText = BrandConfig.accent;
            document.getElementById('s-name').innerText = BrandConfig.name;
            if(localStorage.getItem('userLogin') === 'true') {
                document.getElementById('auth-gateway').style.display = 'none';
                document.getElementById('app-shell').classList.remove('hidden');
                System.sync();
            }
        });
    </script>
</body>
</html>
