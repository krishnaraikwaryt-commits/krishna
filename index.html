<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root { 
            --accent: #10b981; 
            --bg-dark: #000000; 
            --card-dark: #121212; 
            --ios-blur: blur(20px);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ✨ iOS Smooth Scrolling & Transitions */
        * { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); scroll-behavior: smooth; }

        .emerald-card { 
            background: var(--card-dark); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* 📱 iOS Spring Animation for Buttons */
        button:active { transform: scale(0.92); }

        .font-heavy { font-weight: 800; }
        .hidden-page { display: none !important; opacity: 0; transform: translateY(20px); }

        /* 🌊 Glassmorphism for Nav & Header */
        nav { 
            background: rgba(18, 18, 18, 0.8) !important; 
            backdrop-filter: var(--ios-blur); 
            -webkit-backdrop-filter: var(--ios-blur);
        }

        /* 🚨 Custom Glows */
        @keyframes ios-glow-red { 0%, 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.1); } 50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); } }
        @keyframes ios-glow-orange { 0%, 100% { box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); } 50% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); } }
        
        .overdue-glow { animation: ios-glow-red 3s infinite ease-in-out; border: 1px solid rgba(239, 68, 68, 0.3) !important; }
        .today-glow { animation: ios-glow-orange 3s infinite ease-in-out; border: 1px solid rgba(249, 115, 22, 0.3) !important; }

        /* 📋 Table Styling */
        table { border-collapse: separate; border-spacing: 0 12px; }
        td { background: #121212; padding: 16px; border: 1px solid rgba(255,255,255,0.03); }
        td:first-child { border-radius: 20px 0 0 20px; }
        td:last-child { border-radius: 0 20px 20px 0; }

        /* 🔍 Search Bar iOS Style */
        .search-container { background: #1c1c1e; border-radius: 12px; padding: 8px 12px; }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="text-center w-full max-w-sm">
            <div class="w-24 h-24 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center text-black text-4xl shadow-2xl"><i class="fas fa-lock"></i></div>
            <h2 class="text-4xl font-heavy mb-8 tracking-tighter">Welcome</h2>
            <input type="password" id="access-pin" oninput="autoCheck()" placeholder="Enter PIN" class="w-full p-6 rounded-3xl text-center text-2xl font-heavy outline-none mb-4 bg-[#1c1c1e] border-none text-white">
            <button onclick="checkAccess()" class="w-full bg-white text-black p-5 rounded-3xl font-heavy uppercase tracking-widest hover:bg-emerald-500 transition-colors">Unlock</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        
        <div id="page-dashboard" class="p-6 max-w-2xl mx-auto transition-all duration-500">
            <header class="flex justify-between items-end mb-10">
                <div>
                    <p id="header-date" class="text-emerald-500 font-bold text-xs uppercase tracking-widest mb-1 opacity-70"></p>
                    <h1 class="text-4xl font-heavy tracking-tighter">Dashboard</h1>
                </div>
                <div class="flex gap-3">
                    <input type="file" id="csv-input" accept=".csv" class="hidden" onchange="handleCSV(this)">
                    <button onclick="document.getElementById('csv-input').click()" class="w-12 h-12 emerald-card flex items-center justify-center text-blue-400"><i class="fas fa-plus-circle"></i></button>
                    <button onclick="fetchLeads()" class="w-12 h-12 emerald-card flex items-center justify-center text-emerald-500"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div onclick="setFilter('All', this)" class="emerald-card p-6 border-none bg-gradient-to-br from-[#121212] to-[#1a1a1a]">
                    <p class="text-xs font-heavy text-emerald-500 uppercase opacity-60">Total Leads</p>
                    <h2 id="count-all" class="text-4xl font-heavy mt-2">0</h2>
                </div>
                <div onclick="setFilter('Today', this)" class="emerald-card p-6 border-none bg-gradient-to-br from-[#121212] to-[#1a1a1a]">
                    <p class="text-xs font-heavy text-blue-500 uppercase opacity-60">Today</p>
                    <h2 id="count-today" class="text-4xl font-heavy mt-2 text-blue-400">0</h2>
                </div>
            </div>

            <div id="alert-section" class="mb-10 space-y-6">
                <div id="overdue-container" class="hidden">
                    <h3 class="text-xs font-black text-red-500 uppercase tracking-widest mb-3 ml-2">Overdue</h3>
                    <div id="overdue-list" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
                </div>
                <div id="today-container" class="hidden">
                    <h3 class="text-xs font-black text-orange-500 uppercase tracking-widest mb-3 ml-2">Due Today</h3>
                    <div id="today-list" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
                </div>
            </div>

            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-8">
                <div onclick="setFilter('New', this)" class="filter-chip bg-[#1c1c1e]">New <span id="count-new" class="ml-1 opacity-30">0</span></div>
                <div onclick="setFilter('Follow-up', this)" class="filter-chip bg-[#1c1c1e]">Follow-up <span id="count-follow" class="ml-1 opacity-30">0</span></div>
                <div onclick="setFilter('Converted', this)" class="filter-chip bg-[#1c1c1e]">Closed <span id="count-closed" class="ml-1 opacity-30">0</span></div>
            </div>

            <div class="space-y-4" id="main-list"></div>
        </div>

        <div id="page-checklist" class="p-6 max-w-2xl mx-auto hidden-page transition-all duration-500">
            <h2 class="text-4xl font-heavy mb-8 tracking-tighter text-white">Daily Tasks</h2>
            <div class="emerald-card p-4 mb-8 bg-[#1c1c1e] border-none">
                <div class="flex gap-3">
                    <input type="text" id="new-task" placeholder="What's next?" class="flex-1 p-4 rounded-2xl outline-none font-bold bg-transparent">
                    <button onclick="addTask()" class="bg-white text-black w-14 rounded-2xl font-heavy text-2xl">+</button>
                </div>
            </div>
            <ul id="task-list" class="space-y-4"></ul>
        </div>

        <div id="page-data" class="p-6 max-w-4xl mx-auto hidden-page transition-all duration-500">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-heavy tracking-tighter">Database</h2>
                <div class="search-container flex items-center gap-3">
                    <i class="fas fa-search opacity-30"></i>
                    <input type="text" id="table-search" oninput="filterTable()" placeholder="Search" class="bg-transparent border-none text-sm font-bold w-24 outline-none">
                </div>
            </div>
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-tighter opacity-40">
                            <th class="pb-4">✔</th><th>Lead Details</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <nav class="fixed bottom-8 left-6 right-6 h-20 rounded-[2.5rem] flex justify-around items-center px-8 shadow-2xl z-[500] border border-white/5">
            <button onclick="switchPage('dashboard')" id="nav-dashboard" class="flex flex-col items-center text-emerald-500">
                <i class="fas fa-square-noodling text-2xl mb-1"></i><span class="text-[9px] font-heavy uppercase tracking-widest">Board</span>
            </button>
            <button onclick="switchPage('checklist')" id="nav-checklist" class="flex flex-col items-center opacity-30">
                <i class="fas fa-list-ul text-2xl mb-1"></i><span class="text-[9px] font-heavy uppercase tracking-widest">Tasks</span>
            </button>
            <button onclick="openModal('add')" class="bg-emerald-500 text-black w-14 h-14 rounded-[1.5rem] flex items-center justify-center shadow-xl -mt-16 border-[6px] border-[#000] active:scale-75 transition-transform"><i class="fas fa-plus"></i></button>
            <button onclick="switchPage('data')" id="nav-data" class="flex flex-col items-center opacity-30">
                <i class="fas fa-database text-2xl mb-1"></i><span class="text-[9px] font-heavy uppercase tracking-widest">Data</span>
            </button>
        </nav>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-end sm:items-center justify-center z-[1000] p-4">
        <div class="emerald-card w-full max-w-sm p-8 bg-[#1c1c1e] rounded-t-[3rem] sm:rounded-[3rem] border-none shadow-2xl transform transition-transform duration-500">
            <form id="lead-form" class="space-y-5">
                <input type="hidden" id="f-id">
                <div class="space-y-1">
                    <label class="text-[10px] font-heavy opacity-40 ml-2 uppercase">Name</label>
                    <input type="text" id="f-name" class="w-full p-4 rounded-2xl font-bold bg-[#2c2c2e] border-none" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-heavy opacity-40 ml-2 uppercase">Phone</label>
                    <input type="text" id="f-phone" class="w-full p-4 rounded-2xl font-bold bg-[#2c2c2e] border-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-heavy opacity-40 ml-2 uppercase">Status</label>
                        <select id="f-status" class="w-full p-4 rounded-2xl font-bold bg-[#2c2c2e] border-none">
                            <option value="New">New</option>
                            <option value="Follow-up">Follow-up</option>
                            <option value="Converted">Closed</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-heavy opacity-40 ml-2 uppercase">Date</label>
                        <input type="date" id="f-fdate" class="w-full p-4 rounded-2xl font-bold bg-[#2c2c2e] border-none">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-black p-5 rounded-2xl font-heavy uppercase mt-4">Save Changes</button>
                <button type="button" onclick="closeModal()" class="w-full text-white/40 text-xs font-heavy py-2">Dismiss</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const SECRET_PIN = "1321";
        let leadsData = [];
        let tasks = JSON.parse(localStorage.getItem('crm_tasks')) || [];
        const today = new Date().toISOString().split('T')[0];

        function autoCheck() { if(document.getElementById('access-pin').value === SECRET_PIN) checkAccess(); }
        function checkAccess() {
            if(document.getElementById('access-pin').value.trim() === SECRET_PIN) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app-content').style.display = 'block';
                    fetchLeads(); renderTasks();
                }, 400);
            }
        }

        async function fetchLeads() {
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            try {
                const res = await fetch(API_URL);
                leadsData = await res.json();
                updateUI();
            } catch (e) { console.error("Sync Failed"); }
        }

        function updateUI() {
            let stats = { total: leadsData.length, today: 0, new: 0, follow: 0, closed: 0, overdue: 0 };
            const overdueList = document.getElementById('overdue-list');
            const todayList = document.getElementById('today-list');
            overdueList.innerHTML = ''; todayList.innerHTML = '';
            
            leadsData.forEach(l => {
                if(l.status === 'New') stats.new++;
                if(l.status === 'Follow-up') stats.follow++;
                if(l.status === 'Converted') stats.closed++;

                const fDate = l.followUpDate;
                if(fDate && l.status !== 'Converted') {
                    if(fDate < today) {
                        stats.overdue++;
                        overdueList.innerHTML += createAlertCard(l, 'overdue-glow', 'OVERDUE');
                    } else if(fDate === today) {
                        stats.today++;
                        todayList.innerHTML += createAlertCard(l, 'today-glow', 'DUE TODAY');
                    }
                }
            });

            document.getElementById('overdue-container').classList.toggle('hidden', stats.overdue === 0);
            document.getElementById('today-container').classList.toggle('hidden', stats.today === 0);
            document.getElementById('count-all').innerText = stats.total;
            document.getElementById('count-today').innerText = stats.today;
            document.getElementById('count-new').innerText = stats.new;
            document.getElementById('count-follow').innerText = stats.follow;
            document.getElementById('count-closed').innerText = stats.closed;
            setFilter('All'); renderTable();
        }

        function createAlertCard(l, glowClass, label) {
            return `<div class="min-w-[180px] emerald-card p-5 ${glowClass}">
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="text-xs font-heavy truncate w-24">${l.name}</h4>
                            <span class="text-[7px] font-black px-2 py-1 rounded-full bg-white/10 tracking-widest">${label}</span>
                        </div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="flex-1 bg-white/5 py-2.5 rounded-xl text-center text-[8px] font-black hover:bg-emerald-500 hover:text-black">CALL</a>
                            <a href="https://wa.me/91${l.phone}" class="flex-1 bg-emerald-500/10 text-emerald-500 py-2.5 rounded-xl text-center text-[8px] font-black hover:bg-emerald-500 hover:text-black">WA</a>
                        </div>
                    </div>`;
        }

        function renderMainList(data) {
            const list = document.getElementById('main-list');
            list.innerHTML = data.slice().reverse().map(l => `
                <div class="emerald-card p-6 flex justify-between items-center transform transition-all active:scale-[0.98]">
                    <div onclick="openModal('edit', '${l.id}')" class="flex-1">
                        <h4 class="font-heavy text-md ${l.status==='Converted' ? 'opacity-20 line-through' : ''}">${l.name}</h4>
                        <p class="text-[9px] font-heavy text-emerald-500/40 uppercase mt-1 tracking-widest">${l.status} • ${l.followUpDate || 'No Date'}</p>
                    </div>
                    <div class="flex gap-3">
                        <a href="https://wa.me/91${l.phone}" class="w-11 h-11 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center text-lg"><i class="fab fa-whatsapp"></i></a>
                        <a href="tel:${l.phone}" class="w-11 h-11 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-phone-alt"></i></a>
                    </div>
                </div>`).join('');
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            if(!tbody) return;
            tbody.innerHTML = leadsData.map(l => `
                <tr class="table-row-item" data-name="${l.name.toLowerCase()}" data-phone="${l.phone}">
                    <td class="text-center"><input type="checkbox" class="accent-emerald-500 w-5 h-5 rounded-full"></td>
                    <td><div class="text-sm font-bold">${l.name}</div><div class="text-[10px] opacity-30">${l.phone}</div></td>
                    <td><span class="text-[8px] font-black px-2 py-1 rounded-lg bg-emerald-500/10 text-emerald-500 uppercase">${l.status}</span></td>
                    <td>
                        <div class="flex gap-4">
                            <a href="tel:${l.phone}" class="text-blue-400"><i class="fas fa-phone-alt"></i></a>
                            <a href="https://wa.me/91${l.phone}" class="text-emerald-500"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </td>
                </tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('table-search').value.toLowerCase();
            document.querySelectorAll('.table-row-item').forEach(row => {
                row.style.display = (row.dataset.name.includes(q) || row.dataset.phone.includes(q)) ? '' : 'none';
            });
        }

        function setFilter(type, el) {
            if(el) {
                document.querySelectorAll('.filter-chip, .emerald-card').forEach(c => c.classList.remove('filter-active'));
                el.classList.add('filter-active');
            }
            let f = leadsData;
            if(type==='Today') f = leadsData.filter(x => x.followUpDate === today);
            else if(type==='New') f = leadsData.filter(x => x.status === 'New');
            else if(type==='Follow-up') f = leadsData.filter(x => x.status === 'Follow-up');
            else if(type==='Converted') f = leadsData.filter(x => x.status === 'Converted');
            renderMainList(f);
        }

        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const data = { id: id || "L"+Date.now(), name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, status: document.getElementById('f-status').value, followUpDate: document.getElementById('f-fdate').valu
