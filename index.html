<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-primary: #6366f1;
            --brand-dark: #0f172a;
            --surface-100: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--surface-100); color: var(--brand-dark); }

        /* Neumorphic & Glassmorphism Mix */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.5);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .active-link {
            color: var(--brand-primary) !important;
            background: #eef2ff;
            border-right: 4px solid var(--brand-primary);
        }

        .lead-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lead-card:hover {
            transform: scale(1.01);
            border-color: var(--brand-primary);
        }

        /* Skeleton Loading Animation */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .loading {
            background: #f6f7f8;
            background-image: linear-gradient(90deg, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[2.5rem] p-10 text-center shadow-2xl">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-indigo-600 text-white text-3xl mb-6 shadow-xl shadow-indigo-500/20">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900">Nexus<span class="text-indigo-600">CRM</span></h1>
            <p class="text-slate-500 mt-2 mb-8 font-medium">Enterprise Identity Management</p>
            
            <div class="space-y-4">
                <input type="password" id="sys-pin" maxlength="4" placeholder="Security PIN" 
                    class="w-full p-5 rounded-2xl bg-slate-100 border-2 border-transparent focus:border-indigo-500 outline-none text-center text-2xl font-bold tracking-[0.5em] transition-all">
                <button onclick="System.auth()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg">INITIALIZE SESSION</button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs mt-4 font-semibold hidden">Unauthorized Access Attempt</p>
        </div>
    </div>

    <div id="app-shell" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex-shrink-0">
            <div class="hidden md:flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs">
                    <i class="fas fa-cube"></i>
                </div>
                <span class="font-black text-xl tracking-tight">Nexus</span>
            </div>

            <nav class="flex md:flex-col gap-2 overflow-x-auto no-scrollbar">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500 transition-all active-link">
                    <i class="fas fa-chart-pie"></i> <span class="hidden md:inline">Dashboard</span>
                </button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500 transition-all">
                    <i class="fas fa-users"></i> <span class="hidden md:inline">Pipeline</span>
                </button>
                <button onclick="UI.navigate('settings')" id="btn-settings" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500 transition-all">
                    <i class="fas fa-cog"></i> <span class="hidden md:inline">Settings</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
            
            <header class="flex justify-between items-end mb-10">
                <div>
                    <h2 id="view-title" class="text-4xl font-black text-slate-900 tracking-tight">Executive Overview</h2>
                    <p class="text-slate-500 font-medium mt-1">Operational Intel & Real-time Metrics</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center text-slate-600 hover:text-indigo-600 transition-colors">
                        <i id="sync-icon" class="fas fa-sync-alt"></i>
                    </button>
                    <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 flex items-center gap-2 active:scale-95 transition-all">
                        <i class="fas fa-plus"></i> <span class="hidden sm:inline">Add Lead</span>
                    </button>
                </div>
            </header>

            <section id="view-dashboard" class="space-y-8 animate-in fade-in duration-500">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-panel p-8 rounded-[2rem]">
                        <p class="text-[11px] font-black text-indigo-500 uppercase tracking-widest">Active Pipeline</p>
                        <h3 id="meta-total" class="text-4xl font-black mt-2">0</h3>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem]">
                        <p class="text-[11px] font-black text-emerald-500 uppercase tracking-widest">Closed Revenue</p>
                        <h3 id="meta-revenue" class="text-4xl font-black mt-2">₹0</h3>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem] bg-indigo-600 text-white border-none">
                        <p class="text-[11px] font-black opacity-70 uppercase tracking-widest">Lead Velocity</p>
                        <h3 id="meta-rate" class="text-4xl font-black mt-2">0%</h3>
                    </div>
                </div>

                <div class="flex items-center justify-between mt-10">
                    <h4 class="text-xl font-bold">Priority Follow-ups</h4>
                    <div class="flex gap-2">
                        <label class="cursor-pointer text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg hover:bg-indigo-100 transition">
                            <i class="fas fa-file-import mr-1"></i> BULK IMPORT
                            <input type="file" id="bulk-file" accept=".csv" class="hidden" onchange="System.importCSV(event)">
                        </label>
                    </div>
                </div>
                <div id="priority-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <div class="relative">
                    <i class="fas fa-search absolute left-5 top-5 text-slate-400"></i>
                    <input type="text" id="lead-search" oninput="UI.search()" placeholder="Filter by name, phone or intent..." 
                        class="w-full p-5 pl-14 rounded-3xl bg-white border border-slate-200 outline-none focus:ring-4 ring-indigo-50 shadow-sm">
                </div>
                <div id="full-pipeline" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">Lead Intelligence</h2>
                <button onclick="UI.modal('close')" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times text-slate-400"></i></button>
            </div>
            
            <form id="core-form" class="space-y-6">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                        <input type="text" id="entry-name" placeholder="Contact Name" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-indigo-500" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Communication</label>
                        <input type="tel" id="entry-phone" placeholder="Mobile Number" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 ring-indigo-500" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Business Stage</label>
                        <select id="entry-status" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none font-bold">
                            <option value="Prospect">Prospect</option>
                            <option value="Qualified">Qualified</option>
                            <option value="Proposal">Proposal</option>
                            <option value="Closed Won">Closed Won</option>
                            <option value="Closed Lost">Closed Lost</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Deal Value</label>
                        <input type="number" id="entry-value" placeholder="₹ Value" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none font-bold">
                    </div>
                </div>

                <div id="edit-only-zone" class="hidden space-y-4 border-t pt-6">
                    <h4 class="text-sm font-black text-indigo-600 uppercase tracking-widest">History Log</h4>
                    <div id="history-stream" class="space-y-3 max-h-40 overflow-y-auto pr-2 no-scrollbar"></div>
                    <textarea id="entry-note" placeholder="Add latest interaction notes..." class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none" rows="3"></textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-indigo-200 active:scale-95 transition-all">COMMIT TO PIPELINE</button>
            </form>
        </div>
    </div>

    <script>
        /**
         * System Core: Namespace based architecture
         * Senior developers use namespaces to avoid variable collision.
         */
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],

            auth: () => {
                const input = document.getElementById('sys-pin').value;
                if(input === System.PIN) {
                    document.getElementById('auth-gateway').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';
                    System.sync();
                } else {
                    document.getElementById('auth-error').classList.remove('hidden');
                }
            },

            sync: async () => {
                const icon = document.getElementById('sync-icon');
                icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } catch (e) {
                    console.error("System Sync Failure", e);
                } finally {
                    icon.classList.remove('fa-spin');
                }
            },

            importCSV: async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const rows = ev.target.result.split('\n').slice(1);
                    const batch = rows.map(r => {
                        const c = r.split(',');
                        if(c.length < 2) return null;
                        return { id: "NX"+Date.now()+Math.random(), name: c[0].trim(), phone: c[1].trim(), status: 'Prospect', value: 0, history: "[]" };
                    }).filter(x => x);
                    
                    if(batch.length) {
                        UI.notify(`Deploying ${batch.length} leads...`);
                        await fetch(System.API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: batch}) });
                        System.sync();
                    }
                };
                reader.readAsText(file);
            }
        };

        const UI = {
            navigate: (view) => {
                ['dashboard', 'leads'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
                ['dashboard', 'leads', 'settings'].forEach(b => document.getElementById(`btn-${b}`).classList.remove('active-link'));
                
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.getElementById(`btn-${view}`).classList.add('active-link');
                document.getElementById('view-title').innerText = view.charAt(0).toUpperCase() + view.slice(1) + " Management";
            },

            modal: (action, id = null) => {
                const m = document.getElementById('lead-modal');
                const form = document.getElementById('core-form');
                const hZone = document.getElementById('edit-only-zone');
                
                if(action === 'open') {
                    m.classList.remove('hidden');
                    if(id) {
                        const lead = System.Data.find(l => l.id === id);
                        document.getElementById('entry-id').value = lead.id;
                        document.getElementById('entry-name').value = lead.name;
                        document.getElementById('entry-phone').value = lead.phone;
                        document.getElementById('entry-status').value = lead.status;
                        document.getElementById('entry-value').value = lead.value;
                        hZone.classList.remove('hidden');
                        const h = JSON.parse(lead.history || "[]");
                        document.getElementById('history-stream').innerHTML = h.map(item => `
                            <div class="p-3 bg-white rounded-xl border border-slate-100 text-[11px] shadow-sm">
                                <b class="text-indigo-600">${item.date}</b><br>${item.note}
                            </div>
                        `).join('');
                    } else {
                        form.reset();
                        document.getElementById('entry-id').value = '';
                        hZone.classList.add('hidden');
                    }
                } else {
                    m.classList.add('hidden');
                }
            },

            renderAll: () => {
                const total = System.Data.length;
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                const rate = Math.round((System.Data.filter(l => l.status === 'Closed Won').length / (total || 1)) * 100);

                document.getElementById('meta-total').innerText = total;
                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-rate').innerText = rate + "%";

                const template = (l) => `
                    <div class="glass-panel p-6 rounded-3xl lead-card flex justify-between items-center">
                        <div onclick="UI.modal('open', '${l.id}')" class="cursor-pointer">
                            <h5 class="font-bold text-slate-800">${l.name}</h5>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] font-black uppercase px-2 py-1 bg-slate-100 rounded-md text-slate-500">${l.status}</span>
                                <span class="text-[10px] font-bold text-indigo-600 tracking-tighter">₹${Number(l.value).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:bg-indigo-50 hover:text-indigo-600 transition-all"><i class="fas fa-phone-alt text-xs"></i></a>
                            <a href="https://wa.me/91${l.phone}" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center shadow-sm"><i class="fab fa-whatsapp text-sm"></i></a>
                        </div>
                    </div>
                `;

                document.getElementById('priority-grid').innerHTML = System.Data.slice().reverse().slice(0, 4).map(template).join('');
                document.getElementById('full-pipeline').innerHTML = System.Data.map(template).join('');
            },

            notify: (msg) => {
                alert(msg); // Enterprise apps use custom toasts, keeping it simple for now.
            },

            search: () => {
                const q = document.getElementById('lead-search').value.toLowerCase();
                const filtered = System.Data.filter(l => l.name.toLowerCase().includes(q) || l.phone.includes(q));
                document.getElementById('full-pipeline').innerHTML = filtered.map(l => `
                    <div class="glass-panel p-6 rounded-3xl flex justify-between items-center mb-3">
                        <div onclick="UI.modal('open', '${l.id}')" class="cursor-pointer">
                            <h5 class="font-bold text-slate-800">${l.name}</h5>
                            <p class="text-xs text-slate-400">${l.phone}</p>
                        </div>
                        <span class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">${l.status}</span>
                    </div>
                `).join('');
            }
        };

        // EVENT LISTENERS
        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.get
