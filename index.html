<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna CRM | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .login-screen { position: fixed; inset: 0; z-index: 1000; background: #0b0f1a; display: flex; align-items: center; justify-content: center; }
        .card-stat { cursor: pointer; transition: 0.3s; }
        .card-stat:hover { transform: translateY(-5px); background: rgba(59, 130, 246, 0.1); }
        .active-filter { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="login-screen">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center border border-white/10 shadow-2xl">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl shadow-lg shadow-blue-600/30">
                <i class="fas fa-lock text-white"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">Secure <span class="text-blue-500">Login</span></h2>
            <p class="text-gray-500 text-sm mb-8">Enter your access key to manage leads</p>
            
            <input type="password" id="passKey" placeholder="Enter Password" class="w-full bg-slate-800/50 p-5 rounded-2xl outline-none border border-white/5 focus:border-blue-500 text-center text-xl tracking-widest mb-4">
            
            <button onclick="checkLogin()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-white hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/20">ACCESS DASHBOARD</button>
            <p id="errorMsg" class="text-red-500 text-xs mt-4 hidden">Invalid Password! Try again.</p>
        </div>
    </div>

    <div id="crmContent" class="hidden">
        <nav class="glass rounded-2xl p-2 mb-8 flex items-center justify-between">
            <div class="flex items-center">
                <div class="bg-blue-600 h-10 w-10 rounded-xl flex items-center justify-center font-bold mr-4">KR</div>
                <span class="font-bold text-xs uppercase tracking-widest">Workspace Live</span>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold text-xs px-4 py-2 hover:bg-red-500/10 rounded-xl transition-all">LOGOUT</button>
        </nav>

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Sales <span class="text-blue-500">Dashboard</span></h1>
            <button onclick="toggleModal()" class="bg-blue-600 px-6 py-3 rounded-2xl text-xs font-black">+ NEW LEAD</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div onclick="filterLeads('All')" id="card-All" class="glass p-6 rounded-[2rem] card-stat active-filter">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-2">Total Pipeline</p>
                <h2 id="total-leads" class="text-4xl font-black">0</h2>
            </div>
            <div onclick="filterLeads('New')" id="card-New" class="glass p-6 rounded-[2rem] card-stat">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-2">New</p>
                <h2 id="new-leads" class="text-4xl font-black text-blue-400">0</h2>
            </div>
            <div onclick="filterLeads('Interested')" id="card-Interested" class="glass p-6 rounded-[2rem] card-stat">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-2">Interested</p>
                <h2 id="interested-leads" class="text-4xl font-black text-orange-400">0</h2>
            </div>
            <div onclick="filterLeads('Closed')" id="card-Closed" class="glass p-6 rounded-[2rem] card-stat">
                <p class="text-gray-500 text-[10px] font-black uppercase mb-2">Closed</p>
                <h2 id="closed-leads" class="text-4xl font-black text-green-500">0</h2>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between">
                <h3 id="table-title" class="font-bold text-gray-300">All Leads</h3>
                <div id="loader" class="hidden text-blue-500 animate-spin"><i class="fas fa-spinner"></i></div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] font-black text-gray-500 uppercase tracking-widest">
                        <tr><th class="p-5">Client</th><th class="p-5">Stage</th><th class="p-5 text-center">Chat</th></tr>
                    </thead>
                    <tbody id="lead-list" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[500] backdrop-blur-md">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem]">
            <h2 class="text-2xl font-black mb-6">New <span class="text-blue-500">Entry</span></h2>
            <form id="leadForm" class="space-y-4">
                <input type="text" id="name" placeholder="Name" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none" required>
                <input type="text" id="phone" placeholder="Phone" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none" required>
                <select id="status" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none">
                    <option value="New">New</option><option value="Interested">Interested</option><option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-blue-600 p-4 rounded-2xl font-black">SAVE TO SHEET</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-500 font-bold py-2">Close</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const MASTER_PASSWORD = "123"; // Yahan apna password set karo
        let allLeadsData = [];

        // --- LOGIN LOGIC ---
        function checkLogin() {
            const input = document.getElementById('passKey').value;
            if(input === MASTER_PASSWORD) {
                localStorage.setItem('crmLoggedIn', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('crmContent').classList.remove('hidden');
            fetchLeads();
        }

        function logout() {
            localStorage.removeItem('crmLoggedIn');
            location.reload();
        }

        // Check session on load
        window.onload = () => {
            if(localStorage.getItem('crmLoggedIn') === 'true') {
                showDashboard();
            }
        };

        // --- CRM LOGIC ---
        function toggleModal() { document.getElementById('leadModal').classList.toggle('hidden'); }

        async function fetchLeads() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const response = await fetch(API_URL);
                allLeadsData = await response.json();
                updateStats();
                filterLeads('All');
            } catch (e) { console.error(e); }
            document.getElementById('loader').classList.add('hidden');
        }

        function updateStats() {
            document.getElementById('total-leads').innerText = allLeadsData.length;
            document.getElementById('new-leads').innerText = allLeadsData.filter(l => l.status === 'New').length;
            document.getElementById('interested-leads').innerText = allLeadsData.filter(l => l.status === 'Interested').length;
            document.getElementById('closed-leads').innerText = allLeadsData.filter(l => l.status === 'Closed').length;
        }

        function filterLeads(status) {
            const list = document.getElementById('lead-list');
            list.innerHTML = '';
            document.querySelectorAll('.card-stat').forEach(c => c.classList.remove('active-filter'));
            document.getElementById('card-' + status).classList.add('active-filter');

            const filtered = status === 'All' ? allLeadsData : allLeadsData.filter(l => l.status === status);
            filtered.reverse().forEach(l => {
                list.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-5 font-bold">${l.name}<div class="text-[10px] text-gray-500 font-normal">${l.phone}</div></td>
                        <td class="p-5 text-xs">${l.status}</td>
                        <td class="p-5 text-center"><a href="https://wa.me/91${l.phone}" class="text-green-500"><i class="fab fa-whatsapp"></i></a></td>
                    </tr>`;
            });
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            const newLead = { data: [{ id: Date.now(), name: document.getElementById('name').value, phone: document.getElementById('phone').value, status: document.getElementById('status').value }] };
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newLead) });
            toggleModal(); document.getElementById('leadForm').reset(); fetchLeads();
            btn.innerText = "SAVE TO SHEET"; btn.disabled = false;
        });
    </script>
</body>
</html>
