<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro CRM | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        body.light-mode { background-color: #f0f4f1; color: #1a2e21; }
        body.dark-mode { background-color: #0a0f0b; color: #e8f5e9; }
        .glass-card { border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .glass-card { background: #141d16; border-color: #1e2e22; }
        .light-mode .glass-card { background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .nav-active { color: #1e6b3e !important; transform: translateY(-3px); }
        .hidden-page { display: none; }
        .priority-high { border-left: 5px solid #ef4444 !important; }
        .priority-medium { border-left: 5px solid #f59e0b !important; }
        .priority-low { border-left: 5px solid #3b82f6 !important; }
    </style>
</head>
<body class="light-mode pb-24 transition-all duration-500">

    <div id="page-dashboard" class="p-4 max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-[#1e6b3e] p-5 rounded-[2rem] text-white shadow-xl">
            <div>
                <h1 class="font-black text-xl">LeadFlow Pro</h1>
                <p class="text-[9px] opacity-80 tracking-[3px] uppercase">Advanced CRM System</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleTheme()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i id="theme-icon" class="fas fa-moon"></i></button>
                <button onclick="fetchLeads()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="glass-card p-6 bg-gradient-to-br from-green-500 to-green-700 text-white border-none">
                <p class="text-xs font-bold opacity-80">EXPECTED REVENUE</p>
                <h2 id="total-revenue" class="text-3xl font-black">₹0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-red-500">
                <p class="text-[10px] font-bold opacity-50 uppercase">Overdue Actions</p>
                <h2 id="s-over" class="text-3xl font-black text-red-500">0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-blue-500">
                <p class="text-[10px] font-bold opacity-50 uppercase">Total Leads</p>
                <h2 id="total-count" class="text-3xl font-black text-blue-500">0</h2>
            </div>
        </div>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterLeads('All')" class="bg-white dark:bg-white/5 px-4 py-2 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap">All</button>
            <button onclick="filterLeads('Interested')" class="bg-purple-100 text-purple-700 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap">Interested 🔥</button>
            <button onclick="filterLeads('Converted')" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap">Converted 💰</button>
            <button onclick="filterLeads('New')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap">New Leads</button>
        </div>

        <div id="main-list" class="grid gap-4">
            </div>
    </div>

    <div id="page-calling" class="p-4 max-w-5xl mx-auto hidden-page">
        <h2 class="text-2xl font-black mb-6 mt-4 flex items-center gap-2">
            <i class="fas fa-headset text-[#1e6b3e]"></i> Smart Dialer
        </h2>
        
        <div id="calling-ui" class="glass-card p-8 text-center min-h-[500px] flex flex-col justify-center items-center shadow-2xl">
            <div id="active-call-content" class="w-full">
                <div id="prio-tag" class="inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4"></div>
                <h3 id="call-name" class="text-4xl font-black mb-2">Rahul Kumar</h3>
                <p id="call-business" class="text-sm opacity-60 mb-1 font-bold text-[#1e6b3e]">ABC Enterprises</p>
                <p id="call-location" class="text-xs opacity-50 mb-6"><i class="fas fa-map-marker-alt"></i> Bhopal, MP</p>
                
                <div class="flex justify-center gap-6 mb-8">
                    <a id="call-link" href="#" class="h-20 w-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-3xl shadow-xl hover:scale-110 transition-all"><i class="fas fa-phone"></i></a>
                    <a id="wa-link" href="#" class="h-20 w-20 bg-[#25D366] text-white rounded-[2rem] flex items-center justify-center text-3xl shadow-xl hover:scale-110 transition-all"><i class="fab fa-whatsapp"></i></a>
                </div>

                <div class="w-full max-w-md mx-auto grid gap-4 bg-gray-50 dark:bg-black/40 p-6 rounded-[2rem]">
                    <div class="text-left">
                        <label class="text-[10px] font-black opacity-40 uppercase ml-2">Interaction Notes</label>
                        <textarea id="call-notes" placeholder="Client ne kya bola..." class="w-full p-4 mt-1 rounded-2xl bg-white dark:bg-black border border-gray-100 dark:border-white/5 outline-none text-sm h-24"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="call-status" class="p-4 rounded-2xl bg-white dark:bg-black border border-gray-100 dark:border-white/5 outline-none font-bold text-xs">
                            <option value="New">New</option>
                            <option value="Interested">Interested</option>
                            <option value="Follow-up">Follow-up</option>
                            <option value="Converted">Converted 💰</option>
                            <option value="Lost">Closed/Lost</option>
                        </select>
                        <input type="date" id="call-fdate" class="p-4 rounded-2xl bg-white dark:bg-black border border-gray-100 dark:border-white/5 outline-none font-bold text-xs">
                    </div>
                    <button onclick="submitCallUpdate()" class="w-full bg-[#1e6b3e] text-white p-5 rounded-2xl font-black shadow-lg shadow-green-900/20">SAVE & NEXT CLIENT</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-[#141d16] border-t border-gray-100 dark:border-white/5 flex justify-around p-4 shadow-2xl z-[500]">
        <button onclick="switchPage('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1 opacity-50 nav-active">
            <i class="fas fa-chart-pie text-xl"></i><span class="text-[9px] font-bold">PIPELINE</span>
        </button>
        <button onclick="toggleModal('add')" class="flex flex-col items-center -mt-10 bg-[#1e6b3e] h-14 w-14 rounded-full text-white justify-center shadow-xl border-4 border-white dark:border-[#0a0f0b]">
            <i class="fas fa-plus"></i>
        </button>
        <button onclick="switchPage('calling')" id="nav-calling" class="flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-headset text-xl"></i><span class="text-[9px] font-bold">CALLING</span>
        </button>
    </nav>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[1000]">
        <div class="bg-white dark:bg-[#141d16] w-full max-w-lg p-8 rounded-[2.5rem] shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 id="modalTitle" class="text-2xl font-black mb-6 text-[#1e6b3e]">Add Comprehensive Lead</h2>
            <form id="leadForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="name" placeholder="Client Name" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none w-full" required>
                    <input type="text" id="phone" placeholder="Phone Number" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="email" id="email" placeholder="Email Address" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none w-full">
                    <input type="text" id="business" placeholder="Business/Company" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none w-full">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="source" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none">
                        <option value="Instagram">Instagram</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Referral">Referral</option>
                        <option value="Website">Website</option>
                    </select>
                    <select id="priority" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none font-bold">
                        <option value="High">🔥 High Priority</option>
                        <option value="Medium">⚡ Medium</option>
                        <option value="Low">❄️ Low</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="dealValue" placeholder="Deal Value (₹)" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none">
                    <input type="date" id="fDate" class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none">
                </div>
                <textarea id="notes" placeholder="Initial Notes/Conversation..." class="p-4 rounded-xl bg-gray-50 dark:bg-black outline-none w-full h-20"></textarea>
                
                <div class="flex gap-3">
                    <button type="submit" id="saveBtn" class="flex-1 bg-[#1e6b3e] text-white p-5 rounded-2xl font-black">SYNC TO CLOUD</button>
                    <button type="button" onclick="toggleModal()" class="px-6 bg-gray-100 dark:bg-white/5 rounded-2xl font-bold">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let leads = [];
        let currentCallingLead = null;

        async function fetchLeads() {
            const res = await fetch(API);
            leads = await res.json();
            updateStats();
            renderLeads('All');
            setupNextCall();
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            let stats = { revenue: 0, overdue: 0 };
            leads.forEach(l => {
                if(l.dealValue) stats.revenue += parseInt(l.dealValue);
                if(l.followUpDate < today && l.status !== 'Converted' && l.status !== 'Lost') stats.overdue++;
            });
            document.getElementById('total-revenue').innerText = "₹" + stats.revenue.toLocaleString();
            document.getElementById('s-over').innerText = stats.overdue;
            document.getElementById('total-count').innerText = leads.length;
        }

        function renderLeads(filter) {
            const list = document.getElementById('main-list');
            list.innerHTML = '';
            let filtered = filter === 'All' ? leads : leads.filter(l => l.status === filter);
            
            filtered.slice().reverse().forEach(l => {
                const pClass = `priority-${l.priority?.toLowerCase() || 'low'}`;
                list.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center ${pClass}" onclick="openEditModal('${l.id}')">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <h4 class="font-bold text-base">${l.name}</h4>
                                <span class="text-[8px] font-black px-2 py-0.5 bg-gray-100 dark:bg-white/5 rounded uppercase">${l.priority}</span>
                            </div>
                            <p class="text-[10px] opacity-60 font-bold mt-1">
                                <i class="fas fa-bullseye text-[#1e6b3e]"></i> ${l.source || 'Direct'} • 
                                <i class="far fa-calendar-alt ml-2"></i> ${l.followUpDate || 'No Date'}
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-[#1e6b3e]">₹${l.dealValue || 0}</p>
                            <p class="text-[9px] font-bold opacity-40 uppercase">${l.status}</p>
                        </div>
                    </div>`;
            });
        }

        function setupNextCall() {
            const today = new Date().toISOString().split('T')[0];
            const pending = leads.filter(l => l.status !== 'Converted' && l.status !== 'Lost');
            
            if(pending.length > 0) {
                currentCallingLead = pending[0];
                document.getElementById('call-name').innerText = currentCallingLead.name;
                document.getElementById('call-business').innerText = currentCallingLead.business || "No Company Data";
                document.getElementById('call-notes').value = currentCallingLead.notes || "";
                document.getElementById('call-fdate').value = currentCallingLead.followUpDate || "";
                document.getElementById('call-status').value = currentCallingLead.status;
                document.getElementById('call-link').href = "tel:" + currentCallingLead.phone;
                document.getElementById('wa-link').href = "https://wa.me/91" + currentCallingLead.phone;
                
                const pTag = document.getElementById('prio-tag');
                pTag.innerText = currentCallingLead.priority + " Priority";
                pTag.className = `inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 priority-${currentCallingLead.priority?.toLowerCase()}`;
            }
        }

        async function submitCallUpdate() {
            const btn = event.target;
            const updateData = {
                status: document.getElementById('call-status').value,
                followUpDate: document.getElementById('call-fdate').value,
                notes: document.getElementById('call-notes').value
            };
            
            btn.innerText = "SYNCING...";
            await fetch(`${API}/id/${currentCallingLead.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: updateData })
            });
            fetchLeads();
            btn.innerText = "SAVE & NEXT CLIENT";
        }

        function switchPage(page) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden-page'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('page-' + page).classList.remove('hidden-page');
            document.getElementById('nav-' + page).classList.add('nav-active');
        }

        function toggleModal(mode) {
            if(mode === 'add') {
                document.getElementById('editId').value = "";
                document.getElementById('leadForm').reset();
            }
            document.getElementById('leadModal').classList.toggle('hidden');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const data = {
                id: editId || "L" + Date.now(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                business: document.getElementById('business').value,
                source: document.getElementById('source').value,
                priority: document.getElementById('priority').value,
                dealValue: document.getElementById('dealValue').value,
                followUpDate: document.getElementById('fDate').value,
                notes: document.getElementById('notes').value,
                status: "New"
            };

            if(editId) {
                await fetch(`${API}/id/${editId}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data}) });
            } else {
                await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data: [data]}) });
            }
            toggleModal(); fetchLeads();
        });

        window.onload = fetchLeads;
    </script>
</body>
</html>
