<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; transition: 0.4s; min-height: 100vh; }
        .active-view { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <div id="login-screen" class="fixed inset-0 z-[9999] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-2xl font-black mb-6">NEXUS v4</h1>
            <input type="password" id="pin" maxlength="4" placeholder="PIN" oninput="if(this.value==='1321') startApp()" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-3xl font-bold tracking-widest outline-none">
        </div>
    </div>

    <div id="app" class="hidden">
        
        <header class="p-5 glass sticky top-0 z-50 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-4">
                <button id="back-btn" onclick="showDashboard()" class="hidden w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600"><i class="fas fa-chevron-left"></i></button>
                <h2 id="view-title" class="text-xl font-black">Dashboard</h2>
            </div>
            <button onclick="syncData()" class="w-10 h-10 rounded-xl bg-indigo-600 text-white"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
        </header>

        <main class="p-5">
            <div id="view-dash" class="view-container active-view space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[2rem] border-b-4 border-indigo-500 shadow-sm">
                        <p class="text-[10px] font-black opacity-40 uppercase">Revenue</p>
                        <h3 id="stat-rev" class="text-xl font-black">₹0</h3>
                    </div>
                    <div onclick="showList('all', 'All Leads')" class="bg-white p-6 rounded-[2rem] border-b-4 border-emerald-500 shadow-sm cursor-pointer">
                        <p class="text-[10px] font-black opacity-40 uppercase">Total Leads</p>
                        <h3 id="stat-total" class="text-xl font-black">0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="showList('today', 'Today\'s Task')" class="bg-white p-6 rounded-[2rem] border-l-4 border-orange-500 shadow-sm cursor-pointer active:scale-95 transition">
                        <h3 id="stat-today" class="text-2xl font-black text-orange-600">0</h3>
                        <p class="text-[10px] font-black opacity-40">TODAY</p>
                    </div>
                    <div onclick="showList('overdue', 'Overdue')" class="bg-white p-6 rounded-[2rem] border-l-4 border-red-500 shadow-sm cursor-pointer active:scale-95 transition">
                        <h3 id="stat-over" class="text-2xl font-black text-red-600">0</h3>
                        <p class="text-[10px] font-black opacity-40">OVERDUE</p>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-3xl flex gap-3 justify-center shadow-sm">
                    <button onclick="exportCSV()" class="text-[10px] font-black bg-emerald-50 text-emerald-600 px-5 py-3 rounded-xl"><i class="fas fa-download mr-1"></i> EXPORT</button>
                    <label class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-5 py-3 rounded-xl cursor-pointer">
                        <i class="fas fa-upload mr-1"></i> IMPORT <input type="file" hidden onchange="importCSV(this)">
                    </label>
                </div>

                <div id="recent-box" class="space-y-3"></div>
            </div>

            <div id="view-list" class="view-container hidden space-y-3"></div>

            <div id="view-settings" class="view-container hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <h4 class="font-black mb-4">Appearance</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="changeBg('#f1f5f9')" class="p-4 bg-slate-100 rounded-xl font-bold text-xs">Light Grey</button>
                        <button onclick="changeBg('#e2e8f0')" class="p-4 bg-slate-200 rounded-xl font-bold text-xs">Steel</button>
                        <button onclick="document.body.style.background='#0f172a'; document.body.style.color='white'" class="p-4 bg-slate-900 text-white rounded-xl font-bold text-xs">Dark Mode</button>
                        <button onclick="location.reload()" class="p-4 bg-red-50 text-red-600 rounded-xl font-bold text-xs">Reset All</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4 z-50">
            <button onclick="showDashboard()" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-home"></i><span class="text-[9px] font-bold">HOME</span></button>
            <button onclick="showList('all', 'All Leads')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-users"></i><span class="text-[9px] font-bold">LEADS</span></button>
            <button onclick="openModal()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl -mt-10 shadow-lg flex items-center justify-center border-4 border-white"><i class="fas fa-plus"></i></button>
            <button onclick="showList('won', 'Closed Won')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-award"></i><span class="text-[9px] font-bold">WON</span></button>
            <button onclick="showSettings()" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-cog"></i><span class="text-[9px] font-bold">SETTINGS</span></button>
        </nav>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[6000] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-6"><h2 class="text-xl font-black">Lead Details</h2><button onclick="closeModal()"><i class="fas fa-times-circle text-slate-300 text-2xl"></i></button></div>
            <form onsubmit="saveData(event)" class="space-y-4">
                <input type="hidden" id="f-id">
                <input type="text" id="f-name" placeholder="Name" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none" required>
                <input type="tel" id="f-phone" placeholder="Phone" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="p-4 bg-slate-50 rounded-xl font-bold outline-none"><option value="Prospect">Prospect</option><option value="Closed Won">Closed Won</option></select>
                    <input type="number" id="f-value" placeholder="Value ₹" class="p-4 bg-slate-50 rounded-xl font-bold outline-none">
                </div>
                <input type="date" id="f-date" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg">SAVE</button>
                    <button type="button" id="del-btn" onclick="deleteEntry()" class="hidden bg-red-50 text-red-600 px-6 rounded-xl font-black"><i class="fas fa-trash"></i></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let masterData = [];

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            syncData();
        }

        async function syncData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(API);
                masterData = await res.json();
                renderStats();
                showDashboard();
            } catch(e) { alert("Sync Failed!"); }
            icon.classList.remove('fa-spin');
        }

        function renderStats() {
            const today = new Date().toISOString().split('T')[0];
            const rev = masterData.filter(l => l.status === 'Closed Won').reduce((a, b) => a + Number(b.value || 0), 0);
            document.getElementById('stat-rev').innerText = "₹" + rev.toLocaleString();
            document.getElementById('stat-total').innerText = masterData.length;
            document.getElementById('stat-today').innerText = masterData.filter(l => l.followup === today).length;
            document.getElementById('stat-over').innerText = masterData.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won').length;
            document.getElementById('recent-box').innerHTML = '<p class="text-[10px] font-black opacity-30 uppercase tracking-widest px-2">Recently Added</p>' + createCards(masterData.slice(-3).reverse());
        }

        function showDashboard() {
            hideAll();
            document.getElementById('view-dash').classList.add('active-view');
            document.getElementById('view-title').innerText = "Dashboard";
            document.getElementById('back-btn').classList.add('hidden');
        }

        function showList(filterType, title) {
            hideAll();
            document.getElementById('view-list').classList.add('active-view');
            document.getElementById('view-title').innerText = title;
            document.getElementById('back-btn').classList.remove('hidden');
            
            const today = new Date().toISOString().split('T')[0];
            let data = masterData;
            if(filterType === 'today') data = masterData.filter(l => l.followup === today);
            if(filterType === 'overdue') data = masterData.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won');
            if(filterType === 'won') data = masterData.filter(l => l.status === 'Closed Won');
            
            document.getElementById('view-list').innerHTML = createCards(data.slice().reverse());
        }

        function showSettings() {
            hideAll();
            document.getElementById('view-settings').classList.add('active-view');
            document.getElementById('view-title').innerText = "Settings";
            document.getElementById('back-btn').classList.remove('hidden');
        }

        function hideAll() {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active-view', 'hidden'));
            document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
        }

        function createCards(data) {
            if(!data.length) return '<div class="p-10 text-center opacity-30 font-bold">No Records found.</div>';
            return data.map(l => `
                <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div onclick="openModal('${l.id}')" class="flex-1 cursor-pointer">
                        <h4 class="font-bold text-slate-800">${l.name}</h4>
                        <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">${l.status} • ₹${l.value || 0}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${l.phone}" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                        <a href="https://wa.me/91${l.phone}" class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('');
        }

        async function saveData(e) {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const lead = { id: id || Date.now().toString(), name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, status: document.getElementById('f-status').value, value: document.getElementById('f-value').value, followup: document.getElementById('f-date').value };
            closeModal();
            await fetch(id ? `${API}/id/${id}` : API, { method: id ? 'PATCH' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? lead : [lead]}) });
            syncData();
        }

        async function deleteEntry() {
            const id = document.getElementById('f-id').value;
            if(confirm("Delete this?")) {
                closeModal();
                await fetch(`${API}/id/${id}`, { method: 'DELETE' });
                syncData();
            }
        }

        function openModal(id = null) {
            document.getElementById('modal').classList.remove('hidden');
            const dBtn = document.getElementById('del-btn');
            if(id) {
                const l = masterData.find(x => x.id == id);
                document.getElementById('f-id').value = l.id;
                document.getElementById('f-name').value = l.name;
                document.getElementById('f-phone').value = l.phone;
                document.getElementById('f-status').value = l.status;
                document.getElementById('f-value').value = l.value;
                document.getElementById('f-date').value = l.followup;
                dBtn.classList.remove('hidden');
            } else { document.querySelector('form').reset(); document.getElementById('f-id').value = ''; dBtn.classList.add('hidden'); }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function changeBg(color) { document.body.style.background = color; }

        function exportCSV() {
            const head = "id,name,phone,status,value,followup\n";
            const rows = masterData.map(l => `${l.id},${l.name},${l.phone},${l.status},${l.value},${l.followup}`).join("\n");
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([head + rows], {type:'text/csv'}));
            a.download = "Nexus_Data.csv";
            a.click();
        }

        function importCSV(el) {
            const r = new FileReader();
            r.onload = async (e) => {
                const rows = e.target.result.split("\n").slice(1).map(row => {
                    const v = row.split(",");
                    return { id: v[0], name: v[1], phone: v[2], status: v[3], value: v[4], followup: v[5] };
                });
                await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data}) });
                syncData();
            };
            r.readAsText(el.files[0]);
        }
    </script>
</body>
</html>
