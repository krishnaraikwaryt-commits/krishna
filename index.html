<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        body.light-mode { background-color: #f0f4f1; color: #1a2e21; }
        body.dark-mode { background-color: #0a0f0b; color: #e8f5e9; }
        .glass-card { border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .light-mode .glass-card { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .dark-mode .glass-card { background: #141d16; border-color: #1e2e22; }
        .lead-done { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
    </style>
</head>
<body class="light-mode p-3 md:p-6 transition-all duration-500">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-[#1e6b3e] p-5 rounded-[2rem] shadow-xl text-white">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 h-12 w-12 rounded-2xl flex items-center justify-center backdrop-blur-md">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tight">LeadFlow</h1>
                    <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest text-white">Krishna Raikwar</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i id="theme-icon" class="fas fa-moon"></i></button>
                <button onclick="fetchLeads()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-5"><p class="text-[10px] font-bold opacity-50 uppercase">New</p><h2 id="s-new" class="text-3xl font-black text-blue-500">0</h2></div>
            <div class="glass-card p-5"><p class="text-[10px] font-bold opacity-50 uppercase">Contacted</p><h2 id="s-cont" class="text-3xl font-black text-orange-500">0</h2></div>
            <div class="glass-card p-5 border-b-4 border-red-500"><p class="text-[10px] font-bold text-red-500 uppercase">Overdue</p><h2 id="s-over" class="text-3xl font-black text-red-500">0</h2></div>
            <div class="glass-card p-5 border-b-4 border-[#1e6b3e]"><p class="text-[10px] font-bold text-[#1e6b3e] uppercase">Won</p><h2 id="s-won" class="text-3xl font-black text-[#1e6b3e]">0</h2></div>
        </div>

        <div class="glass-card p-6 mb-8"><canvas id="pipelineChart" height="100"></canvas></div>

        <div id="overdue-container" class="hidden mb-8">
            <h3 class="text-red-500 font-bold uppercase text-xs mb-4 ml-2"><i class="fas fa-exclamation-circle"></i> Action Required</h3>
            <div id="overdue-list" class="grid gap-3"></div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold opacity-50 text-xs uppercase tracking-widest">Active Pipeline</h3>
            <button onclick="toggleModal('add')" class="bg-[#1e6b3e] text-white px-4 py-2 rounded-xl text-[10px] font-bold">+ ADD LEAD</button>
        </div>
        <div id="main-list" class="grid gap-4 mb-24"></div>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white dark:bg-[#141d16] w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black mb-6 text-[#1e6b3e]">Edit Lead</h2>
            <form id="leadForm" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="name" placeholder="Name" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                <input type="text" id="phone" placeholder="WhatsApp" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                <div>
                    <label class="text-[10px] font-bold opacity-40 ml-2 uppercase">Update Follow-up Date</label>
                    <input type="date" id="fDate" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5" required>
                </div>
                <select id="status" class="w-full bg-gray-50 dark:bg-black p-4 rounded-2xl outline-none border border-gray-100 dark:border-white/5">
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Interested">Interested</option>
                    <option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-[#1e6b3e] text-white p-5 rounded-2xl font-black shadow-lg">UPDATE CLOUD</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-400 font-bold py-2 text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let leads = [];
        let completed = JSON.parse(localStorage.getItem('k_done') || '[]');
        let myChart;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('k_theme', isDark ? 'dark' : 'light');
        }
        if(localStorage.getItem('k_theme') === 'dark') toggleTheme();

        async function fetchLeads() {
            const res = await fetch(API);
            leads = await res.json();
            render();
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const mainList = document.getElementById('main-list');
            const overList = document.getElementById('overdue-list');
            mainList.innerHTML = ''; overList.innerHTML = '';
            let stats = { New: 0, Contacted: 0, Interested: 0, Closed: 0, Overdue: 0 };

            leads.reverse().forEach(l => {
                const isOverdue = l.followUpDate < today && l.status !== 'Closed';
                const card = createCard(l, isOverdue);
                stats[l.status]++;
                if(isOverdue) { stats.Overdue++; overList.innerHTML += card; }
                mainList.innerHTML += card;
            });

            document.getElementById('s-new').innerText = stats.New;
            document.getElementById('s-cont').innerText = (stats.Contacted || 0) + (stats.Interested || 0);
            document.getElementById('s-over').innerText = stats.Overdue;
            document.getElementById('s-won').innerText = stats.Closed;
            document.getElementById('overdue-container').classList.toggle('hidden', stats.Overdue === 0);
            updateChart(stats);
        }

        function createCard(l, isOverdue) {
            const isDone = completed.includes(l.id);
            return `
                <div class="glass-card p-5 flex flex-col md:flex-row justify-between items-center gap-4 ${isDone ? 'lead-done' : ''} ${isOverdue ? 'border-l-4 border-red-500' : ''}">
                    <div class="flex items-center gap-4 w-full">
                        <button onclick="toggleDone('${l.id}')" class="w-10 h-10 rounded-2xl border-2 border-gray-100 flex items-center justify-center bg-gray-50 dark:bg-black">
                            ${isDone ? '<i class="fas fa-check text-green-500"></i>' : ''}
                        </button>
                        <div class="flex-1 cursor-pointer" onclick="openEditModal('${l.id}')">
                            <h4 class="font-bold text-base tracking-tight">${l.name} <i class="fas fa-pen text-[10px] ml-1 opacity-30"></i></h4>
                            <div class="flex flex-wrap items-center gap-3 mt-1 text-[10px]">
                                <span class="font-black px-2 py-0.5 bg-gray-100 dark:bg-white/5 rounded uppercase">${l.status}</span>
                                <span class="opacity-50 font-bold"><i class="fas fa-phone-alt"></i> ${l.phone}</span>
                                <span class="${isOverdue ? 'text-red-500' : 'opacity-50'} font-bold">
                                    <i class="far fa-calendar-alt"></i> ${l.followUpDate || 'No Date'}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <a href="https://wa.me/91${l.phone}" class="flex-1 bg-[#25D366] text-white px-4 py-3 rounded-2xl text-[10px] font-black text-center">WHATSAPP</a>
                        <a href="tel:${l.phone}" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-2xl text-[10px] font-black text-center">CALL</a>
                    </div>
                </div>`;
        }

        function openEditModal(id) {
            const l = leads.find(x => x.id === id);
            document.getElementById('editId').value = l.id;
            document.getElementById('name').value = l.name;
            document.getElementById('phone').value = l.phone;
            document.getElementById('fDate').value = l.followUpDate || "";
            document.getElementById('status').value = l.status;
            document.getElementById('modalTitle').innerText = "Update Lead";
            document.getElementById('saveBtn').innerText = "UPDATE CLOUD";
            toggleModal('edit');
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const editId = document.getElementById('editId').value;
            const payload = { 
                name: document.getElementById('name').value, 
                phone: document.getElementById('phone').value, 
                status: document.getElementById('status').value, 
                followUpDate: document.getElementById('fDate').value 
            };

            btn.innerText = "SYNCING...";
            
            if(editId) {
                // UPDATE EXISTING LEAD
                await fetch(`${API}/id/${editId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: payload })
                });
            } else {
                // ADD NEW LEAD
                const newLead = { ...payload, id: "K" + Date.now() };
                await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: [newLead] }) });
            }
            
            toggleModal();
            fetchLeads();
        });

        function updateChart(s) {
            const ctx = document.getElementById('pipelineChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['New', 'Contacted', 'Interested', 'Closed'],
                    datasets: [{
                        data: [s.New, s.Contacted, s.Interested, s.Closed],
                        backgroundColor: ['#3b82f6', '#f59e0b', '#a855f7', '#1e6b3e'],
                        borderRadius: 12
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function toggleDone(id) {
            completed.includes(id) ? completed = completed.filter(i => i !== id) : completed.push(id);
            localStorage.setItem('k_done', JSON.stringify(completed));
            render();
        }

        function toggleModal(mode) {
            if(mode === 'add') {
                document.getElementById('editId').value = "";
                document.getElementById('leadForm').reset();
                document.getElementById('modalTitle').innerText = "Add New Lead";
                document.getElementById('saveBtn').innerText = "SAVE TO CLOUD";
            }
            document.getElementById('leadModal').classList.toggle('hidden');
        }
        window.onload = fetchLeads;
    </script>
</body>
</html>
