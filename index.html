<script>
const System = {
    API: "https://sheetdb.io/api/v1/7skn6892hya7x",
    PIN: "1321",
    Data: [],
    Today: new Date().toISOString().split('T')[0],
    history: [],

    init: () => {
        System.setTheme(localStorage.getItem('nexus_theme') || 'default');
        if(localStorage.getItem('nexus_auth') === 'true') {
            System.launchApp();
        }
    },

    launchApp: () => {
        document.getElementById('auth-gateway').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        System.sync();
        setInterval(System.sync, 30000); // auto refresh
    },

    sync: async () => {
        UI.showLoader(true);
        try {
            const res = await fetch(System.API);
            const data = await res.json();

            console.log("API DATA:", data);

            if(Array.isArray(data)) {
                System.Data = data;
                localStorage.setItem("backup", JSON.stringify(data));
            } else {
                throw new Error("Invalid API format");
            }

        } catch (e) {
            console.error(e);
            UI.toast("Offline Mode Loaded", "error");

            const backup = localStorage.getItem("backup");
            if(backup) System.Data = JSON.parse(backup);
        }

        UI.renderAll();
        UI.showLoader(false);
    },

    generateID: () => {
        return "NX" + Date.now().toString().slice(-5) + Math.floor(Math.random()*100);
    }
};

const UI = {

    navigate: (view) => {
        System.history.push(view);

        ['dashboard','leads','clients'].forEach(v=>{
            document.getElementById(`view-${v}`).classList.add('hidden');
            document.getElementById(`btn-${v}`).classList.remove('active-link');
        });

        document.getElementById(`view-${view}`).classList.remove('hidden');
        document.getElementById(`btn-${view}`).classList.add('active-link');

        document.getElementById('back-btn').classList.toggle('visible', view !== 'dashboard');
    },

    goBack: () => {
        UI.navigate('dashboard');
    },

    renderAll: () => {
        if(!System.Data) return;

        const data = System.Data;

        const totalRevenue = data.reduce((a,c)=> a + (c.status==="Closed Won"?Number(c.value||0):0),0);

        document.getElementById('meta-revenue').innerText = "₹"+totalRevenue;
        document.getElementById('meta-total').innerText = data.length;

        UI.renderList('full-pipeline', data);
        UI.renderList('client-list', data.filter(x=>x.status==="Closed Won"));
    },

    renderList: (id, data) => {
        const el = document.getElementById(id);

        if(!data.length){
            el.innerHTML = "<p class='text-center opacity-50'>No Data Found</p>";
            return;
        }

        el.innerHTML = data.map(l=>`
            <div class="glass-panel p-4 rounded-xl flex justify-between">
                <div>
                    <h4 class="font-bold">${l.name || "No Name"}</h4>
                    <p>${l.phone || ""}</p>
                    <small>${l.status}</small>
                </div>
                <div class="flex gap-2">
                    <a href="tel:${l.phone}">📞</a>
                    <a href="https://wa.me/91${l.phone}" target="_blank">💬</a>
                </div>
            </div>
        `).join('');
    },

    toast: (msg, type="success") => {
        const t = document.createElement('div');
        t.innerText = msg;
        t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl text-white ${type==='error'?'bg-red-500':'bg-green-500'}`;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    },

    showLoader: (show) => {
        let loader = document.getElementById("loader");
        if(!loader){
            loader = document.createElement("div");
            loader.id = "loader";
            loader.className = "fixed inset-0 bg-black/50 flex items-center justify-center text-white text-xl";
            loader.innerText = "Loading...";
            document.body.appendChild(loader);
        }
        loader.style.display = show ? "flex" : "none";
    }
};

// FORM FIX
document.getElementById('core-form').addEventListener('submit', async (e)=>{
    e.preventDefault();

    const payload = {
        id: document.getElementById('entry-id').value || System.generateID(),
        name: document.getElementById('entry-name').value,
        phone: document.getElementById('entry-phone').value,
        status: document.getElementById('entry-status').value,
        value: document.getElementById('entry-value').value || 0,
        followUpDate: document.getElementById('entry-date').value,
        note: document.getElementById('entry-note').value
    };

    try {
        await fetch(System.API, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({data:[payload]})
        });

        UI.toast("Lead Saved");
        System.sync();

    } catch(e){
        UI.toast("Error Saving", "error");
    }
});

// SEARCH DEBOUNCE
let timeout;
document.getElementById('lead-search').addEventListener('input', (e)=>{
    clearTimeout(timeout);
    timeout = setTimeout(()=>{
        const q = e.target.value.toLowerCase();
        const filtered = System.Data.filter(l=>
            l.name?.toLowerCase().includes(q) ||
            l.phone?.includes(q)
        );
        UI.renderList('full-pipeline', filtered);
    }, 300);
});
</script>
