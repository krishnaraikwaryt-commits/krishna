<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Elite | Pro CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; overflow-x: hidden; }
        .pro-card { background: white; border-radius: 28px; border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pro-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
        .active-nav { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
        .hidden-page { display: none !important; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-36">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[9999] flex flex-col items-center justify-center p-6 text-white">
        <div class="w-24 h-24 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(16,185,129,0.4)]">
            <i class="fas fa-bolt-lightning text-4xl animate-pulse"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 tracking-tight">LEADFLOW <span class="text-emerald-500">ELITE</span></h1>
        <p class="text-slate-400 text-sm mb-10">Secured Professional Workspace</p>
        <input type="password" id="access-pin" maxlength="4" oninput="autoCheck()" placeholder="••••" 
            class="w-72 p-6 rounded-3xl text-center bg-slate-900 border-2 border-slate-800 outline-none text-3xl font-bold tracking-[1em] focus:border-emerald-500 transition-all text-emerald-500">
    </div>

    <div id="main-app" style="display: none;">
        
        <div id="page-dashboard" class="p-6 max-w-3xl mx-auto">
            <header class="flex justify-between items-center mb-8 pt-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Workspace</h2>
                    <p id="current-date" class="text-sm text-slate-500 font-medium"></p>
                </div>
                <div class="flex gap-3">
                    <label class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-200 text-slate-600 cursor-pointer hover:bg-emerald-50 transition shadow-sm">
                        <i class="fas fa-cloud-arrow-up"></i>
                        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleBulkImport(event)">
                    </label>
                    <button onclick="syncData()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-900 text-white shadow-lg shadow-slate-200 active:scale-90 transition">
                        <i class="fas fa-sync-alt" id="sync-icon"></i>
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="pro-card p-6 bg-gradient-to-br from-emerald-500 to-emerald-600 text-white border-none">
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Total Revenue</p>
                    <h2 id="stat-revenue" class="text-2xl font-black mt-1">₹0</h2>
                    <div class="mt-4 bg-white/20 h-1.5 rounded-full overflow-hidden">
                        <div id="revenue-bar" class="bg-white h-full" style="width: 0%"></div>
                    </div>
                </div>
                <div class="pro-card p-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Conversion Rate</p>
                    <h2 id="stat-rate" class="text-2xl font-black text-slate-800 mt-1">0%</h2>
                    <p class="text-[10px] text-emerald-500 font-bold mt-2"><i class="fas fa-arrow-up"></i> Performance</p>
                </div>
            </div>

            <div id="alert-zone" class="mb-8"></div>

            <h3 class="font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-fire text-orange-500"></i> Hot Leads Pipeline
            </h3>
            <div id="lead-pipeline" class="space-y-4"></div>
        </div>

        <div id="page-data" class="p-6 max-w-4xl mx-auto hidden-page">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-black">Global Search</h2>
                <span id="data-count" class="text-xs font-bold bg-slate-200 px-3 py-1 rounded-full uppercase">0 Leads</span>
            </div>
            <div class="relative mb-8">
                <i class="fas fa-search absolute left-5 top-5 text-slate-400"></i>
                <input type="text" id="db-search" oninput="proSearch()" placeholder="Search by name, phone or status..." 
                    class="w-full p-5 pl-14 rounded-3xl bg-white border-none shadow-xl shadow-slate-200/50 outline-none focus:ring-2 ring-emerald-500">
            </div>
            <div id="db-list" class="space-y-3"></div>
        </div>

        <div id="page-tasks" class="p-6 max-w-2xl mx-auto hidden-page">
            <h2 class="text-2xl font-black mb-2">Daily Goals</h2>
            <p class="text-sm text-slate-500 mb-8">Focus on what matters today.</p>
            <div class="pro-card p-3 mb-6 flex gap-3 shadow-sm">
                <input type="text" id="task-input" placeholder="What's the next goal?" class="flex-1 p-3 outline-none bg-transparent font-medium">
                <button onclick="addProTask()" class="bg-emerald-500 text-white w-12 h-12 rounded-2xl shadow-lg shadow-emerald-100 flex items-center justify-center active:scale-90 transition">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="pro-task-list" class="space-y-3"></div>
        </div>

        <nav class="fixed bottom-8 left-6 right-6 h-22 rounded-[3rem] bg-slate-900/95 backdrop-blur-xl flex justify-around items-center px-4 z-[500] shadow-2xl">
            <button onclick="navTo('dashboard')" id="nav-dashboard" class="w-14 h-14 rounded-full flex items-center justify-center text-slate-400 transition-all active-nav">
                <i class="fas fa-grip-vertical text-xl"></i>
            </button>
            <button onclick="navTo('tasks')" id="nav-tasks" class="w-14 h-14 rounded-full flex items-center justify-center text-slate-400 transition-all">
                <i class="fas fa-calendar-check text-xl"></i>
            </button>
            <button onclick="openLeadModal('add')" class="w-16 h-16 bg-emerald-500 text-white rounded-[2rem] flex items-center justify-center shadow-[0_15px_30px_rgba(16,185,129,0.4)] -translate-y-4 active:scale-90 transition-all">
                <i class="fas fa-plus text-2xl"></i>
            </button>
            <button onclick="navTo('data')" id="nav-data" class="w-14 h-14 rounded-full flex items-center justify-center text-slate-400 transition-all">
                <i class="fas fa-database text-xl"></i>
            </button>
        </nav>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-md flex items-end sm:items-center justify-center z-[1000] p-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-[3rem] shadow-2xl max-h-[92vh] overflow-y-auto scroll-hide">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modalTitle" class="text-2xl font-black text-slate-900">New Business Lead</h3>
                <button onclick="closeLeadModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fas fa-times"></i></button>
            </div>
            <form id="pro-form" class="space-y-6">
                <input type="hidden" id="l-id">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Contact Information</label>
                    <input type="text" id="l-name" placeholder="Full Name" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500" required>
                    <input type="tel" id="l-phone" placeholder="Phone Number" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none focus:ring-2 ring-emerald-500" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Lead Stage</label>
                        <select id="l-status" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none appearance-none font-bold">
                            <option value="New">New Lead</option>
                            <option value="Negotiation">Negotiation</option>
                            <option value="Converted">Closed Won</option>
                            <option value="Lost">Closed Lost</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Deal Value (₹)</label>
                        <input type="number" id="l-value" placeholder="Value" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none font-bold">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Priority & Follow-up</label>
                    <div class="flex gap-4">
                        <select id="l-priority" class="flex-1 p-5 rounded-3xl bg-slate-50 border-none outline-none font-bold text-orange-500">
                            <option value="Cold">❄️ Cold</option>
                            <option value="Warm">🔥 Warm</option>
                            <option value="Hot">⚡ Hot</option>
                        </select>
                        <input type="date" id="l-fdate" class="flex-1 p-5 rounded-3xl bg-slate-50 border-none outline-none font-bold">
                    </div>
                </div>
                <div id="pro-history-zone" class="hidden border-t pt-6">
                    <label class="text-[10px] font-black text-emerald-500 uppercase ml-2">Activity Log</label>
                    <div id="history-box" class="space-y-3 mt-3 mb-6"></div>
                    <textarea id="l-note" placeholder="What happened in the last call?" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none" rows="3"></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white py-6 rounded-3xl font-black text-lg shadow-xl shadow-emerald-200 active:scale-95 transition-all">SAVE BUSINESS LEAD</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const MASTER_PIN = "1321";
        let leads = [];
        let proTasks = JSON.parse(localStorage.getItem('pro_tasks')) || [];
        const today = new Date().toISOString().split('T')[0];

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

        // 🛡️ SECURITY
        function autoCheck() {
            if(document.getElementById('access-pin').value === MASTER_PIN) {
                sessionStorage.setItem('pro_auth', 'true');
                unlockApp();
            }
        }
        function unlockApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            syncData(); renderProTasks();
        }
        if(sessionStorage.getItem('pro_auth')) unlockApp();

        // 🔄 DATA SYNC
        async function syncData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('fa-spin');
            try {
                const res = await fetch(API_URL);
                leads = await res.json();
                renderAll();
            } finally { icon.classList.remove('fa-spin'); }
        }

        // 📊 CORE RENDERING
        function renderAll() {
            // Stats Calculations
            const revenue = leads.reduce((acc, curr) => acc + (curr.status === 'Converted' ? Number(curr.value || 0) : 0), 0);
            const totalVal = leads.reduce((acc, curr) => acc + Number(curr.value || 0), 1); // Avoid div by zero
            const convRate = Math.round((leads.filter(l => l.status === 'Converted').length / (leads.length || 1)) * 100);

            document.getElementById('stat-revenue').innerText = "₹" + revenue.toLocaleString();
            document.getElementById('stat-rate').innerText = convRate + "%";
            document.getElementById('revenue-bar').style.width = (revenue/totalVal * 100) + "%";
            document.getElementById('data-count').innerText = leads.length + " Leads";

            // Alerts (Overdue)
            const overdue = leads.filter(l => l.followUpDate && l.followUpDate < today && l.status !== 'Converted');
            let alertHTML = '';
            overdue.forEach(l => {
                alertHTML += `<div class="pro-card p-5 border-l-8 border-red-500 bg-red-50 flex justify-between items-center animate-pulse">
                    <div><p class="text-[10px] font-black text-red-500 uppercase">Action Required</p><p class="font-bold text-slate-900">${l.name}</p></div>
                    <div class="flex gap-2"><a href="tel:${l.phone}" class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-red-500 shadow-sm"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/91${l.phone}" class="w-10 h-10 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-md"><i class="fab fa-whatsapp"></i></a></div></div>`;
            });
            document.getElementById('alert-zone').innerHTML = alertHTML;

            // Dashboard Pipeline (Hot Leads)
            const hotLeads = leads.filter(l => l.priority === 'Hot' && l.status !== 'Converted').slice(0, 5);
            document.getElementById('lead-pipeline').innerHTML = hotLeads.map(l => proCardTemplate(l)).join('');
            
            // Global List
            document.getElementById('db-list').innerHTML = leads.map(l => proCardTemplate(l)).join('');
        }

        function proCardTemplate(l) {
            const pColor = l.priority === 'Hot' ? 'text-orange-500' : (l.priority === 'Warm' ? 'text-blue-500' : 'text-slate-400');
            return `<div class="pro-card p-5 flex justify-between items-center">
                <div onclick="openLeadModal('edit', '${l.id}')" class="flex-1 cursor-pointer">
                    <p class="font-black text-slate-800 text-lg">${l.name}</p>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="status-badge ${l.status === 'Converted' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}">${l.status}</span>
                        <span class="text-[10px] font-bold ${pColor}"><i class="fas fa-bolt"></i> ${l.priority}</span>
                        <span class="text-[10px] font-bold text-slate-400 tracking-tighter">₹${l.value || 0}</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="tel:${l.phone}" class="w-11 h-11 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center border border-slate-100"><i class="fas fa-phone-alt"></i></a>
                </div>
            </div>`;
        }

        // 📁 BULK IMPORT (CSV)
        async function handleBulkImport(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const data = rows.map(r => {
                    const c = r.split(',');
                    if(c.length < 2) return null;
                    return { id: "EL"+Date.now()+Math.random(), name: c[0].trim(), phone: c[1].trim(), status: 'New', priority: 'Warm', value: 0, history: "[]" };
                }).filter(x => x);
                if(data.length) {
                    alert(`Importing ${data.length} Leads...`);
                    await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data}) });
                    syncData();
                }
            };
            reader.readAsText(file);
        }

        // 🏗️ MODAL & FORM
        function openLeadModal(mode, id) {
            const hSec = document.getElementById('pro-history-zone');
            if(mode === 'edit') {
                const l = leads.find(x => x.id === id);
                document.getElementById('l-id').value = l.id;
                document.getElementById('l-name').value = l.name;
                document.getElementById('l-phone').value = l.phone;
                document.getElementById('l-status').value = l.status;
                document.getElementById('l-value').value = l.value || 0;
                document.getElementById('l-priority').value = l.priority || 'Warm';
                document.getElementById('l-fdate').value = l.followUpDate || '';
                hSec.classList.remove('hidden');
                const hArr = JSON.parse(l.history || "[]");
                document.getElementById('history-box').innerHTML = hArr.map(h => `<div class="text-[11px] bg-slate-50 p-3 rounded-2xl border border-slate-100 font-medium"><b>${h.date}</b><br>${h.note}</div>`).join('');
                document.getElementById('modalTitle').innerText = "Update Deal";
            } else {
                document.getElementById('pro-form').reset(); document.getElementById('l-id').value = ''; hSec.classList.add('hidden');
                document.getElementById('modalTitle').innerText = "New Business Lead";
            }
            document.getElementById('leadModal').classList.remove('hidden');
        }

        function closeLeadModal() { document.getElementById('leadModal').classList.add('hidden'); }

        document.getElementById('pro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('l-id').value;
            const note = document.getElementById('l-note').value;
            let current = leads.find(x => x.id === id) || { history: "[]" };
            let hArr = JSON.parse(current.history || "[]");
            if(note.trim()) hArr.push({ date: new Date().toLocaleString(), note: note });

            const payload = { 
                id: id || "EL" + Date.now(), 
                name: document.getElementById('l-name').value, 
                phone: document.getElementById('l-phone').value, 
                status: document.getElementById('l-status').value, 
                value: document.getElementById('l-value').value,
                priority: document.getElementById('l-priority').value,
                followUpDate: document.getElementById('l-fdate').value, 
                history: JSON.stringify(hArr) 
            };

            const method = id ? 'PATCH' : 'POST';
            const url = id ? `${API_URL}/id/${id}` : API_URL;

            await fetch(url, { method, headers: {'Content-Type': 'application/json'},
