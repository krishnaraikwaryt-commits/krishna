<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        /* Light Mode Colors */
        body.light-mode { background-color: #f4f7f6; color: #333; }
        .light-mode .glass-card { background: white; border: 1px solid #e0e6e3; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .light-mode .text-gray-header { color: #4b5563; }
        
        /* Dark Mode Colors */
        body.dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .dark-mode .glass-card { background: #1e293b; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .dark-mode .text-gray-header { color: #94a3b8; }
        .dark-mode input, .dark-mode select { background: #0f172a !important; color: white; border-color: #334155 !important; }
        .dark-mode #leadModal .bg-white { background-color: #1e293b; color: white; }

        .lead-done { text-decoration: line-through; opacity: 0.4; filter: grayscale(1); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:active { transform: scale(0.95); }
        .animate-swing { animation: swing 2s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
    </style>
</head>
<body class="light-mode p-2 md:p-6 transition-colors duration-300">

    <div id="crmContent" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-[#1e6b3e] p-4 rounded-2xl shadow-lg text-white">
            <div class="flex items-center gap-2">
                <div class="bg-white text-[#1e6b3e] h-10 w-10 rounded-xl flex items-center justify-center font-bold shadow-inner">LF</div>
                <h1 class="font-bold text-lg tracking-tight">LeadFlow Pro</h1>
            </div>
            <div class="flex gap-3 items-center">
                <button onclick="toggleTheme()" class="bg-white/20 p-2.5 rounded-xl hover:bg-white/30 transition-all" title="Toggle Theme">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
                <button onclick="fetchLeads()" class="bg-white/20 p-2.5 rounded-xl hover:rotate-180 transition-all duration-500">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div id="today-alerts-section" class="mb-8 hidden">
            <h3 class="font-bold text-orange-500 mb-4 flex items-center gap-2 uppercase text-xs tracking-widest">
                <i class="fas fa-bell animate-swing"></i> Today's Follow-ups
            </h3>
            <div id="alert-list" class="grid gap-4"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div onclick="filterLeads('New')" class="glass-card p-4 rounded-2xl cursor-pointer hover:scale-105 transition-transform">
                <p class="text-gray-header text-[10px] font-bold uppercase mb-1">New</p>
                <h2 id="new-leads" class="text-3xl font-black text-blue-500">0</h2>
            </div>
            <div onclick="filterLeads('Interested')" class="glass-card p-4 rounded-2xl cursor-pointer hover:scale-105 transition-transform">
                <p class="text-gray-header text-[10px] font-bold uppercase mb-1">Interested</p>
                <h2 id="interested-leads" class="text-3xl font-black text-purple-500">0</h2>
            </div>
            <div class="glass-card p-4 rounded-2xl border-b-4 border-orange-500 shadow-orange-500/10">
                <p class="text-orange-500 text-[10px] font-bold uppercase mb-1">Due Today</p>
                <h2 id="due-today" class="text-3xl font-black">0</h2>
            </div>
            <div onclick="filterLeads('All')" class="glass-card p-4 rounded-2xl border-b-4 border-[#1e6b3e]">
                <p class="text-[#1e6b3e] text-[10px] font-bold uppercase mb-1">Total Leads</p>
                <h2 id="total-leads" class="text-3xl font-black">0</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-lg">Lead Records</h3>
            <button onclick="toggleModal()" class="bg-[#1e6b3e] text-white px-6 py-3 rounded-2xl font-bold text-xs shadow-lg shadow-green-900/20 active:scale-95 transition-all">
                <i class="fas fa-plus mr-2"></i> ADD LEAD
            </button>
        </div>

        <div id="lead-list" class="grid gap-4 mb-10"></div>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[500]">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl relative">
            <h2 class="text-2xl font-black mb-6 text-[#1e6b3e]">New Entry</h2>
            <form id="leadForm" class="space-y-4">
                <input type="text" id="name" placeholder="Name" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border border-gray-100 focus:border-[#1e6b3e]" required>
                <input type="text" id="phone" placeholder="WhatsApp Number" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border border-gray-100 focus:border-[#1e6b3e]" required>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 ml-2">FOLLOW-UP DATE</label>
                    <input type="date" id="followUpDate" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border border-gray-100">
                </div>
                <select id="status" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border border-gray-100">
                    <option value="New">New</option>
                    <option value="Interested">Interested</option>
                    <option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-[#1e6b3e] text-white p-5 rounded-2xl font-black shadow-lg">SAVE TO CLOUD</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-400 font-bold py-2 text-sm mt-2">Dismiss</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let allLeadsData = [];
        let completedLeads = JSON.parse(localStorage.getItem('completedLeads') || '[]');

        // --- THEME LOGIC ---
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if(body.classList.contains('light-mode')) {
                body.classList.replace('light-mode', 'dark-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.replace('dark-mode', 'light-mode');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }
        // Load saved theme
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        async function fetchLeads() {
            try {
                const res = await fetch(API_URL);
                allLeadsData = await res.json();
                processFollowUps();
                updateStats();
                filterLeads('All');
            } catch (e) { alert("Sync Error!"); }
        }

        function processFollowUps() {
            const today = new Date().toISOString().split('T')[0];
            const alertList = document.getElementById('alert-list');
            const alertSection = document.getElementById('today-alerts-section');
            alertList.innerHTML = '';
            const todayLeads = allLeadsData.filter(l => l.followUpDate === today);
            document.getElementById('due-today').innerText = todayLeads.length;
            if (todayLeads.length > 0) {
                alertSection.classList.remove('hidden');
                todayLeads.forEach(l => alertList.innerHTML += createLeadCard(l, true));
            } else { alertSection.classList.add('hidden'); }
        }

        function createLeadCard(l, isAlert = false) {
            const isDone = completedLeads.includes(l.id);
            const statusColor = l.status === 'Closed' ? 'green' : (l.status === 'Interested' ? 'purple' : 'blue');
            return `
                <div class="glass-card p-5 flex flex-col md:flex-row justify-between items-center gap-4 ${isDone ? 'lead-done' : ''} ${isAlert ? 'border-l-4 border-l-orange-500' : ''}">
                    <div class="flex items-center gap-4 w-full">
                        <button onclick="toggleDone('${l.id}')" class="w-10 h-10 rounded-xl border-2 border-gray-200 flex items-center justify-center hover:bg-green-100 transition-all">
                            ${isDone ? '<i class="fas fa-check text-green-600"></i>' : ''}
                        </button>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg">${l.name}</h4>
                            <div class="flex flex-wrap items-center gap-2 mt-1">
                                <span class="text-[10px] font-black px-2 py-0.5 bg-${statusColor}-100 text-${statusColor}-600 rounded uppercase">${l.status}</span>
                                <span class="text-xs text-gray-header font-medium"><i class="fas fa-phone-alt mr-1"></i>${l.phone}</span>
                                ${l.followUpDate ? `<span class="text-[10px] bg-gray-100 dark:bg-slate-700 px-2 py-0.5 rounded text-gray-500 font-bold tracking-tighter"><i class="far fa-calendar-alt mr-1"></i>${l.followUpDate}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <a href="https://wa.me/91${l.phone}" target="_blank" class="flex-1 md:flex-none text-center bg-[#25D366] text-white px-5 py-3 rounded-2xl text-xs font-black shadow-md shadow-green-500/20"><i class="fab fa-whatsapp text-sm mr-1"></i> CHAT</a>
                        <a href="tel:${l.phone}" class="flex-1 md:flex-none text-center bg-blue-600 text-white px-5 py-3 rounded-2xl text-xs font-black shadow-md shadow-blue-500/20"><i class="fas fa-phone-alt text-sm mr-1"></i> CALL</a>
                    </div>
                </div>`;
        }

        function filterLeads(status) {
            const list = document.getElementById('lead-list');
            list.innerHTML = '';
            const filtered = status === 'All' ? allLeadsData : allLeadsData.filter(l => l.status === status);
            filtered.reverse().forEach(l => list.innerHTML += createLeadCard(l));
        }

        function updateStats() {
            document.getElementById('total-leads').innerText = allLeadsData.length;
            document.getElementById('new-leads').innerText = allLeadsData.filter(l => l.status === 'New').length;
            document.getElementById('interested-leads').innerText = allLeadsData.filter(l => l.status === 'Interested').length;
        }

        function toggleDone(id) {
            completedLeads.includes(id) ? completedLeads = completedLeads.filter(i => i !== id) : completedLeads.push(id);
            localStorage.setItem('completedLeads', JSON.stringify(completedLeads));
            fetchLeads();
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.innerText = "UPLOADING...";
            const data = [{ id: "ID"+Date.now(), name: document.getElementById('name').value, phone: document.getElementById('phone').value, status: document.getElementById('status').value, followUpDate: document.getElementById('followUpDate').value }];
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data }) });
            toggleModal(); document.getElementById('leadForm').reset(); btn.innerText = "SAVE TO CLOUD"; fetchLeads();
        });

        function toggleModal() { document.getElementById('leadModal').classList.toggle('hidden'); }
        window.onload = fetchLeads;
    </script>
</body>
</html>
