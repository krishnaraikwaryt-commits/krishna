<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Elite | Pro CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; overflow-x: hidden; }
        .pro-card { background: white; border-radius: 28px; border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.3s ease; }
        .active-nav { background: #10b981 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
        .hidden-page { display: none !important; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="pb-36">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[9999] flex flex-col items-center justify-center p-6 text-white">
        <div class="w-24 h-24 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(16,185,129,0.4)]">
            <i class="fas fa-bolt-lightning text-4xl animate-pulse"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 tracking-tight">LEADFLOW <span class="text-emerald-500">ELITE</span></h1>
        <p class="text-slate-400 text-sm mb-10 font-medium">Secured Professional Workspace</p>
        
        <div class="relative group">
            <input type="password" id="access-pin" maxlength="4" placeholder="••••" 
                class="w-72 p-6 rounded-3xl text-center bg-slate-900 border-2 border-slate-800 outline-none text-3xl font-bold tracking-[1em] focus:border-emerald-500 transition-all text-emerald-500">
            <button onclick="handleLogin()" class="mt-8 w-full bg-emerald-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-emerald-400 transition-all">
                Access System
            </button>
        </div>
        <p id="error-msg" class="text-red-400 text-xs mt-4 font-bold hidden">Invalid Security PIN. Try Again.</p>
    </div>

    <div id="main-app" class="hidden">
        
        <div id="page-dashboard" class="p-6 max-w-3xl mx-auto">
            <header class="flex justify-between items-center mb-8 pt-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Workspace</h2>
                    <p id="current-date" class="text-sm text-slate-500 font-medium"></p>
                </div>
                <div class="flex gap-3">
                    <label class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-200 text-slate-600 cursor-pointer hover:bg-emerald-50 transition shadow-sm">
                        <i class="fas fa-cloud-arrow-up"></i>
                        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleBulkImport(event)">
                    </label>
                    <button onclick="syncData()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-900 text-white shadow-lg active:scale-90 transition">
                        <i class="fas fa-sync-alt" id="sync-icon"></i>
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="pro-card p-6 bg-gradient-to-br from-emerald-500 to-emerald-600 text-white border-none">
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Revenue</p>
                    <h2 id="stat-revenue" class="text-2xl font-black mt-1">₹0</h2>
                </div>
                <div class="pro-card p-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Leads</p>
                    <h2 id="stat-count" class="text-2xl font-black text-slate-800 mt-1">0</h2>
                </div>
            </div>

            <div id="alert-zone" class="mb-8"></div>
            <h3 class="font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-fire text-orange-500"></i> Hot Pipeline
            </h3>
            <div id="lead-pipeline" class="space-y-4"></div>
        </div>

        <div id="page-data" class="p-6 max-w-4xl mx-auto hidden-page">
            <h2 class="text-2xl font-black mb-6">Global Database</h2>
            <div class="relative mb-8">
                <i class="fas fa-search absolute left-5 top-5 text-slate-400"></i>
                <input type="text" id="db-search" oninput="proSearch()" placeholder="Search leads..." class="w-full p-5 pl-14 rounded-3xl bg-white border-none shadow-xl outline-none">
            </div>
            <div id="db-list" class="space-y-3"></div>
        </div>

        <nav class="fixed bottom-8 left-6 right-6 h-20 rounded-[2.5rem] bg-slate-900 flex justify-around items-center px-4 z-[500] shadow-2xl">
            <button onclick="navTo('dashboard')" id="nav-dashboard" class="w-12 h-12 rounded-full flex items-center justify-center text-slate-400 active-nav"><i class="fas fa-grip-vertical"></i></button>
            <button onclick="openLeadModal('add')" class="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center -translate-y-4 shadow-xl"><i class="fas fa-plus"></i></button>
            <button onclick="navTo('data')" id="nav-data" class="w-12 h-12 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-database"></i></button>
        </nav>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-md flex items-end sm:items-center justify-center z-[1000] p-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-[3rem] shadow-2xl">
            <form id="pro-form" class="space-y-4">
                <input type="hidden" id="l-id">
                <h3 id="modalTitle" class="text-xl font-black mb-4">Lead Details</h3>
                <input type="text" id="l-name" placeholder="Name" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none" required>
                <input type="tel" id="l-phone" placeholder="Phone" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="l-status" class="p-4 rounded-2xl bg-slate-50 outline-none">
                        <option value="New">New</option>
                        <option value="Converted">Closed Won</option>
                    </select>
                    <input type="number" id="l-value" placeholder="Value ₹" class="p-4 rounded-2xl bg-slate-50 outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black">SAVE DEAL</button>
                <button type="button" onclick="closeLeadModal()" class="w-full text-slate-400 text-sm font-bold">CANCEL</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const ELITE_PIN = "1321"; // <--- YE PIN HAI
        let leads = [];

        // 🛡️ LOGIN FIX
        function handleLogin() {
            const val = document.getElementById('access-pin').value;
            if(val === ELITE_PIN) {
                sessionStorage.setItem('elite_auth', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncData();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }
        if(sessionStorage.getItem('elite_auth')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            syncData();
        }

        // 🔄 SYNC & RENDER
        async function syncData() {
            try {
                const res = await fetch(API_URL);
                leads = await res.json();
                render();
            } catch(e) { alert("API Connection Failed"); }
        }

        function render() {
            const revenue = leads.reduce((acc, l) => acc + (l.status === 'Converted' ? Number(l.value || 0) : 0), 0);
            document.getElementById('stat-revenue').innerText = "₹" + revenue.toLocaleString();
            document.getElementById('stat-count').innerText = leads.length;

            const listHtml = leads.map(l => `
                <div class="pro-card p-5 flex justify-between items-center mb-3">
                    <div onclick="openLeadModal('edit', '${l.id}')">
                        <p class="font-black text-slate-800">${l.name}</p>
                        <p class="text-xs text-slate-400 font-bold">${l.status} • ₹${l.value || 0}</p>
                    </div>
                    <a href="tel:${l.phone}" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center"><i class="fas fa-phone"></i></a>
                </div>
            `).join('');
            document.getElementById('lead-pipeline').innerHTML = listHtml;
            document.getElementById('db-list').innerHTML = listHtml;
            document.getElementById('current-date').innerText = new Date().toDateString();
        }

        function navTo(p) {
            document.getElementById('page-dashboard').classList.toggle('hidden-page', p !== 'dashboard');
            document.getElementById('page-data').classList.toggle('hidden-page', p !== 'data');
            document.getElementById('nav-dashboard').classList.toggle('active-nav', p === 'dashboard');
            document.getElementById('nav-data').classList.toggle('active-nav', p === 'data');
        }

        function openLeadModal(mode, id) {
            if(mode === 'edit') {
                const l = leads.find(x => x.id === id);
                document.getElementById('l-id').value = l.id;
                document.getElementById('l-name').value = l.name;
                document.getElementById('l-phone').value = l.phone;
                document.getElementById('l-status').value = l.status;
                document.getElementById('l-value').value = l.value || 0;
            } else {
                document.getElementById('pro-form').reset();
                document.getElementById('l-id').value = '';
            }
            document.getElementById('leadModal').classList.remove('hidden');
        }
        function closeLeadModal() { document.getElementById('leadModal').classList.add('hidden'); }

        document.getElementById('pro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('l-id').value;
            const data = {
                id: id || "EL" + Date.now(),
                name: document.getElementById('l-name').value,
                phone: document.getElementById('l-phone').value,
                status: document.getElementById('l-status').value,
                value: document.getElementById('l-value').value
            };
            const url = id ? `${API_URL}/id/${id}` : API_URL;
            await fetch(url, {
                method: id ? 'PATCH' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: id ? data : [data]})
            });
            closeLeadModal(); syncData();
        });
    </script>
</body>
</html>
