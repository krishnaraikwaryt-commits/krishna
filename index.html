<script>
        // Tumhari SheetDB Link
        const SHEETDB_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";

        const form = document.getElementById('lead-form');
        const submitBtn = document.getElementById('submit-btn');

        // Form Submit: Sheet mein data bhejna
        form.addEventListener("submit", e => {
            e.preventDefault();
            submitBtn.innerText = "Saving...";
            submitBtn.disabled = true;

            fetch(SHEETDB_URL, {
                method : 'POST',
                body: new FormData(document.getElementById("lead-form")),
            })
            .then(response => response.json())
            .then(data => {
                alert("Mubarak ho! Lead save ho gayi.");
                submitBtn.innerText = "SAVE TO SHEET";
                submitBtn.disabled = false;
                form.reset();
                loadLeads(); 
            })
            .catch(err => {
                alert("Error: Sheet se connect nahi ho paya.");
                submitBtn.innerText = "SAVE TO SHEET";
                submitBtn.disabled = false;
            });
        }); // <-- Ye bracket zaroori tha jo miss ho raha tha

        // Table Load: Sheet se data dikhana
        async function loadLeads() {
            try {
                const res = await fetch(SHEETDB_URL);
                const leads = await res.json();
                const tbody = document.getElementById('leads-table-body');
                tbody.innerHTML = '';
                
                leads.reverse().slice(0, 10).forEach(l => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50 transition">
                            <td class="p-2 border text-gray-800 font-medium">${l.Name || 'N/A'}</td>
                            <td class="p-2 border text-center text-blue-600">${l.Service || 'N/A'}</td>
                            <td class="p-2 border text-center">
                                <a href="https://wa.me/${l.Phone}" target="_blank" class="text-green-500 text-xl hover:text-green-600">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                console.error("Data load nahi hua:", err);
            }
        }

        window.onload = loadLeads;
    </script>
