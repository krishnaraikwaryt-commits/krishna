<div id="page-dashboard" class="p-6 max-w-2xl mx-auto">
            <header class="flex justify-between items-center mb-8 mt-2">
                <div>
                    <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest opacity-60">Control Center</p>
                    <h1 class="text-3xl font-black tracking-tighter">Dashboard</h1>
                </div>
                <div class="flex gap-3">
                    <label class="bg-white/5 text-white/60 p-3 rounded-xl text-xs font-bold cursor-pointer border border-white/5">
                        <i class="fas fa-file-import"></i><input type="file" id="csvFile" accept=".csv" class="hidden" onchange="handleCSV(event)">
                    </label>
                    <button onclick="fetchLeads()" class="bg-emerald-500/10 text-emerald-500 w-10 h-10 rounded-xl"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div id="alert-container" class="space-y-4 mb-8">
                <div id="overdue-alerts" class="space-y-2"></div>
                <div id="today-alerts" class="space-y-2"></div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="stat-box active-filter" id="box-all" onclick="filterBy('all')">
                    <p class="text-[10px] uppercase opacity-40 font-black mb-1">Total Leads</p>
                    <h2 id="stat-total" class="text-2xl font-black italic">0</h2>
                </div>
                <div class="stat-box" id="box-closed" onclick="filterBy('closed')">
                    <p class="text-[10px] uppercase text-emerald-500 font-black mb-1">Closed</p>
                    <h2 id="stat-closed" class="text-2xl font-black text-emerald-500 italic">0</h2>
                </div>
                <div class="stat-box" id="box-today" onclick="filterBy('today')">
                    <p class="text-[10px] uppercase text-blue-400 font-black mb-1">Today's</p>
                    <h2 id="stat-today" class="text-2xl font-black text-blue-400 italic">0</h2>
                </div>
                <div class="stat-box" id="box-overdue" onclick="filterBy('overdue')">
                    <p class="text-[10px] uppercase text-red-500 font-black mb-1">Overdue</p>
                    <h2 id="stat-overdue" class="text-2xl font-black text-red-500 italic">0</h2>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 id="list-title" class="text-[10px] font-black opacity-30 uppercase tracking-[2px]">Recent Leads</h3>
                <button onclick="filterBy('all')" class="text-[9px] bg-white/5 px-3 py-1 rounded-full text-white/40 uppercase font-black">Reset</button>
            </div>
            <div id="main-list" class="space-y-3"></div>
        </div>

<script>
    // ... (Previous logic stays same) ...

    function renderAll() {
        const total = leadsData.length;
        const closed = leadsData.filter(l => l.status === 'Converted').length;
        const todayLeads = leadsData.filter(l => l.followUpDate === todayStr && l.status !== 'Converted');
        const overdueLeads = leadsData.filter(l => l.followUpDate && l.followUpDate < todayStr && l.status !== 'Converted');

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-closed').innerText = closed;
        document.getElementById('stat-today').innerText = todayLeads.length;
        document.getElementById('stat-overdue').innerText = overdueLeads.length;

        // 🚨 OVERDUE ALERTS RENDER
        document.getElementById('overdue-alerts').innerHTML = overdueLeads.map(l => `
            <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-red-500 font-black uppercase tracking-tighter">⚠️ Overdue Follow-up</p>
                    <p class="font-bold text-sm text-white">${l.name}</p>
                </div>
                <div class="flex gap-2">
                    <a href="tel:${l.phone}" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center text-xs opacity-50"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/91${l.phone}" class="w-8 h-8 bg-emerald-500/20 text-emerald-500 rounded-lg flex items-center justify-center text-xs"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        `).join('');

        // 📅 TODAY ALERTS RENDER
        document.getElementById('today-alerts').innerHTML = todayLeads.map(l => `
            <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-blue-400 font-black uppercase tracking-tighter">📅 Scheduled for Today</p>
                    <p class="font-bold text-sm text-white">${l.name}</p>
                </div>
                <div class="flex gap-2">
                    <a href="tel:${l.phone}" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center text-xs opacity-50"><i class="fas fa-phone"></i></a>
                    <a href="https://wa.me/91${l.phone}" class="w-8 h-8 bg-emerald-500/20 text-emerald-500 rounded-lg flex items-center justify-center text-xs"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        `).join('');

        filterBy('all');
        
        document.getElementById('table-body').innerHTML = leadsData.map(l => `
            <div class="data-row" data-name="${l.name.toLowerCase()}">${cardTemplate(l)}</div>
        `).join('');
    }

    // ... (Rest of the functions same) ...
</script>
