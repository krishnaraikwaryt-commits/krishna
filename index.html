<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        body.light-mode { background-color: #f0f4f1; color: #1a2e21; }
        body.dark-mode { background-color: #0a0f0b; color: #e8f5e9; }
        .glass-card { border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .glass-card { background: #141d16; border-color: #1e2e22; }
        .light-mode .glass-card { background: white; }
        .nav-active { color: #1e6b3e !important; }
        .nav-active i { transform: translateY(-5px); transition: 0.3s; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="light-mode transition-all duration-500 pb-24">

    <div id="page-dashboard" class="p-3 md:p-6 max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-[#1e6b3e] p-5 rounded-[2rem] text-white shadow-xl">
            <div class="flex items-center gap-3">
                <h1 class="font-black text-xl tracking-tight">LeadFlow</h1>
            </div>
            <button onclick="toggleTheme()" class="bg-white/10 h-10 w-10 rounded-full flex items-center justify-center"><i id="theme-icon" class="fas fa-moon"></i></button>
        </header>

        <div id="card-All" onclick="filterByStatus('All')" class="glass-card p-6 mb-6 border-b-4 border-[#1e6b3e]">
            <p class="text-[10px] font-black opacity-50 uppercase tracking-widest mb-1">Total Pipeline</p>
            <h2 id="total-count" class="text-4xl font-black">0</h2>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div onclick="filterByStatus('New')" class="glass-card p-4"><p class="text-[10px] font-bold opacity-50">NEW</p><h2 id="s-new" class="text-2xl font-black text-blue-500">0</h2></div>
            <div onclick="filterByStatus('Contacted')" class="glass-card p-4"><p class="text-[10px] font-bold opacity-50">CONTACTED</p><h2 id="s-cont" class="text-2xl font-black text-orange-500">0</h2></div>
            <div onclick="filterByStatus('Overdue')" class="glass-card p-4"><p class="text-[10px] font-bold text-red-500">OVERDUE</p><h2 id="s-over" class="text-2xl font-black text-red-500">0</h2></div>
            <div onclick="filterByStatus('Closed')" class="glass-card p-4"><p class="text-[10px] font-bold text-[#1e6b3e]">WON</p><h2 id="s-won" class="text-2xl font-black text-[#1e6b3e]">0</h2></div>
        </div>

        <div id="main-list" class="grid gap-4"></div>
    </div>

    <div id="page-calling" class="p-4 max-w-5xl mx-auto hidden-page">
        <h2 class="text-2xl font-black mb-6 mt-4">Calling Center</h2>
        
        <div id="calling-focus-card" class="glass-card p-8 text-center min-h-[400px] flex flex-col justify-center items-center shadow-2xl relative">
            <div id="no-leads-msg" class="hidden text-gray-400">
                <i class="fas fa-check-circle text-5xl mb-4 text-green-500"></i>
                <p class="font-bold">Sab khatam! Aaj koi calling pending nahi hai.</p>
            </div>

            <div id="active-call-ui" class="w-full">
                <div class="bg-[#1e6b3e]/10 text-[#1e6b3e] px-4 py-1 rounded-full text-xs font-bold inline-block mb-4">NEXT UP</div>
                <h3 id="call-name" class="text-3xl font-black mb-2">---</h3>
                <p id="call-phone" class="text-xl opacity-60 mb-8 font-medium">---</p>
                
                <div class="flex justify-center gap-4 mb-10">
                    <a id="call-btn" href="#" class="h-16 w-16 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-blue-500/30"><i class="fas fa-phone"></i></a>
                    <a id="wa-btn" href="#" class="h-16 w-16 bg-[#25D366] text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-green-500/30"><i class="fab fa-whatsapp"></i></a>
                </div>

                <div class="w-full max-w-xs mx-auto space-y-3">
                    <p class="text-[10px] font-bold opacity-40 uppercase">Update Outcome</p>
                    <select id="call-status" class="w-full p-4 rounded-2xl bg-gray-100 dark:bg-black outline-none border-none font-bold">
                        <option value="Interested">Interested</option>
                        <option value="Closed">Deal Won</option>
                        <option value="Contacted">Not Picking</option>
                    </select>
                    <input type="date" id="call-next-date" class="w-full p-4 rounded-2xl bg-gray-100 dark:bg-black outline-none border-none font-bold">
                    <button onclick="submitCallUpdate()" class="w-full bg-[#1e6b3e] text-white p-4 rounded-2xl font-black">SUBMIT & NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-[#141d16] border-t border-gray-100 dark:border-white/5 flex justify-around p-4 shadow-2xl z-[1000]">
        <button onclick="switchPage('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1 opacity-50 nav-active">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Pipeline</span>
        </button>
        <button onclick="switchPage('calling')" id="nav-calling" class="flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-phone-volume text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Calling</span>
        </button>
    </nav>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[2000]">
        <div class="bg-white dark:bg-[#141d16] w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-black mb-6 text-[#1e6b3e]">Lead Details</h2>
            <form id="leadForm" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="name" placeholder="Name" class="w-full bg-gray-100 dark:bg-black p-4 rounded-2xl outline-none" required>
                <input type="text" id="phone" placeholder="WhatsApp" class="w-full bg-gray-100 dark:bg-black p-4 rounded-2xl outline-none" required>
                <input type="date" id="fDate" class="w-full bg-gray-100 dark:bg-black p-4 rounded-2xl outline-none" required>
                <select id="status" class="w-full bg-gray-100 dark:bg-black p-4 rounded-2xl outline-none">
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Interested">Interested</option>
                    <option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-[#1e6b3e] text-white p-5 rounded-2xl font-black">SAVE CHANGES</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-400 font-bold py-2">Dismiss</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let leads = [];
        let currentCallingLead = null;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            localStorage.setItem('k_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if(localStorage.getItem('k_theme') === 'dark') toggleTheme();

        async function fetchLeads() {
            const res = await fetch(API);
            leads = await res.json();
            updateStats();
            render();
            setupNextCall();
        }

        function switchPage(page) {
            document.getElementById('page-dashboard').classList.add('hidden-page');
            document.getElementById('page-calling').classList.add('hidden-page');
            document.getElementById('nav-dashboard').classList.remove('nav-active');
            document.getElementById('nav-calling').classList.remove('nav-active');

            document.getElementById('page-' + page).classList.remove('hidden-page');
            document.getElementById('nav-' + page).classList.add('nav-active');
        }

        function setupNextCall() {
            const today = new Date().toISOString().split('T')[0];
            const pending = leads.filter(l => l.status !== 'Closed' && (l.followUpDate <= today || !l.followUpDate));
            
            if(pending.length > 0) {
                currentCallingLead = pending[0];
                document.getElementById('active-call-ui').classList.remove('hidden');
                document.getElementById('no-leads-msg').classList.add('hidden');
                document.getElementById('call-name').innerText = currentCallingLead.name;
                document.getElementById('call-phone').innerText = currentCallingLead.phone;
                document.getElementById('call-btn').href = "tel:" + currentCallingLead.phone;
                document.getElementById('wa-btn').href = "https://wa.me/91" + currentCallingLead.phone;
            } else {
                document.getElementById('active-call-ui').classList.add('hidden');
                document.getElementById('no-leads-msg').classList.remove('hidden');
            }
        }

        async function submitCallUpdate() {
            const btn = event.target;
            const newStatus = document.getElementById('call-status').value;
            const nextDate = document.getElementById('call-next-date').value;
            
            if(!nextDate) return alert("Bhai, next date toh daal do!");
            
            btn.innerText = "UPDATING...";
            await fetch(`${API}/id/${currentCallingLead.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: { status: newStatus, followUpDate: nextDate } })
            });
            
            btn.innerText = "SUBMIT & NEXT";
            fetchLeads();
        }

        // Dashboard functions (Same as previous but simplified for performance)
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            let s = { New:0, Contacted:0, Interested:0, Closed:0, Overdue:0 };
            leads.forEach(l => {
                s[l.status]++;
                if(l.followUpDate < today && l.status !== 'Closed') s.Overdue++;
            });
            document.getElementById('total-count').innerText = leads.length;
            document.getElementById('s-new').innerText = s.New;
            document.getElementById('s-cont').innerText = s.Contacted + s.Interested;
            document.getElementById('s-over').innerText = s.Overdue;
            document.getElementById('s-won').innerText = s.Closed;
        }

        function render() {
            const list = document.getElementById('main-list');
            list.innerHTML = '';
            leads.slice().reverse().forEach(l => {
                list.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center" onclick="openEditModal('${l.id}')">
                        <div>
                            <h4 class="font-bold">${l.name}</h4>
                            <p class="text-[10px] opacity-50 font-bold uppercase">${l.status} • ${l.followUpDate || 'No Date'}</p>
                        </div>
                        <i class="fas fa-chevron-right opacity-20"></i>
                    </div>`;
            });
        }

        function openEditModal(id) {
            const l = leads.find(x => x.id === id);
            document.getElementById('editId').value = l.id;
            document.getElementById('name').value = l.name;
            document.getElementById('phone').value = l.phone;
            document.getElementById('fDate').value = l.followUpDate || "";
            document.getElementById('status').value = l.status;
            toggleModal();
        }

        function toggleModal() { document.getElementById('leadModal').classList.toggle('hidden'); }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = { 
                name: document.getElementById('name').value, 
                phone: document.getElementById('phone').value, 
                status: document.getElementById('status').value, 
                followUpDate: document.getElementById('fDate').value 
            };
            await fetch(`${API}/id/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data}) });
            toggleModal(); fetchLeads();
        });

        window.onload = fetchLeads;
    </script>
</body>
</html>
