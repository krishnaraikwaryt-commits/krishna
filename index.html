<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Nexus CRM | Pro Intelligence</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --brand-primary: #6366f1; 
            --brand-dark: #0f172a; 
            --surface-100: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        /* Theme Engine Styles */
        body.theme-midnight { --brand-primary: #818cf8; --brand-dark: #f8fafc; --surface-100: #020617; --card-bg: rgba(30, 41, 59, 0.8); }
        body.theme-emerald { --brand-primary: #10b981; --brand-dark: #064e3b; --surface-100: #ecfdf5; --card-bg: rgba(255, 255, 255, 0.9); }
        body.theme-rose { --brand-primary: #f43f5e; --brand-dark: #4c0519; --surface-100: #fff1f2; --card-bg: rgba(255, 255, 255, 0.9); }

        body { font-family: 'Inter', sans-serif; background-color: var(--surface-100); color: var(--brand-dark); transition: all 0.3s ease; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.5); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .active-link { color: var(--brand-primary) !important; background: rgba(99, 102, 241, 0.1); border-right: 4px solid var(--brand-primary); }
        .lead-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .lead-card:hover { transform: translateY(-2px); border-color: var(--brand-primary); }
        .stat-card { cursor: pointer; transition: transform 0.2s; }
        .stat-card:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        .alert-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .strike-text { text-decoration: line-through; opacity: 0.6; }
        
        /* Theme Circle Buttons */
        .theme-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="overflow-x-hidden">

    <script>
        const BrandConfig = {
            name: "Nexus", 
            accent: "CRM",
            logo: "https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss" 
        };
    </script>

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[2.5rem] p-10 text-center">
            <img id="login-logo" src="" class="w-24 h-24 mx-auto mb-6 rounded-3xl shadow-2xl object-cover border-4 border-white/20">
            <h1 class="text-3xl font-black text-slate-900">
                <span id="l-name"></span><span class="text-indigo-600" id="l-accent"></span>
            </h1>
            <p class="text-slate-500 mt-2 mb-8 font-medium italic">Intelligence Systems</p>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="PIN" class="w-full p-5 rounded-2xl bg-slate-100 border-none outline-none text-center text-2xl font-bold tracking-[0.5em]">
        </div>
    </div>

    <div id="app-shell" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex-shrink-0 flex flex-col">
            <div class="hidden md:flex items-center gap-3 mb-10 px-2">
                <img id="side-logo" src="" class="w-10 h-10 rounded-xl shadow-sm object-cover">
                <div class="flex flex-col">
                    <span class="font-black text-xl leading-tight text-slate-900" id="s-name"></span>
                    <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Pro Edition</span>
                </div>
            </div>
            
            <nav class="flex md:flex-col gap-2 flex-1">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500 active-link"><i class="fas fa-th-large"></i> Dashboard</button>
                
                <div class="py-4 px-2 space-y-2 border-y border-slate-100 my-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2">Tools</p>
                    <button onclick="System.exportCSV()" class="w-full flex items-center gap-3 p-3 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50"><i class="fas fa-file-export text-indigo-500"></i> Export CSV</button>
                    <label class="w-full flex items-center gap-3 p-3 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 cursor-pointer">
                        <i class="fas fa-file-import text-emerald-500"></i> Import CSV
                        <input type="file" id="csv-import" accept=".csv" class="hidden" onchange="System.importCSV(this)">
                    </label>
                </div>

                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500"><i class="fas fa-list"></i> Pipeline</button>
                <button onclick="UI.navigate('closed')" id="btn-closed" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500"><i class="fas fa-check-double"></i> Closed</button>
            </nav>

            <div class="p-4 bg-slate-50 rounded-2xl mt-4">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-3 tracking-tighter">System Appearance</p>
                <div class="flex justify-between items-center">
                    <div onclick="UI.setTheme('default')" class="theme-dot bg-indigo-500" title="Indigo"></div>
                    <div onclick="UI.setTheme('midnight')" class="theme-dot bg-slate-900" title="Midnight"></div>
                    <div onclick="UI.setTheme('emerald')" class="theme-dot bg-emerald-500" title="Emerald"></div>
                    <div onclick="UI.setTheme('rose')" class="theme-dot bg-rose-500" title="Rose"></div>
                </div>
            </div>

            <button onclick="localStorage.removeItem('userLogin'); location.reload();" class="mt-6 text-red-400 text-xs font-bold text-left px-4 opacity-50 hover:opacity-100"><i class="fas fa-power-off"></i> LOGOUT</button>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
            <header class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="view-title" class="text-4xl font-black text-slate-900 tracking-tight">Intelligence</h2>
                    <p class="text-slate-500 font-medium mt-1" id="live-timer"></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
                    <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg text-sm md:text-base">+ Add Lead</button>
                </div>
            </header>

            <div id="system-alerts" class="mb-6 space-y-2"></div>

            <section id="view-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div onclick="UI.navigate('closed')" class="stat-card glass-panel p-6 rounded-3xl border-b-4 border-indigo-500"><p class="text-[10px] font-black text-indigo-500 uppercase">Revenue</p><h3 id="meta-revenue" class="text-2xl font-black mt-1">₹0</h3></div>
                    <div onclick="UI.filterDashboard('overdue')" class="stat-card glass-panel p-6 rounded-3xl border-b-4 border-red-500"><p class="text-[10px] font-black text-red-500 uppercase">Overdue</p><h3 id="meta-overdue" class="text-2xl font-black mt-1">0</h3></div>
                    <div onclick="UI.filterDashboard('today')" class="stat-card glass-panel p-6 rounded-3xl border-b-4 border-emerald-500"><p class="text-[10px] font-black text-emerald-500 uppercase">Today</p><h3 id="meta-today" class="text-2xl font-black mt-1">0</h3></div>
                    <div onclick="UI.navigate('leads')" class="stat-card glass-panel p-6 rounded-3xl bg-indigo-600 text-white"><p class="text-[10px] font-black opacity-70 uppercase">Total Leads</p><h3 id="meta-total" class="text-2xl font-black mt-1">0</h3></div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h4 id="grid-title" class="text-lg font-black text-slate-800 flex items-center gap-2"><i class="fas fa-calendar-day text-indigo-500"></i> Active Focus</h4>
                        <button onclick="UI.renderAll()" class="text-[10px] font-bold text-indigo-600 underline">Reset View</button>
                    </div>
                    <div id="today-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <input type="text" id="lead-search" oninput="UI.search('full-pipeline')" placeholder="Search pipeline..." class="w-full p-5 rounded-3xl glass-panel outline-none border-none">
                <div id="full-pipeline" class="space-y-3"></div>
            </section>

            <section id="view-closed" class="hidden space-y-6">
                <div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                    <h4 class="font-black text-emerald-700 uppercase text-xs tracking-widest">Success Archive</h4>
                </div>
                <div id="closed-pipeline" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Lead Intel</h2>
            <form id="core-form" class="space-y-4">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="entry-name" placeholder="Name" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <input type="tel" id="entry-phone" placeholder="Phone" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                        <option value="Prospect">Prospect</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Closed Won">Closed Won</option>
                        <option value="Closed Lost">Closed Lost</option>
                    </select>
                    <input type="date" id="entry-date" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                </div>
                <input type="number" id="entry-value" placeholder="Value ₹" class="w-full p-4 rounded-2xl bg-slate-50 outline-none">
                <textarea id="entry-note" placeholder="Note..." class="w-full p-4 rounded-2xl bg-slate-50 outline-none"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black">SAVE</button>
                    <button type="button" onclick="UI.modal('close')" class="px-6 py-4 rounded-2xl bg-slate-100 text-slate-400 font-bold">X</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            Today: new Date().toISOString().split('T')[0],
            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    localStorage.setItem('userLogin', 'true');
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },
            sync: async () => {
                const icon = document.getElementById('sync-icon');
                icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } finally { icon.classList.remove('fa-spin'); }
            },
            delete: async (id) => {
                if(confirm("Confirm Delete?")) {
                    await fetch(`${System.API}/id/${id}`, { method: 'DELETE' });
                    System.sync();
                }
            },
            toggleStatus: async (id, current) => {
                const nextStatus = current === 'Closed Won' ? 'Prospect' : 'Closed Won';
                await fetch(`${System.API}/id/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: {status: nextStatus}})
                });
                System.sync();
            },
            // NEW: Export Functionality
            exportCSV: () => {
                if(System.Data.length === 0) return alert("No data to export");
                const headers = Object.keys(System.Data[0]).join(",");
                const rows = System.Data.map(l => Object.values(l).join(","));
                const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows.join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `Nexus_CRM_Backup_${System.Today}.csv`);
                document.body.appendChild(link);
                link.click();
            },
            // NEW: Import Functionality
            importCSV: (input) => {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.split("\n");
                    const importedData = [];
                    const headers = lines[0].split(",");
                    
                    for(let i = 1; i < lines.length; i++) {
                        if(!lines[i]) continue;
                        const obj = {};
                        const currentline = lines[i].split(",");
                        headers.forEach((h, index) => obj[h.trim()] = currentline[index].trim());
                        importedData.push(obj);
                    }
                    
                    if(confirm(`Import ${importedData.length} leads?`)) {
                        await fetch(System.API, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({data: importedData})
                        });
                        System.sync();
                    }
                };
                reader.readAsText(file);
            }
        };

        const UI = {
            setTheme: (theme) => {
                document.body.className = theme === 'default' ? '' : `theme-${theme}`;
                localStorage.setItem('crmTheme', theme);
            },
            navigate: (view) => {
                ['dashboard', 'leads', 'closed'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
                    document.getElementById(`btn-${v}`).classList.toggle('active-link', v === view);
                });
            },
            filterDashboard: (type) => {
                let filtered = System.Data.filter(l => {
                    const isClosed = l.status.includes('Closed');
                    if(type === 'overdue') return l.followUpDate && l.followUpDate < System.Today && !isClosed;
                    if(type === 'today') return l.followUpDate === System.Today && !isClosed;
                    return false;
                });
                document.getElementById('grid-title').innerText = type.toUpperCase() + " FOCUS";
                document.getElementById('today-grid').innerHTML = filtered.map(UI.cardTemplate).join('');
            },
            cardTemplate: (l) => {
                const isClosed = l.status === 'Closed Won';
                return `
                <div class="glass-panel p-5 rounded-3xl lead-card flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <button onclick="System.toggleStatus('${l.id}', '${l.status}')" class="w-6 h-6 rounded-full border-2 border-indigo-200 flex items-center justify-center transition-all ${isClosed ? 'bg-indigo-600 border-indigo-600' : ''}">
                            ${isClosed ? '<i class="fas fa-check text-[10px] text-white"></i>' : ''}
                        </button>
                        <div onclick="UI.modal('open', '${l.id}')" class="${isClosed ? 'strike-text' : ''}">
                            <h5 class="font-bold text-slate-800 text-sm">${l.name}</h5>
                            <p class="text-[9px] font-black ${l.followUpDate < System.Today && !l.status.includes('Closed') ? 'text-red-500' : 'text-slate-400'} uppercase">
                                ${l.status} • ${l.followUpDate || 'No Date'}
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                         <a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" class="w-8 h-8 bg-green-50 text-green-600 rounded-xl flex items-center justify-center text-xs"><i class="fab fa-whatsapp"></i></a>
                         <a href="tel:${l.phone}" class="w-8 h-8 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xs"><i class="fas fa-phone-alt"></i></a>
                         <button onclick="System.delete('${l.id}')" class="w-8 h-8 bg-red-50 text-red-400 rounded-xl flex items-center justify-center text-xs"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `},
            renderAll: () => {
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                const overdue = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && !l.status.includes('Closed'));
                const todayTasks = System.Data.filter(l => l.followUpDate === System.Today && !l.status.includes('Closed'));
                const closed = System.Data.filter(l => l.status.includes('Closed'));

                const alertBox = document.getElementById('system-alerts');
                alertBox.innerHTML = '';
                if(overdue.length > 0) alertBox.innerHTML += `<div class="bg-red-500 text-white p-3 rounded-2xl text-xs font-bold alert-pulse"><i class="fas fa-exclamation-triangle"></i> ATTENTION: ${overdue.length} Overdue leads detected!</div>`;
                if(todayTasks.length > 0) alertBox.innerHTML += `<div class="bg-indigo-600 text-white p-3 rounded-2xl text-xs font-bold"><i class="fas fa-bell"></i> ACTION: ${todayTasks.length} Follow-ups scheduled for today.</div>`;

                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('meta-overdue').innerText = overdue.length;
                document.getElementById('meta-today').innerText = todayTasks.length;

                document.getElementById('grid-title').innerHTML = `<i class="fas fa-calendar-day text-indigo-500"></i> Today's Schedule`;
                document.getElementById('today-grid').innerHTML = todayTasks.map(UI.cardTemplate).join('');
                document.getElementById('full-pipeline').innerHTML = System.Data.slice().reverse().map(UI.cardTemplate).join('');
                document.getElementById('closed-pipeline').innerHTML = closed.map(UI.cardTemplate).join('');
                document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            },
            modal: (action, id = null) => {
                const m = document.getElementById('lead-modal');
                if(action === 'open') {
                    m.classList.remove('hidden');
                    document.getElementById('core-form').reset();
                    document.getElementById('entry-id').value = '';
                    if(id) {
                        const l = System.Data.find(x => x.id === id);
                        document.getElementById('entry-id').value = l.id;
                        document.getElementById('entry-name').value = l.name;
                        document.getElementById('entry-phone').value = l.phone;
                        document.getElementById('entry-status').value = l.status;
                        document.getElementById('entry-date').value = l.followUpDate;
                        document.getElementById('entry-value').value = l.value;
                        document.getElementById('entry-note').value = l.note || '';
                    }
                } else m.classList.add('hidden');
            },
            search: (targetId) => {
                const term = document.getElementById('lead-search').value.toLowerCase();
                const filtered = System.Data.filter(l => l.name.toLowerCase().includes(term) || l.phone.includes(term));
                document.getElementById(targetId).innerHTML = filtered.map(UI.cardTemplate).join('');
            }
        };

        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('entry-id').value;
            const payload = {
                id: id || "NX" + Date.now(),
                name: document.getElementById('entry-name').value,
                phone: document.getElementById('entry-phone').value,
                status: document.getElementById('entry-status').value,
                value: document.getElementById('entry-value').value || 0,
                followUpDate: document.getElementById('entry-date').value,
                note: document.getElementById('entry-note').value
            };
            await fetch(id ? `${System.API}/id/${id}` : System.API, { 
                method: id ? 'PATCH' : 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({data: id ? payload : [payload]}) 
            });
            UI.modal('close'); System.sync();
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-logo').src = BrandConfig.logo;
            document.getElementById('side-logo').src = BrandConfig.logo;
            document.getElementById('l-name').innerText = BrandConfig.name;
            document.getElementById('l-accent').innerText = BrandConfig.accent;
            document.getElementById('s-name').innerText = BrandConfig.name;
            document.title = `${BrandConfig.name}${BrandConfig.accent} | Intel`;

            // Theme restore
            const savedTheme = localStorage.getItem('crmTheme');
            if(savedTheme) UI.setTheme(savedTheme);

            if(localStorage.getItem('userLogin') === 'true') {
                document.getElementById('auth-gateway').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                System.sync();
            }
        });
    </script>
</body>
</html>
