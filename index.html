<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="tab-title">Nexus CRM | Pro Intelligence</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1RS8RUHTSTl5X6XeuJU3DDF9ETbqC87ss">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --brand-primary: #6366f1; 
            --brand-dark: #0f172a; 
            --surface-100: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body.theme-midnight { --brand-primary: #818cf8; --brand-dark: #f8fafc; --surface-100: #020617; --card-bg: rgba(30, 41, 59, 0.8); }
        body.theme-emerald { --brand-primary: #10b981; --brand-dark: #064e3b; --surface-100: #ecfdf5; --card-bg: rgba(255, 255, 255, 0.9); }
        body.theme-rose { --brand-primary: #f43f5e; --brand-dark: #4c0519; --surface-100: #fff1f2; --card-bg: rgba(255, 255, 255, 0.9); }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--surface-100); 
            color: var(--brand-dark); 
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); 
        }

        .active-link { 
            color: var(--brand-primary) !important; 
            background: rgba(99, 102, 241, 0.08); 
            border-radius: 18px;
        }

        /* FIX: Prevent Sidebar and Mobile Nav overlap */
        @media (min-width: 769px) {
            .mobile-nav { display: none !important; }
            .main-content { margin-left: 16rem; }
        }

        @media (max-width: 768px) {
            .sidebar-desktop { display: none !important; }
            .main-content { padding: 20px; padding-bottom: 120px; width: 100%; }
            .mobile-nav {
                display: flex;
                position: fixed; 
                bottom: 0; left: 0; right: 0;
                background: rgba(255,255,255,0.85);
                backdrop-filter: blur(25px);
                border-top: 1px solid rgba(0,0,0,0.05);
                z-index: 100;
                padding: 12px 20px 28px 20px;
                justify-content: space-around;
            }
        }

        .theme-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-950 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[3rem] p-10 text-center">
            <img id="login-logo" src="" class="w-24 h-24 mx-auto mb-6 rounded-[2rem] shadow-2xl object-cover border-4 border-white/10">
            <h1 class="text-3xl font-extrabold text-slate-900">
                <span id="l-name">Nexus</span><span class="text-indigo-600" id="l-accent">CRM</span>
            </h1>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="PIN" class="w-full p-5 rounded-3xl bg-slate-100 text-center text-3xl font-bold tracking-[0.5em] mt-8">
        </div>
    </div>

    <div id="app-shell" class="hidden min-h-screen flex flex-col">
        
        <aside class="sidebar-desktop fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-100 p-6 flex flex-col z-50">
            <div class="flex items-center gap-3 mb-10 px-2">
                <img id="side-logo" src="" class="w-10 h-10 rounded-xl shadow-sm object-cover">
                <span class="font-black text-xl leading-tight" id="s-name">Nexus</span>
            </div>
            
            <nav class="flex flex-col gap-2 flex-1">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500 active-link"><i class="fas fa-home"></i> Dashboard</button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500"><i class="fas fa-rocket"></i> Pipeline</button>
                <button onclick="UI.navigate('closed')" id="btn-closed" class="flex items-center gap-3 p-4 rounded-2xl font-bold text-slate-500"><i class="fas fa-crown"></i> Success</button>
            </nav>

            <div class="p-5 bg-slate-50 rounded-[2rem]">
                <div class="flex justify-between items-center">
                    <div onclick="UI.setTheme('default')" class="theme-dot bg-indigo-500"></div>
                    <div onclick="UI.setTheme('midnight')" class="theme-dot bg-slate-900"></div>
                    <div onclick="UI.setTheme('emerald')" class="theme-dot bg-emerald-500"></div>
                    <div onclick="UI.setTheme('rose')" class="theme-dot bg-rose-500"></div>
                </div>
            </div>
        </aside>

        <nav class="mobile-nav">
            <button onclick="UI.navigate('dashboard')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold">Home</span></button>
            <button onclick="UI.navigate('leads')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-rocket text-xl"></i><span class="text-[10px] font-bold">Leads</span></button>
            <button onclick="UI.modal('open')" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg -mt-10 border-4 border-white"><i class="fas fa-plus"></i></button>
            <button onclick="UI.navigate('closed')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-crown text-xl"></i><span class="text-[10px] font-bold">Closed</span></button>
            <button onclick="System.sync()" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-sync text-xl"></i><span class="text-[10px] font-bold">Sync</span></button>
        </nav>

        <main class="flex-1 main-content p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl font-black text-slate-900">Intelligence</h2>
                    <p class="text-slate-400 text-sm font-bold" id="live-timer"></p>
                </div>
                <button onclick="UI.modal('open')" class="hidden md:block bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold">+ Add Lead</button>
            </header>

            <div id="system-alerts" class="mb-6 space-y-3"></div>

            <section id="view-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="stat-card glass-panel p-5 border-b-4 border-indigo-500">
                        <p class="text-[10px] font-black text-indigo-500 uppercase">Revenue</p>
                        <h3 id="meta-revenue" class="text-xl font-black mt-1">₹0</h3>
                    </div>
                    <div class="stat-card glass-panel p-5 border-b-4 border-red-500">
                        <p class="text-[10px] font-black text-red-500 uppercase">Overdue</p>
                        <h3 id="meta-overdue" class="text-xl font-black mt-1">0</h3>
                    </div>
                </div>
                <div id="today-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <div id="full-pipeline" class="space-y-4"></div>
            </section>

            <section id="view-closed" class="hidden space-y-6">
                <div id="closed-pipeline" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-950/40 backdrop-blur-md flex items-end md:items-center justify-center">
        <div class="bg-white w-full max-w-xl rounded-t-[3rem] md:rounded-[3rem] p-8 md:p-10">
            <h2 class="text-2xl font-black mb-8">Lead Intel</h2>
            <form id="core-form" class="space-y-5">
                <input type="hidden" id="entry-id">
                <input type="text" id="entry-name" placeholder="Name" class="w-full p-4 rounded-2xl bg-slate-50" required>
                <input type="tel" id="entry-phone" placeholder="Phone" class="w-full p-4 rounded-2xl bg-slate-50" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="p-4 rounded-2xl bg-slate-50">
                        <option value="Prospect">Prospect</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Closed Won">Closed Won</option>
                    </select>
                    <input type="date" id="entry-date" class="p-4 rounded-2xl bg-slate-50">
                </div>
                <input type="number" id="entry-value" placeholder="Value (₹)" class="w-full p-4 rounded-2xl bg-slate-50">
                <div class="flex gap-4 pt-4">
                    <button type="submit" id="submit-btn" class="flex-1 bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black">SAVE LEAD</button>
                    <button type="button" onclick="UI.modal('close')" class="px-8 py-5 rounded-[1.5rem] bg-slate-100">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    document.getElementById('auth-gateway').style.display = 'none';
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },
            sync: async () => {
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } catch(err) { console.error("Sync Failed"); }
            }
        };

        const UI = {
            navigate: (view) => {
                ['dashboard', 'leads', 'closed'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
                    if(document.getElementById(`btn-${v}`)) document.getElementById(`btn-${v}`).classList.toggle('active-link', v === view);
                });
            },
            modal: (action) => {
                const m = document.getElementById('lead-modal');
                if(action === 'open') {
                    m.classList.remove('hidden');
                    document.getElementById('core-form').reset();
                    document.getElementById('entry-id').value = '';
                } else m.classList.add('hidden');
            },
            renderAll: () => {
                const container = document.getElementById('today-grid');
                container.innerHTML = System.Data.map(l => `
                    <div class="glass-panel p-5 rounded-[2rem] flex justify-between items-center">
                        <div>
                            <h5 class="font-bold">${l.name}</h5>
                            <p class="text-[10px] uppercase text-slate-400">${l.status} • ₹${l.value}</p>
                        </div>
                        <a href="tel:${l.phone}" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                    </div>
                `).join('');
            }
        };

        // FIXED: ADD LEAD FUNCTIONALITY
        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const payload = {
                id: "NX" + Date.now(),
                name: document.getElementById('entry-name').value,
                phone: document.getElementById('entry-phone').value,
                status: document.getElementById('entry-status').value,
                value: document.getElementById('entry-value').value || 0,
                followUpDate: document.getElementById('entry-date').value,
                note: ""
            };

            try {
                const response = await fetch(System.API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [payload] })
                });

                if (response.ok) {
                    UI.modal('close');
                    System.sync();
                } else {
                    alert("Submission failed. Check API limits.");
                }
            } catch (err) {
                alert("Error connecting to database.");
            } finally {
                btn.innerText = "SAVE LEAD"; btn.disabled = false;
            }
        });

        document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
    </script>
</body>
</html>
