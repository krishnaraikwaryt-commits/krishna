<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus CRM | Pro Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --brand-primary: #6366f1; --brand-dark: #0f172a; --surface-100: #f8fafc; --sidebar-bg: #ffffff;
            --bg-image: none;
        }

        /* Themes */
        body.theme-midnight { --brand-primary: #38bdf8; --brand-dark: #f8fafc; --surface-100: #0f172a; --sidebar-bg: #1e293b; }
        body.theme-forest { --brand-primary: #10b981; --brand-dark: #064e3b; --surface-100: #f0fdf4; --sidebar-bg: #ffffff; }
        body.theme-sunset { --brand-primary: #f43f5e; --brand-dark: #4c0519; --surface-100: #fff1f2; --sidebar-bg: #ffffff; }
        body.theme-electric { --brand-primary: #8b5cf6; --brand-dark: #ffffff; --surface-100: #1e1b4b; --sidebar-bg: #312e81; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--surface-100); 
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--brand-dark); 
            transition: all 0.3s ease; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism */
        aside { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-right: 1px solid rgba(0,0,0,0.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        body.theme-midnight .glass-panel, body.theme-electric .glass-panel { background: rgba(15, 23, 42, 0.7); border-color: rgba(255,255,255,0.1); color: #f8fafc; }
        
        .active-link { color: var(--brand-primary) !important; background: rgba(99, 102, 241, 0.1); border-right: 4px solid var(--brand-primary); }
        
        /* Mobile Bottom Nav Active State */
        .mobile-active { color: var(--brand-primary); transform: translateY(-5px); }

        /* Floating Action Button */
        .fab { position: fixed; bottom: 85px; right: 20px; z-index: 50; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }

        .lead-card { transition: all 0.2s ease; border: 1px solid transparent; }
        .alert-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .hidden { display: none !important; }
        .theme-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .wallpaper-dot { width: 35px; height: 25px; border-radius: 6px; cursor: pointer; background-size: cover; border: 1px solid #ddd; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="overflow-x-hidden" onload="System.checkAuth()">

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6 text-white">
        <div class="max-w-md w-full glass-panel rounded-[2.5rem] p-10 text-center">
            <h1 class="text-3xl font-black mb-6">Nexus<span class="text-indigo-600">CRM</span></h1>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="ENTER PIN" class="w-full p-5 rounded-2xl bg-slate-100 text-slate-900 text-center text-2xl font-bold tracking-[0.5em] outline-none">
        </div>
    </div>

    <div id="app-shell" class="hidden flex flex-col md:flex-row pb-24 md:pb-0">
        
        <aside class="hidden md:flex w-64 p-6 flex-col min-h-screen sticky top-0">
            <div class="flex items-center gap-3 mb-10 font-black text-xl"><i class="fas fa-cube text-indigo-600"></i> Nexus CRM</div>
            <nav class="flex flex-col gap-2">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex items-center gap-3 p-4 rounded-xl font-bold active-link"><i class="fas fa-th-large"></i> Dashboard</button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500"><i class="fas fa-list"></i> Pipeline</button>
                <button onclick="UI.navigate('clients')" id="btn-clients" class="flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500"><i class="fas fa-user-tie"></i> Clients</button>
            </nav>

            <div class="mt-8 px-2 space-y-6">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Themes</p>
                    <div class="flex flex-wrap gap-2">
                        <div onclick="System.setTheme('default')" class="theme-dot bg-indigo-600"></div>
                        <div onclick="System.setTheme('midnight')" class="theme-dot bg-slate-900"></div>
                        <div onclick="System.setTheme('forest')" class="theme-dot bg-emerald-600"></div>
                        <div onclick="System.setTheme('sunset')" class="theme-dot bg-rose-500"></div>
                    </div>
                </div>
                <button onclick="System.logout()" class="text-red-400 font-bold flex items-center gap-2"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="flex-1 p-5 md:p-10 max-w-6xl mx-auto w-full relative z-10">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl md:text-4xl font-black tracking-tight">Intelligence</h2>
                    <p id="live-timer" class="text-slate-500 font-medium"></p>
                </div>
                <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
            </header>

            <section id="view-dashboard" class="space-y-6">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <div onclick="UI.filterBy('revenue')" class="stat-card glass-panel p-5 rounded-3xl"><p class="text-[10px] font-black text-indigo-500 uppercase">Revenue</p><h3 id="meta-revenue" class="text-xl font-black mt-1">₹0</h3></div>
                    <div onclick="UI.filterBy('overdue')" class="stat-card glass-panel p-5 rounded-3xl"><p class="text-[10px] font-black text-red-500 uppercase">Overdue</p><h3 id="meta-overdue" class="text-xl font-black mt-1">0</h3></div>
                    <div onclick="UI.filterBy('today')" class="stat-card glass-panel p-5 rounded-3xl"><p class="text-[10px] font-black text-emerald-500 uppercase">Today</p><h3 id="meta-today" class="text-xl font-black mt-1">0</h3></div>
                    <div onclick="UI.navigate('clients')" class="stat-card glass-panel p-5 rounded-3xl"><p class="text-[10px] font-black text-amber-500 uppercase">Closed</p><h3 id="meta-closed" class="text-xl font-black mt-1">0</h3></div>
                    <div onclick="UI.filterBy('all')" class="stat-card glass-panel p-5 rounded-3xl bg-indigo-600 text-white shadow-lg md:col-span-1 col-span-2"><p class="text-[10px] font-black opacity-70 uppercase">Total Leads</p><h3 id="meta-total" class="text-xl font-black mt-1">0</h3></div>
                </div>
                <div id="alert-container" class="space-y-3"></div>
                <div>
                    <h4 class="font-black mb-4 flex items-center gap-2"><i class="fas fa-calendar-check text-indigo-500"></i> Task Queue</h4>
                    <div id="today-grid" class="space-y-3"></div>
                </div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <input type="text" id="lead-search" oninput="UI.search('full-pipeline')" placeholder="Search in pipeline..." class="w-full p-5 rounded-[2rem] glass-panel outline-none shadow-sm">
                <div id="full-pipeline" class="space-y-3"></div>
            </section>

            <section id="view-clients" class="hidden space-y-6">
                <div class="bg-indigo-600 p-6 rounded-[2rem] text-white flex justify-between items-center shadow-xl">
                    <div><h3 class="text-xl font-black">Success Hub</h3><p class="opacity-80 text-xs">Converted Clients</p></div>
                    <i class="fas fa-trophy text-3xl opacity-30"></i>
                </div>
                <input type="text" id="client-search" oninput="UI.search('client-list')" placeholder="Search clients..." class="w-full p-5 rounded-[2rem] glass-panel outline-none shadow-sm">
                <div id="client-list" class="space-y-3"></div>
            </section>
        </main>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t p-4 flex justify-around items-center z-[100] rounded-t-[2.5rem] shadow-2xl">
            <button onclick="UI.navigate('dashboard')" id="m-btn-dashboard" class="flex flex-col items-center gap-1 font-bold text-slate-400 mobile-active">
                <i class="fas fa-home text-xl"></i><span class="text-[10px]">Home</span>
            </button>
            <button onclick="UI.navigate('leads')" id="m-btn-leads" class="flex flex-col items-center gap-1 font-bold text-slate-400">
                <i class="fas fa-chart-line text-xl"></i><span class="text-[10px]">Pipeline</span>
            </button>
            <button onclick="UI.navigate('clients')" id="m-btn-clients" class="flex flex-col items-center gap-1 font-bold text-slate-400">
                <i class="fas fa-users text-xl"></i><span class="text-[10px]">Clients</span>
            </button>
            <button onclick="System.logout()" class="flex flex-col items-center gap-1 font-bold text-red-400">
                <i class="fas fa-power-off text-xl"></i><span class="text-[10px]">Exit</span>
            </button>
        </nav>

        <button onclick="UI.modal('open')" class="fab bg-indigo-600 text-white transition-transform active:scale-90">
            <i class="fas fa-plus text-2xl"></i>
        </button>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black mb-6 flex items-center gap-2"><i class="fas fa-pen-nib text-indigo-500"></i> Entry Details</h2>
            <form id="core-form" class="space-y-4">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="entry-name" placeholder="Full Name" class="p-4 rounded-2xl bg-slate-50 outline-none w-full" required>
                    <input type="tel" id="entry-phone" placeholder="Phone Number" class="p-4 rounded-2xl bg-slate-50 outline-none w-full" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                        <option value="Prospect">Prospect</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Closed Won">Closed Won</option>
                        <option value="Closed Lost">Closed Lost</option>
                    </select>
                    <input type="date" id="entry-date" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                </div>
                <input type="number" id="entry-value" placeholder="Deal Value ₹" class="w-full p-4 rounded-2xl bg-slate-50 outline-none">
                <textarea id="entry-note" placeholder="Quick notes about this lead..." class="w-full p-4 rounded-2xl bg-slate-50 outline-none h-24"></textarea>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">CONFIRM SAVE</button>
                    <button type="button" onclick="UI.modal('close')" class="px-6 rounded-2xl bg-slate-100 text-slate-400 font-bold">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            Today: new Date().toISOString().split('T')[0],

            setTheme: (theme) => {
                document.body.classList.remove('theme-midnight', 'theme-forest', 'theme-sunset', 'theme-electric');
                if(theme !== 'default') document.body.classList.add(`theme-${theme}`);
                localStorage.setItem('nexus_theme', theme);
            },

            setWP: (url) => {
                if(url === 'none') {
                    document.body.style.setProperty('--bg-image', 'none');
                    localStorage.removeItem('nexus_wp');
                } else {
                    document.body.style.setProperty('--bg-image', `url('${url}')`);
                    localStorage.setItem('nexus_wp', url);
                }
            },

            checkAuth: () => {
                System.setTheme(localStorage.getItem('nexus_theme') || 'default');
                System.setWP(localStorage.getItem('nexus_wp') || 'none');
                if(localStorage.getItem('nexus_auth') === 'true') {
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },

            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    localStorage.setItem('nexus_auth', 'true');
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                } else {
                    alert("Wrong PIN");
                    document.getElementById('sys-pin').value = '';
                }
            },

            logout: () => { if(confirm("Logout?")) { localStorage.removeItem('nexus_auth'); location.reload(); } },

            sync: async () => {
                const icon = document.getElementById('sync-icon');
                if(icon) icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } catch(e) { console.error("Sync Failed", e); }
                finally { if(icon) icon.classList.remove('fa-spin'); }
            },

            autoCallLog: async (id, phone) => {
                window.location.href = `tel:${phone}`;
                const timestamp = new Date().toLocaleString();
                const lead = System.Data.find(l => l.id === id);
                if(lead) {
                    const updatedNote = `${lead.note || ''}\n[AUTO-LOG]: Call on ${timestamp}`.trim();
                    await fetch(`${System.API}/id/${id}`, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({data: { note: updatedNote }})
                    });
                    System.sync();
                }
            }
        };

        const UI = {
            navigate: (view) => {
                // Desktop Nav
                ['dashboard', 'leads', 'clients'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.add('hidden');
                    document.getElementById(`btn-${v}`).classList.remove('active-link');
                    document.getElementById(`m-btn-${v}`).classList.remove('mobile-active');
                });
                
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.getElementById(`btn-${view}`).classList.add('active-link');
                document.getElementById(`m-btn-${view}`).classList.add('mobile-active');
                
                const titles = { 'dashboard': 'Intelligence', 'leads': 'Pipeline', 'clients': 'Success Hub' };
                document.getElementById('view-title').innerText = titles[view];
                window.scrollTo(0,0);
            },

            modal: (action, id = null) => {
                const m = document.getElementById('lead-modal');
                if(action === 'open') {
                    m.classList.remove('hidden');
                    if(id) {
                        const l = System.Data.find(x => x.id === id);
                        document.getElementById('entry-id').value = l.id;
                        document.getElementById('entry-name').value = l.name;
                        document.getElementById('entry-phone').value = l.phone;
                        document.getElementById('entry-status').value = l.status;
                        document.getElementById('entry-value').value = l.value;
                        document.getElementById('entry-date').value = l.followUpDate || '';
                        document.getElementById('entry-note').value = l.note || '';
                    } else { 
                        document.getElementById('core-form').reset(); 
                        document.getElementById('entry-id').value = ''; 
                    }
                } else { m.classList.add('hidden'); }
            },

            card: (l) => `
                <div class="glass-panel p-5 rounded-3xl flex justify-between items-center animate-fade-in border-l-4 ${l.status === 'Closed Won' ? 'border-emerald-500' : 'border-indigo-100'}">
                    <div onclick="UI.modal('open', '${l.id}')" class="flex-1">
                        <h5 class="font-bold text-slate-800">${l.name}</h5>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider">${l.status} • ₹${l.value}</p>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="System.autoCallLog('${l.id}', '${l.phone}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i class="fas fa-phone-alt"></i></button>
                         <a href="https://wa.me/91${l.phone}" target="_blank" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `,

            renderAll: () => {
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                const overdue = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && l.status !== 'Closed Won' && l.status !== 'Closed Lost');
                const todayTasks = System.Data.filter(l => l.followUpDate === System.Today && l.status !== 'Closed Won');
                const clients = System.Data.filter(l => l.status === 'Closed Won');

                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('meta-overdue').innerText = overdue.length;
                document.getElementById('meta-today').innerText = todayTasks.length;
                document.getElementById('meta-closed').innerText = clients.length;

                document.getElementById('full-pipeline').innerHTML = System.Data.length ? System.Data.slice().reverse().map(UI.card).join('') : `<p class="text-center py-10 opacity-50">Empty Pipeline</p>`;
                document.getElementById('client-list').innerHTML = clients.length ? clients.slice().reverse().map(UI.card).join('') : `<p class="text-center py-10 opacity-50">No clients yet</p>`;
                document.getElementById('today-grid').innerHTML = todayTasks.length ? todayTasks.map(UI.card).join('') : `<p class="text-center py-10 opacity-50 text-xs">No tasks for today</p>`;

                document.getElementById('alert-container').innerHTML = overdue.map(l => `
                    <div class="p-4 bg-red-50 border-l-4 border-red-500 rounded-2xl flex justify-between items-center alert-pulse">
                        <div><p class="text-[9px] font-black text-red-500 uppercase">DUE DATE MISSED</p><h5 class="font-bold text-sm text-slate-900">${l.name}</h5></div>
                        <button onclick="System.autoCallLog('${l.id}', '${l.phone}')" class="bg-white text-red-500 p-3 rounded-xl shadow-sm"><i class="fas fa-phone"></i></button>
                    </div>
                `).join('');

                document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            },

            filterBy: (type) => {
                UI.navigate('leads');
                let filtered = System.Data;
                if(type === 'revenue') filtered = System.Data.filter(l => l.status === 'Closed Won');
                else if(type === 'overdue') filtered = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && l.status !== 'Closed Won' && l.status !== 'Closed Lost');
                else if(type === 'today') filtered = System.Data.filter(l => l.followUpDate === System.Today);
                document.getElementById('full-pipeline').innerHTML = filtered.map(UI.card).join('');
            },

            search: (targetId) => {
                const q = document.getElementById(targetId === 'full-pipeline' ? 'lead-search' : 'client-search').value.toLowerCase();
                const source = targetId === 'client-list' ? System.Data.filter(l => l.status === 'Closed Won') : System.Data;
                const filtered = source.filter(l => l.name.toLowerCase().includes(q) || l.phone.includes(q));
                document.getElementById(targetId).innerHTML = filtered.map(UI.card).join('');
            }
        };

        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('entry-id').value;
            const payload = {
                id: id || "NX" + Date.now(),
                name: document.getElementById('entry-name').value,
                phone: document.getElementById('entry-phone').value,
                status: document.getElementById('entry-status').value,
                value: document.getElementById('entry-value').value || 0,
                followUpDate: document.getElementById('entry-date').value,
                note: document.getElementById('entry-note').value
            };
            UI.modal('close');
            const method = id ? 'PATCH' : 'POST';
            await fetch(id ? `${System.API}/id/${id}` : System.API, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? payload : [payload]}) });
            System.sync();
        });
    </script>
</body>
</html>
