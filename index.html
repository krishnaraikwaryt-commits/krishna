<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --accent: #10b981; --bg-dark: #050705; --card-dark: #0f1410; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #ecfdf5; }
        .emerald-card { background: var(--card-dark); border: 1px solid rgba(16, 185, 129, 0.1); border-radius: 28px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .font-heavy { font-weight: 800; }
        .hidden-page { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        input, select, textarea { background: #161d17 !important; border: 1px solid rgba(16, 185, 129, 0.2) !important; color: white !important; }
        @keyframes pulse-alert { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }
        .alert-glow { animation: pulse-alert 2s infinite; border-color: #f97316 !important; }
    </style>
</head>
<body class="pb-24">

    <div id="login-screen" style="position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="text-center w-full max-w-sm">
            <div class="w-24 h-24 bg-emerald-500 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center text-black text-4xl shadow-[0_0_40px_rgba(16,185,129,0.4)]"><i class="fas fa-fingerprint"></i></div>
            <h2 class="text-4xl font-heavy mb-2 tracking-tighter">Welcome Back</h2>
            <div class="space-y-4">
                <input type="password" id="access-pin" oninput="autoCheck()" placeholder="••••" class="w-full p-6 rounded-[2rem] text-center text-3xl tracking-[0.5em] font-heavy outline-none">
                <button onclick="checkAccess()" class="w-full bg-emerald-500 text-black p-6 rounded-[2rem] font-heavy text-lg uppercase">Enter System</button>
            </div>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <div id="page-dashboard" class="p-6 max-w-2xl mx-auto">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <p id="header-date" class="text-emerald-500 font-bold text-[10px] uppercase tracking-[0.2em] mb-1"></p>
                    <h1 class="text-3xl font-heavy tracking-tighter">Dashboard</h1>
                </div>
                <button onclick="fetchLeads()" class="w-12 h-12 emerald-card flex items-center justify-center text-emerald-500"><i class="fas fa-redo-alt"></i></button>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div onclick="setFilter('All')" class="emerald-card p-6 border-l-4 border-emerald-500 bg-emerald-500/5 cursor-pointer">
                    <p class="text-[10px] font-heavy text-emerald-500/60 uppercase">Total Leads</p>
                    <h2 id="count-all" class="text-4xl font-heavy mt-1">0</h2>
                </div>
                <div onclick="setFilter('Today')" class="emerald-card p-6 border-l-4 border-blue-500 cursor-pointer">
                    <p class="text-[10px] font-heavy text-blue-500/60 uppercase">Today's Leads</p>
                    <h2 id="count-today" class="text-4xl font-heavy mt-1 text-blue-400">0</h2>
                </div>
            </div>

            <div id="alert-section" class="mb-10 hidden">
                <h3 class="text-[11px] font-black text-orange-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                    <i class="fas fa-bell animate-bounce"></i> Action Required Today
                </h3>
                <div id="alert-list" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    </div>
            </div>

            <div class="space-y-4" id="main-list"></div>
        </div>

        <div id="page-checklist" class="p-6 max-w-2xl mx-auto hidden-page">
            <h2 class="text-4xl font-heavy mb-8 tracking-tighter text-emerald-500">Tasks</h2>
            <div class="emerald-card p-6 mb-6">
                <div class="flex gap-3">
                    <input type="text" id="new-task" placeholder="What's next?" class="flex-1 p-5 rounded-2xl outline-none font-bold">
                    <button onclick="addTask()" class="bg-emerald-500 text-black w-16 rounded-2xl font-heavy text-2xl">+</button>
                </div>
            </div>
            <ul id="task-list" class="space-y-3"></ul>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-[#0f1410]/90 backdrop-blur-xl border border-white/5 rounded-[2.5rem] flex justify-around items-center px-4 shadow-2xl z-[500]">
            <button onclick="switchPage('dashboard')" id="nav-dashboard" class="flex flex-col items-center text-emerald-500">
                <i class="fas fa-grid-2 text-2xl mb-1"></i>
                <span class="text-[9px] font-heavy uppercase">Board</span>
            </button>
            <button onclick="openModal('add')" class="bg-emerald-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-[0_10px_30px_rgba(16,185,129,0.4)] -mt-12 border-4 border-[#050705]">
                <i class="fas fa-plus"></i>
            </button>
            <button onclick="switchPage('checklist')" id="nav-checklist" class="flex flex-col items-center opacity-40">
                <i class="fas fa-list-check text-2xl mb-1"></i>
                <span class="text-[9px] font-heavy uppercase">Tasks</span>
            </button>
        </nav>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center p-6 z-[1000]">
        <div class="emerald-card w-full max-w-md p-8 bg-[#0f1410]">
            <form id="lead-form" class="space-y-4">
                <input type="hidden" id="f-id">
                <input type="text" id="f-name" placeholder="Name" class="w-full p-4 rounded-2xl outline-none font-bold" required>
                <input type="text" id="f-phone" placeholder="Phone" class="w-full p-4 rounded-2xl outline-none font-bold" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="p-4 rounded-2xl font-heavy outline-none">
                        <option value="New">New</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Converted">Closed</option>
                    </select>
                    <input type="date" id="f-fdate" class="p-4 rounded-2xl font-bold outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-black p-5 rounded-2xl font-heavy mt-4 uppercase">Update Lead</button>
                <button type="button" onclick="closeModal()" class="w-full text-white/30 font-heavy text-xs mt-2">CANCEL</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const SECRET_PIN = "1321";
        let leadsData = [];
        let tasks = JSON.parse(localStorage.getItem('crm_tasks')) || [];
        const today = new Date().toISOString().split('T')[0];

        function autoCheck() { if(document.getElementById('access-pin').value === SECRET_PIN) checkAccess(); }
        function checkAccess() {
            if(document.getElementById('access-pin').value.trim() === SECRET_PIN) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app-content').style.display = 'block';
                fetchLeads(); renderTasks();
            }
        }

        async function fetchLeads() {
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            const res = await fetch(API_URL);
            leadsData = await res.json();
            updateUI();
        }

        function updateUI() {
            let stats = { total: leadsData.length, today: 0 };
            const alertSection = document.getElementById('alert-section');
            const alertList = document.getElementById('alert-list');
            alertList.innerHTML = '';
            
            leadsData.forEach(l => {
                if(l.followUpDate === today && l.status !== 'Converted') {
                    stats.today++;
                    alertList.innerHTML += `
                        <div class="min-w-[200px] emerald-card p-4 alert-glow bg-orange-500/5">
                            <h4 class="font-heavy text-sm truncate">${l.name}</h4>
                            <div class="flex gap-2 mt-3">
                                <a href="tel:${l.phone}" class="flex-1 bg-blue-500/20 text-blue-400 py-2 rounded-xl text-center text-xs font-bold"><i class="fas fa-phone-alt"></i></a>
                                <a href="https://wa.me/91${l.phone}" class="flex-1 bg-green-500/20 text-emerald-500 py-2 rounded-xl text-center text-xs font-bold"><i class="fab fa-whatsapp"></i></a>
                            </div>
                        </div>`;
                }
            });

            alertSection.classList.toggle('hidden', stats.today === 0);
            document.getElementById('count-all').innerText = stats.total;
            document.getElementById('count-today').innerText = stats.today;
            setFilter('All');
        }

        function renderMainList(data) {
            const list = document.getElementById('main-list');
            list.innerHTML = data.slice().reverse().map(l => `
                <div class="emerald-card p-6 flex justify-between items-center bg-[#141b15]">
                    <div onclick="openModal('edit', '${l.id}')" class="flex-1">
                        <h4 class="font-heavy text-lg ${l.status==='Converted' ? 'opacity-30 line-through' : ''}">${l.name}</h4>
                        <p class="text-[10px] font-heavy text-emerald-500/50 uppercase mt-1 tracking-widest">${l.status} • ${l.followUpDate || 'No Date'}</p>
                    </div>
                    <div class="flex gap-3">
                        <a href="https://wa.me/91${l.phone}" class="w-12 h-12 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center text-xl"><i class="fab fa-whatsapp"></i></a>
                        <a href="tel:${l.phone}" class="w-12 h-12 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-phone-alt"></i></a>
                    </div>
                </div>`).join('');
        }

        function setFilter(type) {
            let f = leadsData;
            if(type==='Today') f = leadsData.filter(x => x.followUpDate === today);
            renderMainList(f);
        }

        // --- TASKS ---
        function addTask() {
            const val = document.getElementById('new-task').value;
            if(!val.trim()) return;
            tasks.push({id: Date.now(), text: val, done: false});
            localStorage.setItem('crm_tasks', JSON.stringify(tasks));
            document.getElementById('new-task').value = ""; renderTasks();
        }
        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
            localStorage.setItem('crm_tasks', JSON.stringify(tasks)); renderTasks();
        }
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('crm_tasks', JSON.stringify(tasks)); renderTasks();
        }
        function renderTasks() {
            document.getElementById('task-list').innerHTML = tasks.map(t => `
                <li class="emerald-card p-5 flex justify-between items-center">
                    <span onclick="toggleTask(${t.id})" class="text-md font-heavy cursor-pointer ${t.done ? 'opacity-20 line-through' : ''}">${t.done ? '✓' : '○'} ${t.text}</span>
                    <button onclick="deleteTask(${t.id})" class="text-red-500/50 px-2"><i class="fas fa-times"></i></button>
                </li>`).join('');
        }

        function openModal(mode, id) {
            if(mode === 'edit') {
                const l = leadsData.find(x => x.id === id);
                document.getElementById('f-id').value = l.id;
                document.getElementById('f-name').value = l.name;
                document.getElementById('f-phone').value = l.phone;
                document.getElementById('f-status').value = l.status;
                document.getElementById('f-fdate').value = l.followUpDate || "";
            } else { document.getElementById('lead-form').reset(); document.getElementById('f-id').value = ""; }
            document.getElementById('leadModal').classList.remove('hidden');
        }

        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const data = { id: id || "L"+Date.now(), name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, status: document.getElementById('f-status').value, followUpDate: document.getElementById('f-fdate').value };
            await fetch(id ? `${API_URL}/id/${id}` : API_URL, { method: id ? 'PATCH' : 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data: id ? data : [data]}) });
            closeModal(); fetchLeads();
        });

        function closeModal() { document.getElementById('leadModal').classList.add('hidden'); }
        function switchPage(p) {
            document.getElementById('page-dashboard').classList.toggle('hidden-page', p !== 'dashboard');
            document.getElementById('page-checklist').classList.toggle('hidden-page', p !== 'checklist');
            document.getElementById('nav-dashboard').classList.toggle('opacity-40', p !== 'dashboard');
            document.getElementById('nav-checklist').classList.toggle('opacity-40', p !== 'checklist');
        }
    </script>
</body>
</html>
