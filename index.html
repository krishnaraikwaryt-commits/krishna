<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        * { transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        .emerald-card { background: #121212; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .hidden-page { display: none !important; }
        nav { background: rgba(18,18,18,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); }
        input, select { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* iPhone specific smoothness */
        .ios-btn:active { transform: scale(0.92); }
        /* Table Edit Styles */
        .editable-input { background: transparent; border: none; color: white; width: 100%; font-weight: 600; }
        .editable-select { background: transparent; border: none; color: #10b981; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px;">
        <div class="w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center text-black text-3xl mb-8 shadow-[0_0_30px_rgba(16,185,129,0.4)]">
            <i class="fas fa-unlock-alt"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-6">Enter System PIN</h2>
        <input type="password" id="access-pin" maxlength="4" oninput="autoCheck()" placeholder="••••" class="w-64 p-5 rounded-2xl text-center text-3xl font-bold bg-[#111] border border-white/10 mb-6">
        <button onclick="checkAccess()" class="w-64 bg-white text-black py-4 rounded-2xl font-bold uppercase tracking-widest ios-btn">Unlock Now</button>
    </div>

    <div id="main-app-content" style="display: none; opacity: 0;">
        <div id="page-dashboard" class="p-6 max-w-2xl mx-auto">
            <header class="flex justify-between items-center mb-10 mt-4">
                <h1 class="text-4xl font-extrabold tracking-tighter">Board</h1>
                <button onclick="fetchLeads()" class="w-12 h-12 emerald-card flex items-center justify-center text-emerald-500 ios-btn"><i class="fas fa-sync-alt"></i></button>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="emerald-card p-6">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase opacity-60">Total Leads</p>
                    <h2 id="count-all" class="text-4xl font-extrabold mt-1">0</h2>
                </div>
                <div class="emerald-card p-6">
                    <p class="text-[10px] font-bold text-blue-500 uppercase opacity-60">Today</p>
                    <h2 id="count-today" class="text-4xl font-extrabold mt-1">0</h2>
                </div>
            </div>

            <div id="main-list" class="space-y-4"></div>
        </div>

        <div id="page-data" class="p-6 max-w-4xl mx-auto hidden-page">
            <h2 class="text-4xl font-extrabold mb-8">Database</h2>
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-separate border-spacing-y-3">
                    <thead class="text-[10px] uppercase opacity-40">
                        <tr><th class="px-4">Name</th><th>Phone</th><th>Status</th></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="page-checklist" class="p-6 max-w-2xl mx-auto hidden-page">
            <h2 class="text-4xl font-extrabold mb-8">Tasks</h2>
            <div class="emerald-card p-4 mb-6 flex gap-3">
                <input type="text" id="new-task" placeholder="Add task..." class="flex-1 bg-transparent p-2 font-bold">
                <button onclick="addTask()" class="bg-white text-black px-6 py-2 rounded-xl font-bold">+</button>
            </div>
            <ul id="task-list" class="space-y-3"></ul>
        </div>

        <nav class="fixed bottom-8 left-6 right-6 h-20 rounded-[2.5rem] flex justify-around items-center px-4 z-[500] shadow-2xl">
            <button onclick="switchPage('dashboard')" class="text-emerald-500 flex flex-col items-center"><i class="fas fa-th-large text-xl"></i></button>
            <button onclick="switchPage('checklist')" class="opacity-40 flex flex-col items-center"><i class="fas fa-check-circle text-xl"></i></button>
            <button onclick="openModal('add')" class="bg-emerald-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center -mt-12 border-[6px] border-black shadow-xl"><i class="fas fa-plus"></i></button>
            <button onclick="switchPage('data')" class="opacity-40 flex flex-col items-center"><i class="fas fa-database text-xl"></i></button>
        </nav>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const SECRET_PIN = "1321";
        let leadsData = [];

        // 🔐 Login Logic
        function autoCheck() {
            if(document.getElementById('access-pin').value === SECRET_PIN) {
                checkAccess();
            }
        }

        function checkAccess() {
            const input = document.getElementById('access-pin').value;
            if(input === SECRET_PIN) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const main = document.getElementById('main-app-content');
                    main.style.display = 'block';
                    setTimeout(() => { main.style.opacity = '1'; }, 50);
                    fetchLeads();
                }, 500);
            } else {
                alert("Incorrect PIN");
                document.getElementById('access-pin').value = '';
            }
        }

        // 📊 Fetch Data
        async function fetchLeads() {
            try {
                const res = await fetch(API_URL);
                leadsData = await res.json();
                renderUI();
            } catch (e) { console.error("API Error"); }
        }

        // 🔄 Render Everything
        function renderUI() {
            // Stats
            document.getElementById('count-all').innerText = leadsData.length;
            const tDate = new Date().toISOString().split('T')[0];
            const todayCount = leadsData.filter(l => l.followUpDate === tDate).length;
            document.getElementById('count-today').innerText = todayCount;

            // Dashboard List
            const list = document.getElementById('main-list');
            list.innerHTML = leadsData.slice().reverse().map(l => `
                <div class="emerald-card p-5 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg">${l.name}</h3>
                        <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">${l.status}</p>
                    </div>
                    <div class="flex gap-3">
                        <a href="tel:${l.phone}" class="w-10 h-10 bg-blue-500/10 text-blue-400 rounded-xl flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                        <a href="https://wa.me/91${l.phone}" class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('');

            // Editable Table
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = leadsData.map(l => `
                <tr class="emerald-card">
                    <td class="p-4 rounded-l-2xl"><input class="editable-input" value="${l.name}" onchange="updateLead('${l.id}', 'name', this.value)"></td>
                    <td><input class="editable-input text-white/40" value="${l.phone}" onchange="updateLead('${l.id}', 'phone', this.value)"></td>
                    <td class="rounded-r-2xl">
                        <select class="editable-select" onchange="updateLead('${l.id}', 'status', this.value)">
                            <option value="New" ${l.status==='New'?'selected':''}>New</option>
                            <option value="Follow-up" ${l.status==='Follow-up'?'selected':''}>Follow</option>
                            <option value="Converted" ${l.status==='Converted'?'selected':''}>Closed</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        // ⚡ Update Data (Direct Sync)
        async function updateLead(id, field, value) {
            const lead = leadsData.find(x => x.id === id);
            if(!lead) return;
            lead[field] = value;
            await fetch(`${API_URL}/id/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: lead})
            });
            console.log("Updated!");
        }

        // 📄 Navigation
        function switchPage(p) {
            document.getElementById('page-dashboard').classList.add('hidden-page');
            document.getElementById('page-checklist').classList.add('hidden-page');
            document.getElementById('page-data').classList.add('hidden-page');
            document.getElementById('page-'+p).classList.remove('hidden-page');
        }
    </script>
</body>
</html>
