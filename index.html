<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM | Pro Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-primary: #6366f1; --brand-dark: #0f172a; --surface-100: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface-100); color: var(--brand-dark); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.5); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .active-link { color: var(--brand-primary) !important; background: #eef2ff; border-right: 4px solid var(--brand-primary); }
        .lead-card { transition: all 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .lead-card:hover { transform: translateY(-2px); border-color: var(--brand-primary); }
        .alert-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="auth-gateway" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel rounded-[2.5rem] p-10 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-indigo-600 text-white text-3xl mb-6 shadow-xl"><i class="fas fa-shield-halved"></i></div>
            <h1 class="text-3xl font-black text-slate-900">Nexus<span class="text-indigo-600">CRM</span></h1>
            <p class="text-slate-500 mt-2 mb-8 font-medium">Verify Identity</p>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" placeholder="PIN" class="w-full p-5 rounded-2xl bg-slate-100 border-none outline-none text-center text-2xl font-bold tracking-[0.5em]">
        </div>
    </div>

    <div id="app-shell" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex-shrink-0">
            <div class="hidden md:flex items-center gap-3 mb-10 px-2 font-black text-xl"><i class="fas fa-cube text-indigo-600"></i> Nexus</div>
            <nav class="flex md:flex-col gap-2">
                <button onclick="UI.navigate('dashboard')" id="btn-dashboard" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500 active-link"><i class="fas fa-th-large"></i> Dashboard</button>
                <button onclick="UI.navigate('leads')" id="btn-leads" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl font-bold text-slate-500"><i class="fas fa-list"></i> Pipeline</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
            <header class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="view-title" class="text-4xl font-black text-slate-900 tracking-tight">Intelligence</h2>
                    <p class="text-slate-500 font-medium mt-1" id="live-timer"></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="System.sync()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
                    <button onclick="UI.modal('open')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg">+ Add</button>
                </div>
            </header>

            <section id="view-dashboard" class="space-y-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass-panel p-6 rounded-3xl"><p class="text-[10px] font-black text-indigo-500 uppercase">Revenue</p><h3 id="meta-revenue" class="text-2xl font-black mt-1">₹0</h3></div>
                    <div class="glass-panel p-6 rounded-3xl"><p class="text-[10px] font-black text-red-500 uppercase">Overdue</p><h3 id="meta-overdue" class="text-2xl font-black mt-1">0</h3></div>
                    <div class="glass-panel p-6 rounded-3xl"><p class="text-[10px] font-black text-emerald-500 uppercase">Today</p><h3 id="meta-today" class="text-2xl font-black mt-1">0</h3></div>
                    <div class="glass-panel p-6 rounded-3xl bg-indigo-600 text-white"><p class="text-[10px] font-black opacity-70 uppercase">Total</p><h3 id="meta-total" class="text-2xl font-black mt-1">0</h3></div>
                </div>

                <div id="alert-container" class="space-y-3"></div>

                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-lg font-black text-slate-800 flex items-center gap-2"><i class="fas fa-calendar-day text-indigo-500"></i> Today's Schedule</h4>
                        <label class="cursor-pointer text-[11px] font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl hover:bg-indigo-100 border border-indigo-100 flex items-center gap-2">
                            <i class="fas fa-file-csv"></i> IMPORT CSV
                            <input type="file" id="bulk-csv" accept=".csv" class="hidden" onchange="System.importCSV(event)">
                        </label>
                    </div>
                    <div id="today-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </section>

            <section id="view-leads" class="hidden space-y-6">
                <input type="text" id="lead-search" oninput="UI.search()" placeholder="Search pipeline..." class="w-full p-5 rounded-3xl glass-panel outline-none border-none">
                <div id="full-pipeline" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="lead-modal" class="hidden fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Lead Intel</h2>
            <form id="core-form" class="space-y-4">
                <input type="hidden" id="entry-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="entry-name" placeholder="Name" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <input type="tel" id="entry-phone" placeholder="Phone" class="p-4 rounded-2xl bg-slate-50 outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="entry-status" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                        <option value="Prospect">Prospect</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Closed Won">Closed Won</option>
                        <option value="Closed Lost">Closed Lost</option>
                    </select>
                    <input type="date" id="entry-date" class="p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                </div>
                <input type="number" id="entry-value" placeholder="Value ₹" class="w-full p-4 rounded-2xl bg-slate-50 outline-none">
                <textarea id="entry-note" placeholder="Note..." class="w-full p-4 rounded-2xl bg-slate-50 outline-none"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black">SAVE</button>
                    <button type="button" onclick="UI.modal('close')" class="px-6 py-4 rounded-2xl bg-slate-100 text-slate-400 font-bold">X</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            PIN: "1321",
            Data: [],
            Today: new Date().toISOString().split('T')[0],

            auth: () => {
                if(document.getElementById('sys-pin').value === System.PIN) {
                    document.getElementById('auth-gateway').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    System.sync();
                }
            },
            sync: async () => {
                const icon = document.getElementById('sync-icon');
                icon.classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderAll();
                } finally { icon.classList.remove('fa-spin'); }
            },

            // 📂 CSV IMPORT (ADDITION)
            importCSV: async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const rows = ev.target.result.split('\n').slice(1);
                    const batch = rows.map(r => {
                        const c = r.split(',');
                        if (c.length < 2) return null;
                        return {
                            id: "NX" + Date.now() + Math.floor(Math.random()*100),
                            name: c[0].trim(), phone: c[1].trim(),
                            status: 'Prospect', value: 0, followUpDate: System.Today
                        };
                    }).filter(x => x && x.name);

                    if (batch.length) {
                        alert(`Deploying ${batch.length} leads...`);
                        await fetch(System.API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: batch}) });
                        System.sync();
                    }
                };
                reader.readAsText(file);
            }
        };

        const UI = {
            navigate: (view) => {
                document.getElementById('view-dashboard').classList.toggle('hidden', view !== 'dashboard');
                document.getElementById('view-leads').classList.toggle('hidden', view !== 'leads');
                document.getElementById('btn-dashboard').classList.toggle('active-link', view === 'dashboard');
                document.getElementById('btn-leads').classList.toggle('active-link', view === 'leads');
            },
            modal: (action, id = null) => {
                const m = document.getElementById('lead-modal');
                if(action === 'open') {
                    m.classList.remove('hidden');
                    if(id) {
                        const l = System.Data.find(x => x.id === id);
                        document.getElementById('entry-id').value = l.id;
                        document.getElementById('entry-name').value = l.name;
                        document.getElementById('entry-phone').value = l.phone;
                        document.getElementById('entry-status').value = l.status;
                        document.getElementById('entry-value').value = l.value;
                        document.getElementById('entry-date').value = l.followUpDate || '';
                    } else { document.getElementById('core-form').reset(); document.getElementById('entry-id').value = ''; }
                } else { m.classList.add('hidden'); }
            },
            renderAll: () => {
                const revenue = System.Data.reduce((s, l) => s + (l.status === 'Closed Won' ? Number(l.value || 0) : 0), 0);
                const overdue = System.Data.filter(l => l.followUpDate && l.followUpDate < System.Today && l.status !== 'Closed Won' && l.status !== 'Closed Lost');
                const todayTasks = System.Data.filter(l => l.followUpDate === System.Today && l.status !== 'Closed Won');

                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('meta-overdue').innerText = overdue.length;
                document.getElementById('meta-today').innerText = todayTasks.length;

                document.getElementById('alert-container').innerHTML = overdue.map(l => `
                    <div class="p-5 bg-red-50 border-l-4 border-red-500 rounded-2xl flex justify-between items-center alert-pulse">
                        <div><p class="text-[10px] font-black text-red-500 uppercase">OVERDUE</p><h5 class="font-bold text-slate-900">${l.name}</h5></div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="w-10 h-10 bg-white text-red-500 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-phone-alt"></i></a>
                            <button onclick="UI.modal('open', '${l.id}')" class="w-10 h-10 bg-white text-slate-400 rounded-xl flex items-center justify-center shadow-sm"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>
                `).join('');

                const card = (l) => `
                    <div class="glass-panel p-6 rounded-3xl lead-card flex justify-between items-center mb-1">
                        <div onclick="UI.modal('open', '${l.id}')">
                            <h5 class="font-bold text-slate-800">${l.name}</h5>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${l.status} • ${l.followUpDate || 'No Date'}</p>
                        </div>
                        <div class="flex gap-2">
                             <a href="https://wa.me/91${l.phone}" target="_blank" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                             <a href="tel:${l.phone}" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                        </div>
                    </div>
                `;
                document.getElementById('today-grid').innerHTML = todayTasks.length ? todayTasks.map(card).join('') : `<p class="text-slate-400 text-sm">No tasks for today.</p>`;
                document.getElementById('full-pipeline').innerHTML = System.Data.slice().reverse().map(card).join('');
                document.getElementById('live-timer').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            },
            search: () => {
                const q = document.getElementById('lead-search').value.toLowerCase();
                const filtered = System.Data.filter(l => l.name.toLowerCase().includes(q) || l.phone.includes(q));
                document.getElementById('full-pipeline').innerHTML = filtered.map(l => `
                    <div class="glass-panel p-5 rounded-2xl flex justify-between items-center mb-2">
                        <div onclick="UI.modal('open', '${l.id}')"><h5 class="font-bold">${l.name}</h5><p class="text-xs text-slate-400">${l.status}</p></div>
                        <span class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">${l.followUpDate || 'N/A'}</span>
                    </div>
                `).join('');
            }
        };

        document.getElementById('core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('entry-id').value;
            const payload = {
                id: id || "NX" + Date.now(),
                name: document.getElementById('entry-name').value,
                phone: document.getElementById('entry-phone').value,
                status: document.getElementById('entry-status').value,
                value: document.getElementById('entry-value').value || 0,
                followUpDate: document.getElementById('entry-date').value
            };
            const method = id ? 'PATCH' : 'POST';
            await fetch(id ? `${System.API}/id/${id}` : System.API, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? payload : [payload]}) });
            UI.modal('close'); System.sync();
        });
    </script>
</body>
</html>
