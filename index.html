<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Master CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --accent: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        .glass-card { background: var(--card); border: 1px solid rgba(0,0,0,0.05); border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .stat-box { padding: 20px; border-radius: 24px; background: var(--card); border: 1px solid rgba(0,0,0,0.04); cursor: pointer; transition: 0.3s; }
        .active-filter { border: 2px solid var(--accent) !important; background: #f0fdf4; }
        .hidden-page { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .alert-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center p-6">
        <div class="w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center text-white mb-8 shadow-2xl">
            <i class="fas fa-shield-halved text-3xl"></i>
        </div>
        <h2 class="text-2xl font-extrabold mb-2 text-slate-900">Master CRM</h2>
        <p class="text-slate-400 text-sm mb-8 text-center">Enter PIN to access your workspace</p>
        <input type="password" id="access-pin" maxlength="4" oninput="autoCheck()" placeholder="••••" 
            class="w-64 p-5 rounded-2xl text-center bg-slate-100 outline-none text-2xl font-bold tracking-[1em] border-2 border-transparent focus:bg-white focus:border-emerald-500 transition-all">
    </div>

    <div id="main-app-content" style="display: none;">
        
        <div id="page-dashboard" class="p-6 max-w-2xl mx-auto">
            <header class="flex justify-between items-center mb-8 pt-4">
                <div>
                    <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-1">Overview</p>
                    <h1 class="text-3xl font-extrabold text-slate-900">Dashboard</h1>
                </div>
                <div class="flex gap-2">
                    <label class="w-11 h-11 flex items-center justify-center rounded-2xl bg-white border border-slate-100 text-slate-600 shadow-sm cursor-pointer hover:bg-slate-50 transition">
                        <i class="fas fa-file-csv"></i>
                        <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="handleCSV(event)">
                    </label>
                    <button onclick="fetchLeads()" class="w-11 h-11 flex items-center justify-center rounded-2xl bg-emerald-500 text-white shadow-lg">
                        <i class="fas fa-arrows-rotate"></i>
                    </button>
                </div>
            </header>

            <div id="alert-zone" class="space-y-3 mb-8"></div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="stat-box active-filter" id="box-all" onclick="filterBy('all')">
                    <p class="text-[11px] font-semibold text-slate-400 uppercase">Total Leads</p>
                    <h2 id="stat-total" class="text-2xl font-black">0</h2>
                </div>
                <div class="stat-box" id="box-overdue" onclick="filterBy('overdue')">
                    <p class="text-[11px] font-semibold text-red-500 uppercase">Overdue</p>
                    <h2 id="stat-overdue" class="text-2xl font-black text-red-600">0</h2>
                </div>
                <div class="stat-box" id="box-today" onclick="filterBy('today')">
                    <p class="text-[11px] font-semibold text-blue-500 uppercase">Today</p>
                    <h2 id="stat-today" class="text-2xl font-black text-blue-600">0</h2>
                </div>
                <div class="stat-box" id="box-closed" onclick="filterBy('closed')">
                    <p class="text-[11px] font-semibold text-emerald-500 uppercase">Converted</p>
                    <h2 id="stat-closed" class="text-2xl font-black text-emerald-600">0</h2>
                </div>
            </div>

            <div id="main-list" class="space-y-3"></div>
        </div>

        <div id="page-data" class="p-6 max-w-4xl mx-auto hidden-page">
            <h2 class="text-2xl font-black mb-6">Database</h2>
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                <input type="text" id="table-search" oninput="filterTable()" placeholder="Search name or phone..." class="w-full p-4 pl-12 rounded-2xl bg-white border border-slate-100 shadow-sm outline-none">
            </div>
            <div id="table-body" class="space-y-3"></div>
        </div>

        <div id="page-checklist" class="p-6 max-w-2xl mx-auto hidden-page">
            <h2 class="text-2xl font-black mb-6">Mission Checklist</h2>
            <div class="glass-card p-2 mb-6 flex gap-2">
                <input type="text" id="new-task" placeholder="Add task..." class="flex-1 p-3 outline-none bg-transparent">
                <button onclick="addTask()" class="bg-slate-900 text-white px-6 rounded-xl font-bold">Add</button>
            </div>
            <ul id="task-list" class="space-y-3"></ul>
        </div>

        <nav class="fixed bottom-8 left-8 right-8 h-20 rounded-[2.5rem] bg-white/80 backdrop-blur-xl border border-slate-100 flex justify-around items-center px-6 z-[500] shadow-2xl">
            <button onclick="switchPage('dashboard')" id="nav-dashboard" class="text-emerald-500 text-xl"><i class="fas fa-house"></i></button>
            <button onclick="switchPage('checklist')" id="nav-checklist" class="text-slate-300 text-xl"><i class="fas fa-list-check"></i></button>
            <button onclick="openModal('add')" class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition"><i class="fas fa-plus"></i></button>
            <button onclick="switchPage('data')" id="nav-data" class="text-slate-300 text-xl"><i class="fas fa-folder-open"></i></button>
        </nav>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[1000] p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <form id="lead-form" class="space-y-5">
                <input type="hidden" id="f-id">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-extrabold">Lead Details</h3>
                    <button type="button" onclick="closeModal()" class="text-slate-400"><i class="fas fa-times"></i></button>
                </div>
                <input type="text" id="f-name" class="w-full p-4 rounded-2xl bg-slate-100 outline-none" placeholder="Name" required>
                <input type="text" id="f-phone" class="w-full p-4 rounded-2xl bg-slate-100 outline-none" placeholder="Phone" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="w-full p-4 rounded-2xl bg-slate-100 outline-none">
                        <option value="New">New Lead</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Converted">Converted</option>
                    </select>
                    <input type="date" id="f-fdate" class="w-full p-4 rounded-2xl bg-slate-100 outline-none">
                </div>
                <div id="history-section" class="pt-4 border-t hidden">
                    <div id="history-content" class="space-y-2 mb-4"></div>
                    <textarea id="f-note" placeholder="Add update note..." class="w-full p-4 rounded-2xl bg-slate-100 outline-none" rows="2"></textarea>
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-bold shadow-lg">Save Lead</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        const SECRET_PIN = "1321";
        let leadsData = [];
        let tasks = JSON.parse(localStorage.getItem('crm_tasks')) || [];
        const todayStr = new Date().toISOString().split('T')[0];

        // LOGIN SYSTEM
        window.onload = () => { if (sessionStorage.getItem('isLoggedIn') === 'true') showApp(); };
        function autoCheck() { if (document.getElementById('access-pin').value === SECRET_PIN) { sessionStorage.setItem('isLoggedIn', 'true'); showApp(); } }
        function showApp() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-app-content').style.display = 'block'; fetchLeads(); renderTasks(); }

        // CSV BULK IMPORT
        async function handleCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const rows = e.target.result.split('\n').slice(1);
                const imported = rows.map(row => {
                    const cols = row.split(',');
                    if (cols.length < 2) return null;
                    return { id: "L" + Date.now() + Math.random(), name: cols[0].trim(), phone: cols[1].trim(), status: 'New', history: "[]" };
                }).filter(x => x && x.name);
                
                if(imported.length > 0) {
                    alert(`Importing ${imported.length} leads...`);
                    await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: imported}) });
                    alert("Import Done!"); fetchLeads();
                }
            };
            reader.readAsText(file);
        }

        // DATA LOGIC
        async function fetchLeads() {
            try {
                const res = await fetch(API_URL);
                leadsData = await res.json();
                renderAll();
            } catch (e) { console.error("Sync Error"); }
        }

        function renderAll() {
            const todayLeads = leadsData.filter(l => l.followUpDate === todayStr && l.status !== 'Converted');
            const overdueLeads = leadsData.filter(l => l.followUpDate && l.followUpDate < todayStr && l.status !== 'Converted');
            
            document.getElementById('stat-total').innerText = leadsData.length;
            document.getElementById('stat-closed').innerText = leadsData.filter(l => l.status === 'Converted').length;
            document.getElementById('stat-today').innerText = todayLeads.length;
            document.getElementById('stat-overdue').innerText = overdueLeads.length;

            let alertHtml = '';
            overdueLeads.forEach(l => {
                alertHtml += `<div class="alert-card bg-red-50 border border-red-100 p-4 rounded-[20px] flex justify-between items-center mb-2 shadow-sm">
                    <div><p class="text-[10px] text-red-500 font-bold uppercase">Overdue</p><p class="font-bold text-slate-800">${l.name}</p></div>
                    <div class="flex gap-2"><a href="tel:${l.phone}" class="w-9 h-9 bg-white text-red-500 rounded-lg flex items-center justify-center shadow-sm"><i class="fas fa-phone-alt text-xs"></i></a>
                    <a href="https://wa.me/91${l.phone}" class="w-9 h-9 bg-emerald-500 text-white rounded-lg flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp text-xs"></i></a></div></div>`;
            });
            document.getElementById('alert-zone').innerHTML = alertHtml;
            filterBy('all');
            document.getElementById('table-body').innerHTML = leadsData.map(l => `<div class="data-row" data-name="${l.name.toLowerCase()}">${cardTemplate(l)}</div>`).join('');
        }

        function filterBy(type) {
            document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active-filter'));
            let filtered = [];
            if(type === 'all') { filtered = leadsData.slice().reverse().slice(0, 15); document.getElementById('box-all').classList.add('active-filter'); }
            else if(type === 'overdue') { filtered = leadsData.filter(l => l.followUpDate && l.followUpDate < todayStr && l.status !== 'Converted'); document.getElementById('box-overdue').classList.add('active-filter'); }
            else if(type === 'today') { filtered = leadsData.filter(l => l.followUpDate === todayStr); document.getElementById('box-today').classList.add('active-filter'); }
            else if(type === 'closed') { filtered = leadsData.filter(l => l.status === 'Converted'); document.getElementById('box-closed').classList.add('active-filter'); }
            document.getElementById('main-list').innerHTML = filtered.map(cardTemplate).join('');
        }

        const cardTemplate = (l) => `<div class="glass-card p-5 flex justify-between items-center mb-3">
            <div onclick="openModal('edit', '${l.id}')" class="flex-1 cursor-pointer">
                <p class="font-bold text-slate-800">${l.name}</p>
                <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase">${l.status} • ${l.phone}</p>
            </div>
            <div class="flex gap-2">
                <a href="tel:${l.phone}" class="w-9 h-9 bg-slate-50 text-slate-400 rounded-lg flex items-center justify-center"><i class="fas fa-phone-alt text-xs"></i></a>
                <a href="https://wa.me/91${l.phone}" class="w-9 h-9 bg-emerald-50 text-emerald-500 rounded-lg flex items-center justify-center"><i class="fab fa-whatsapp text-xs"></i></a>
            </div></div>`;

        // MODAL & FORM
        function openModal(mode, id) {
            const hSec = document.getElementById('history-section');
            if(mode === 'edit') {
                const l = leadsData.find(x => x.id === id);
                document.getElementById('f-id').value = l.id;
                document.getElementById('f-name').value = l.name;
                document.getElementById('f-phone').value = l.phone;
                document.getElementById('f-status').value = l.status;
                document.getElementById('f-fdate').value = l.followUpDate || '';
                hSec.classList.remove('hidden');
                const hArr = l.history ? JSON.parse(l.history) : [];
                document.getElementById('history-content').innerHTML = hArr.map(h => `<div class="text-[10px] bg-slate-50 p-2 rounded-lg border border-slate-100"><b>${h.date}</b>: ${h.note}</div>`).join('');
            } else {
                document.getElementById('lead-form').reset(); document.getElementById('f-id').value = ''; hSec.classList.add('hidden');
            }
            document.getElementById('leadModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('leadModal').classList.add('hidden'); }

        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const note = document.getElementById('f-note').value;
            let current = leadsData.find(x => x.id === id) || { history: "[]" };
            let hArr = JSON.parse(current.history || "[]");
            if(note.trim()) hArr.push({ date: new Date().toLocaleString(), note: note });

            const payload = { id: id || "L" + Date.now(), name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, status: document.getElementById('f-status').value, followUpDate: document.getElementById('f-fdate').value, history: JSON.stringify(hArr) };
            const method = id ? 'PATCH' : 'POST';
            const url = id ? `${API_URL}/id/${id}` : API_URL;

            await fetch(url, { method: method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: id ? payload : [payload]}) });
            closeModal(); fetchLeads();
        });

        // PAGE & TASKS
        function switchPage(p) {
            ['dashboard', 'data', 'checklist'].forEach(pg => document.getElementById('page-'+pg).classList.add('hidden-page'));
            document.getElementById('page-'+p).classList.remove('hidden-page');
        }

        function renderTasks() {
            document.getElementById('task-list').innerHTML = tasks.map(t => `<li class="glass-card p-4 flex justify-between items-center ${t.done ? 'opacity-40' : ''}">
                <div onclick="toggleTask(${t.id})" class="flex items-center gap-3 cursor-pointer">
                    <div class="w-5 h-5 rounded border-2 ${t.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-200'} flex items-center justify-center">${t.done ? '<i class="fas fa-check text-white text-[8px]"></i>' : ''}</div>
                    <span class="text-sm font-bold text-slate-700 ${t.done ? 'line-through' : ''}">${t.text}</span></div>
                <button onclick="deleteTask(${t.id})" class="text-slate-300"><i class="fas fa-trash-can text-xs"></i></button></li>`).join('');
        }
        function addTask() { const v = document.getElementById('new-task').value; if(!v) return; tasks.push({id: Date.now(), text: v, done: false}); saveT(); renderTasks(); document.getElementById('new-task').value = ''; }
        function toggleTask(id) { const t = tasks.find(x => x.id === id); if(t) t.done = !t.done; saveT(); renderTasks(); }
        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); saveT(); renderTasks(); }
        function saveT() { localStorage.setItem('crm_tasks', JSON.stringify(tasks)); }
        function filterTable() {
            const q = document.getElementById('table-search').value.toLowerCase();
            document.querySelectorAll('.data-row').forEach(r => { r.style.display = r.dataset.name.includes(q) ? 'block' : 'none'; });
        }
    </script>
</body>
</html>
