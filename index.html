<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Ultra | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e6b3e; }
        body.light-mode { background-color: #f3f7f4; color: #1a2e21; }
        body.dark-mode { background-color: #0a0f0b; color: #e8f5e9; }
        .glass-card { border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .dark-mode .glass-card { background: #141d16; border-color: #1e2e22; }
        .light-mode .glass-card { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .strikethrough { text-decoration: line-through; opacity: 0.5; }
        .hidden-page { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="light-mode pb-24 transition-all duration-500">

    <div id="page-dashboard" class="p-4 max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="font-black text-2xl tracking-tighter text-[#1e6b3e]">LeadFlow Ultra</h1>
                <p id="current-date-display" class="text-[10px] font-bold opacity-50 uppercase"></p>
            </div>
            <div class="flex gap-2">
                <input type="file" id="csv-input" accept=".csv" class="hidden" onchange="handleCSVImport(this)">
                <button onclick="document.getElementById('csv-input').click()" class="bg-blue-600 text-white h-10 px-4 rounded-full flex items-center gap-2 text-xs font-bold shadow-lg">
                    <i class="fas fa-file-import"></i> IMPORT
                </button>
                <button
