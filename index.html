<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow Pro | Krishna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #1e6b3e; --bg: #f4f7f6; }
        body { background-color: var(--bg); color: #333; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e0e6e3; position: relative; }
        .lead-done { text-decoration: line-through; opacity: 0.5; filter: grayscale(1); }
        .btn-action { transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .status-select { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 6px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="crmContent" class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-[#1e6b3e] p-4 rounded-2xl shadow-lg text-white">
            <div class="flex items-center gap-2">
                <div class="bg-white text-[#1e6b3e] p-2 rounded-lg font-bold">LF</div>
                <h1 class="font-bold text-lg tracking-tight">LeadFlow Pro</h1>
            </div>
            <button onclick="logout()" class="bg-white/20 p-2 rounded-lg"><i class="fas fa-sync"></i></button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div onclick="filterLeads('New')" class="glass-card p-4">
                <p class="text-gray-400 text-[10px] font-bold uppercase">New</p>
                <h2 id="new-leads" class="text-2xl font-black">0</h2>
            </div>
            <div onclick="filterLeads('Interested')" class="glass-card p-4">
                <p class="text-gray-400 text-[10px] font-bold uppercase">Interested</p>
                <h2 id="interested-leads" class="text-2xl font-black">0</h2>
            </div>
            <div onclick="filterLeads('Closed')" class="glass-card p-4">
                <p class="text-gray-400 text-[10px] font-bold uppercase">Closed</p>
                <h2 id="closed-leads" class="text-2xl font-black">0</h2>
            </div>
            <div onclick="filterLeads('All')" class="glass-card p-4 border-b-4 border-[#1e6b3e]">
                <p class="text-gray-400 text-[10px] font-bold uppercase">Total</p>
                <h2 id="total-leads" class="text-2xl font-black">0</h2>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="toggleModal()" class="bg-[#1e6b3e] text-white px-6 py-3 rounded-xl font-bold text-xs shadow-md">+ NEW LEAD</button>
        </div>

        <div class="mb-8">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-address-book text-[#1e6b3e]"></i> Leads & Follow-ups</h3>
            <div id="lead-list" class="grid gap-4">
                </div>
        </div>
    </div>

    <div id="leadModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[500]">
        <div class="bg-white w-full max-w-md p-6 rounded-[2rem]">
            <h2 class="text-xl font-bold mb-6">Add Contact</h2>
            <form id="leadForm" class="space-y-4">
                <input type="text" id="name" placeholder="Name" class="w-full bg-gray-50 p-4 rounded-xl outline-none" required>
                <input type="text" id="phone" placeholder="Phone" class="w-full bg-gray-50 p-4 rounded-xl outline-none" required>
                <select id="status" class="w-full bg-gray-50 p-4 rounded-xl outline-none">
                    <option value="New">New</option>
                    <option value="Interested">Interested</option>
                    <option value="Closed">Closed</option>
                </select>
                <button type="submit" id="saveBtn" class="w-full bg-[#1e6b3e] text-white p-4 rounded-xl font-bold">SAVE</button>
                <button type="button" onclick="toggleModal()" class="w-full text-gray-400 font-bold py-2">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/7skn6892hya7x";
        let allLeadsData = [];
        let completedLeads = JSON.parse(localStorage.getItem('completedLeads') || '[]');

        async function fetchLeads() {
            try {
                const res = await fetch(API_URL);
                allLeadsData = await res.json();
                updateStats();
                filterLeads('All');
            } catch (e) { console.error("Error fetching data"); }
        }

        function updateStats() {
            document.getElementById('total-leads').innerText = allLeadsData.length;
            document.getElementById('new-leads').innerText = allLeadsData.filter(l => l.status === 'New').length;
            document.getElementById('interested-leads').innerText = allLeadsData.filter(l => l.status === 'Interested').length;
            document.getElementById('closed-leads').innerText = allLeadsData.filter(l => l.status === 'Closed').length;
        }

        // Toggle Cross Mark (Strike-through)
        function toggleDone(id) {
            if (completedLeads.includes(id)) {
                completedLeads = completedLeads.filter(i => i !== id);
            } else {
                completedLeads.push(id);
            }
            localStorage.setItem('completedLeads', JSON.stringify(completedLeads));
            filterLeads('All');
        }

        // Status Update Function
        async function updateLeadStatus(id, newStatus) {
            const row = allLeadsData.find(l => l.id == id);
            if(!row) return;
            
            // SheetDB update call
            try {
                await fetch(`${API_URL}/id/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { status: newStatus } })
                });
                alert("Status Updated!");
                fetchLeads();
            } catch (e) { alert("Update Failed!"); }
        }

        function filterLeads(status) {
            const list = document.getElementById('lead-list');
            list.innerHTML = '';
            const filtered = status === 'All' ? allLeadsData : allLeadsData.filter(l => l.status === status);

            filtered.reverse().forEach(l => {
                const isDone = completedLeads.includes(l.id);
                const statusColor = l.status === 'Closed' ? 'green' : (l.status === 'Interested' ? 'purple' : 'blue');
                
                list.innerHTML += `
                    <div class="glass-card p-4 flex flex-col md:flex-row justify-between items-center gap-4 ${isDone ? 'lead-done' : ''}">
                        <div class="flex items-center gap-3 w-full">
                            <button onclick="toggleDone('${l.id}')" class="w-8 h-8 rounded-full border-2 border-gray-200 flex items-center justify-center hover:bg-green-100 transition-all">
                                ${isDone ? '<i class="fas fa-check text-green-600"></i>' : ''}
                            </button>
                            <div class="flex-1">
                                <h4 class="font-bold text-sm text-gray-800">${l.name}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <select onchange="updateLeadStatus('${l.id}', this.value)" class="status-select text-${statusColor}-600">
                                        <option value="New" ${l.status === 'New' ? 'selected' : ''}>New</option>
                                        <option value="Interested" ${l.status === 'Interested' ? 'selected' : ''}>Interested</option>
                                        <option value="Closed" ${l.status === 'Closed' ? 'selected' : ''}>Closed</option>
                                    </select>
                                    <span class="text-[11px] text-gray-400">${l.phone}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <a href="https://wa.me/91${l.phone}" target="_blank" class="flex-1 text-center bg-[#25D366] text-white px-4 py-2 rounded-xl text-xs font-bold btn-action"><i class="fab fa-whatsapp"></i> Chat</a>
                            <a href="tel:${l.phone}" class="flex-1 text-center bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold btn-action"><i class="fas fa-phone-alt"></i> Call</a>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.innerText = "SAVING...";
            const id = "ID" + Date.now(); // Unique ID for each lead
            const newLead = { data: [{ id: id, name: document.getElementById('name').value, phone: document.getElementById('phone').value, status: document.getElementById('status').value }] };
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newLead) });
            toggleModal(); document.getElementById('leadForm').reset(); btn.innerText = "SAVE"; fetchLeads();
        });

        function toggleModal() { document.getElementById('leadModal').classList.toggle('hidden'); }
        window.onload = fetchLeads;
    </script>
</body>
</html>
