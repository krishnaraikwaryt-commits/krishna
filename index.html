<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM v2.0 | Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #0f172a; }
        body.theme-midnight { --primary: #38bdf8; --bg: #0f172a; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        body.theme-midnight .glass { background: rgba(30, 41, 59, 0.8); border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body onload="System.init()">

    <div id="auth-gateway" class="fixed inset-0 z-[2000] bg-slate-900 flex items-center justify-center p-6">
        <div class="max-w-md w-full glass rounded-[2.5rem] p-10 text-center">
            <h1 class="text-2xl font-black mb-6">NEXUS PIN</h1>
            <input type="password" id="sys-pin" maxlength="4" oninput="if(this.value.length === 4) System.auth()" class="w-full p-4 rounded-2xl bg-slate-100 text-center text-3xl font-bold tracking-widest text-slate-900 outline-none">
        </div>
    </div>

    <div id="app-shell" class="hidden pb-32">
        <header class="p-6 flex justify-between items-center sticky top-0 z-50 glass">
            <h2 id="view-title" class="text-xl font-black tracking-tight text-indigo-600">DASHBOARD</h2>
            <div class="flex gap-3">
                <button onclick="System.sync()" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
                <button onclick="System.toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main class="p-6 max-w-4xl mx-auto space-y-6">
            <div id="view-dashboard" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-3xl border-b-4 border-indigo-500">
                        <p class="text-[10px] font-bold opacity-50 uppercase">Revenue</p>
                        <h3 id="meta-revenue" class="text-xl font-black">₹0</h3>
                    </div>
                    <div class="glass p-5 rounded-3xl border-b-4 border-emerald-500">
                        <p class="text-[10px] font-bold opacity-50 uppercase">Total Leads</p>
                        <h3 id="meta-total" class="text-xl font-black">0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="UI.showFiltered('today')" class="glass p-5 rounded-3xl border-l-4 border-orange-500 cursor-pointer active:scale-95">
                        <p class="text-[10px] font-bold opacity-50 uppercase">Today's Tasks</p>
                        <h3 id="meta-today" class="text-2xl font-black text-orange-600">0</h3>
                    </div>
                    <div onclick="UI.showFiltered('overdue')" class="glass p-5 rounded-3xl border-l-4 border-red-500 cursor-pointer active:scale-95">
                        <p class="text-[10px] font-bold opacity-50 uppercase">Overdue</p>
                        <h3 id="meta-overdue" class="text-2xl font-black text-red-600">0</h3>
                    </div>
                </div>

                <div class="glass p-5 rounded-3xl flex gap-3 justify-center">
                    <button onclick="System.exportCSV()" class="text-[10px] font-black bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg">EXPORT CSV</button>
                    <label class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg cursor-pointer">
                        IMPORT CSV <input type="file" class="hidden" onchange="System.importCSV(this)">
                    </label>
                </div>

                <div id="recent-box" class="space-y-3"></div>
            </div>

            <div id="view-leads" class="hidden space-y-3"></div>
        </main>

        <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[2rem] flex items-center justify-around px-4 shadow-2xl border border-white/20">
            <button onclick="UI.nav('dashboard')" class="p-4"><i class="fas fa-grid-2 text-xl"></i></button>
            <button onclick="UI.nav('leads')" class="p-4"><i class="fas fa-users text-xl"></i></button>
            <button onclick="UI.openModal()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center -mt-12 shadow-lg shadow-indigo-200"><i class="fas fa-plus"></i></button>
            <button onclick="UI.showFiltered('won')" class="p-4"><i class="fas fa-award text-xl"></i></button>
            <button onclick="UI.nav('leads')" class="p-4"><i class="fas fa-search text-xl"></i></button>
        </nav>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[3000] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-slate-900">
            <div class="flex justify-between mb-6">
                <h2 class="text-xl font-black">Lead Details</h2>
                <button onclick="UI.closeModal()"><i class="fas fa-times-circle text-slate-300 text-2xl"></i></button>
            </div>
            <form onsubmit="System.save(event)" class="space-y-4">
                <input type="hidden" id="f-id">
                <input type="text" id="f-name" placeholder="Name" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" required>
                <input type="tel" id="f-phone" placeholder="Phone" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="p-4 bg-slate-100 rounded-xl font-bold outline-none">
                        <option value="Prospect">Prospect</option>
                        <option value="Closed Won">Closed Won</option>
                    </select>
                    <input type="number" id="f-value" placeholder="Value ₹" class="p-4 bg-slate-100 rounded-xl font-bold outline-none">
                </div>
                <input type="date" id="f-date" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-black">SAVE LEAD</button>
                    <button type="button" id="del-btn" onclick="System.delete()" class="hidden bg-red-50 text-red-600 px-6 rounded-xl font-black">DEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const System = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            Data: [],
            init: () => {
                if(localStorage.getItem('nexus_auth') === 'true') System.launch();
                if(localStorage.getItem('theme') === 'dark') document.body.classList.add('theme-midnight');
            },
            auth: () => {
                if(document.getElementById('sys-pin').value === '1321') {
                    localStorage.setItem('nexus_auth', 'true');
                    System.launch();
                } else alert("Wrong PIN");
            },
            launch: () => {
                document.getElementById('auth-gateway').remove();
                document.getElementById('app-shell').classList.remove('hidden');
                System.sync();
            },
            sync: async () => {
                document.getElementById('sync-icon').classList.add('fa-spin');
                try {
                    const res = await fetch(System.API);
                    System.Data = await res.json();
                    UI.renderStats();
                    UI.nav('dashboard');
                } catch(e) { alert("Sync Error"); }
                document.getElementById('sync-icon').classList.remove('fa-spin');
            },
            save: async (e) => {
                e.preventDefault();
                const id = document.getElementById('f-id').value;
                const lead = {
                    id: id || Date.now().toString(),
                    name: document.getElementById('f-name').value,
                    phone: document.getElementById('f-phone').value,
                    status: document.getElementById('f-status').value,
                    value: document.getElementById('f-value').value,
                    followup: document.getElementById('f-date').value
                };
                UI.closeModal();
                const method = id ? 'PATCH' : 'POST';
                const url = id ? `${System.API}/id/${id}` : System.API;
                await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: id ? lead : [lead] })
                });
                System.sync();
            },
            delete: async () => {
                const id = document.getElementById('f-id').value;
                if(confirm("Delete this lead?")) {
                    UI.closeModal();
                    await fetch(`${System.API}/id/${id}`, { method: 'DELETE' });
                    System.sync();
                }
            },
            toggleTheme: () => {
                document.body.classList.toggle('theme-midnight');
                localStorage.setItem('theme', document.body.classList.contains('theme-midnight') ? 'dark' : 'light');
            },
            exportCSV: () => {
                const headers = "id,name,phone,status,value,followup\n";
                const rows = System.Data.map(l => `${l.id},${l.name},${l.phone},${l.status},${l.value},${l.followup}`).join("\n");
                const blob = new Blob([headers + rows], {type: 'text/csv'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nexus_Backup.csv";
                a.click();
            },
            importCSV: (input) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const rows = e.target.result.split("\n").slice(1);
                    const data = rows.filter(r => r.trim()).map(r => {
                        const v = r.split(",");
                        return { id: v[0], name: v[1], phone: v[2], status: v[3], value: v[4], followup: v[5] };
                    });
                    if(confirm(`Import ${data.length} leads?`)) {
                        await fetch(System.API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data}) });
                        System.sync();
                    }
                };
                reader.readAsText(input.files[0]);
            }
        };

        const UI = {
            nav: (view) => {
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-leads').classList.add('hidden');
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.getElementById('view-title').innerText = view.toUpperCase();
                if(view === 'leads') UI.renderLeads(System.Data);
                if(view === 'dashboard') UI.renderRecent();
            },
            renderStats: () => {
                const today = new Date().toISOString().split('T')[0];
                const revenue = System.Data.filter(l => l.status === 'Closed Won').reduce((a, b) => a + Number(b.value || 0), 0);
                document.getElementById('meta-revenue').innerText = "₹" + revenue.toLocaleString();
                document.getElementById('meta-total').innerText = System.Data.length;
                document.getElementById('meta-today').innerText = System.Data.filter(l => l.followup === today).length;
                document.getElementById('meta-overdue').innerText = System.Data.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won').length;
            },
            renderRecent: () => {
                document.getElementById('recent-box').innerHTML = '<h4 class="text-[10px] font-black opacity-40 uppercase tracking-widest">Recent Leads</h4>' + UI.createCards(System.Data.slice(-5).reverse());
            },
            renderLeads: (data) => {
                document.getElementById('view-leads').innerHTML = UI.createCards(data.slice().reverse());
            },
            showFiltered: (type) => {
                const today = new Date().toISOString().split('T')[0];
                let filtered = [];
                if(type === 'today') filtered = System.Data.filter(l => l.followup === today);
                if(type === 'overdue') filtered = System.Data.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won');
                if(type === 'won') filtered = System.Data.filter(l => l.status === 'Closed Won');
                
                UI.nav('leads');
                UI.renderLeads(filtered);
                document.getElementById('view-title').innerText = type.toUpperCase() + " (" + filtered.length + ")";
            },
            createCards: (data) => {
                if(data.length === 0) return '<div class="p-10 text-center opacity-30 font-bold">No Data Found</div>';
                return data.map(l => `
                    <div class="glass p-5 rounded-3xl flex justify-between items-center">
                        <div onclick="UI.openModal('${l.id}')" class="flex-1">
                            <h4 class="font-bold text-slate-800">${l.name}</h4>
                            <p class="text-[10px] font-bold opacity-40 uppercase tracking-tighter">${l.status} • ₹${l.value || 0}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                            <a href="https://wa.me/91${l.phone}" class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                `).join('');
            },
            openModal: (id = null) => {
                document.getElementById('modal').classList.remove('hidden');
                if(id) {
                    const l = System.Data.find(x => x.id == id);
                    document.getElementById('f-id').value = l.id;
                    document.getElementById('f-name').value = l.name;
                    document.getElementById('f-phone').value = l.phone;
                    document.getElementById('f-status').value = l.status;
                    document.getElementById('f-value').value = l.value;
                    document.getElementById('f-date').value = l.followup;
                    document.getElementById('del-btn').classList.remove('hidden');
                } else {
                    document.querySelector('form').reset();
                    document.getElementById('f-id').value = '';
                    document.getElementById('del-btn').classList.add('hidden');
                }
            },
            closeModal: () => document.getElementById('modal').classList.add('hidden')
        };
    </script>
</body>
</html>
