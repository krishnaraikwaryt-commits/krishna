<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CRM v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; transition: 0.3s; }
        .view { display: none; }
        .view.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.05); }
        .theme-dark { background: #0f172a; color: #f1f5f9; }
        .theme-dark .glass { background: rgba(30, 41, 59, 0.9); border-color: rgba(255,255,255,0.1); }
        .theme-dark .bg-white { background: #1e293b !important; color: white; }
    </style>
</head>
<body class="pb-24">

    <div id="login-gate" class="fixed inset-0 z-[9999] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg shadow-indigo-500/40"><i class="fas fa-bolt"></i></div>
            <h1 class="text-xl font-black mb-6">NEXUS ENTERPRISE</h1>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••" oninput="if(this.value==='1321') Core.unlock()" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-3xl font-bold tracking-[0.5em] outline-none border-2 border-transparent focus:border-indigo-500 transition">
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="sticky top-0 z-50 glass p-4 flex items-center justify-between mb-4 shadow-sm">
            <div class="flex items-center gap-3">
                <button id="global-back" onclick="View.show('dash')" class="hidden w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600 active:scale-90"><i class="fas fa-arrow-left"></i></button>
                <h2 id="current-title" class="text-lg font-extrabold tracking-tight">Dashboard</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="Core.sync()" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i id="sync-icon" class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <main class="px-5">
            <div id="view-dash" class="view active space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-[2rem] border-b-4 border-indigo-500 shadow-sm">
                        <p class="text-[10px] font-black opacity-40 uppercase">Revenue</p>
                        <h3 id="stat-rev" class="text-xl font-black">₹0</h3>
                    </div>
                    <div onclick="View.filter('all')" class="bg-white p-5 rounded-[2rem] border-b-4 border-emerald-500 shadow-sm cursor-pointer">
                        <p class="text-[10px] font-black opacity-40 uppercase">Total Leads</p>
                        <h3 id="stat-total" class="text-xl font-black">0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="View.filter('today')" class="bg-white p-5 rounded-[2rem] border-l-4 border-orange-500 shadow-sm cursor-pointer active:scale-95 transition">
                        <h3 id="stat-today" class="text-2xl font-black text-orange-600">0</h3>
                        <p class="text-[10px] font-black opacity-40">TODAY'S TASKS</p>
                    </div>
                    <div onclick="View.filter('overdue')" class="bg-white p-5 rounded-[2rem] border-l-4 border-red-500 shadow-sm cursor-pointer active:scale-95 transition">
                        <h3 id="stat-over" class="text-2xl font-black text-red-600">0</h3>
                        <p class="text-[10px] font-black opacity-40">OVERDUE</p>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-[2rem] flex gap-2 shadow-sm">
                    <button onclick="Core.exportCSV()" class="flex-1 p-3 bg-emerald-50 text-emerald-600 rounded-xl font-black text-[10px] uppercase">Export CSV</button>
                    <label class="flex-1 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-black text-[10px] uppercase text-center cursor-pointer">
                        Import CSV <input type="file" hidden onchange="Core.importCSV(this)">
                    </label>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black opacity-30 uppercase tracking-widest px-2">Recent Activity</h4>
                    <div id="recent-stack" class="space-y-3"></div>
                </div>
            </div>

            <div id="view-list" class="view space-y-3"></div>

            <div id="view-settings" class="view space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm space-y-4">
                    <h4 class="font-black border-b pb-2 uppercase text-xs">Customization</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="Core.setTheme('light')" class="p-4 bg-slate-50 border rounded-2xl font-bold text-xs uppercase">Light Mode</button>
                        <button onclick="Core.setTheme('dark')" class="p-4 bg-slate-800 text-white rounded-2xl font-bold text-xs uppercase">Dark Mode</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                    <h4 class="font-black border-b pb-2 uppercase text-xs mb-4">Security</h4>
                    <button onclick="Core.logout()" class="w-full p-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs">LOGOUT SESSION</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4 z-50">
            <button onclick="View.show('dash')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-home"></i><span class="text-[9px] font-black">HOME</span></button>
            <button onclick="View.filter('all')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-users"></i><span class="text-[9px] font-black">LEADS</span></button>
            <button onclick="Modal.open()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl -mt-10 shadow-lg border-4 border-white flex items-center justify-center"><i class="fas fa-plus"></i></button>
            <button onclick="View.filter('won')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-crown"></i><span class="text-[9px] font-black">WON</span></button>
            <button onclick="View.show('settings')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-cog"></i><span class="text-[9px] font-black">TOOLS</span></button>
        </nav>
    </div>

    <div id="modal-screen" class="hidden fixed inset-0 z-[9999] bg-black/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">Lead Profile</h2>
                <button onclick="Modal.close()"><i class="fas fa-times-circle text-slate-300 text-2xl"></i></button>
            </div>
            <form onsubmit="Core.save(event)" class="space-y-4">
                <input type="hidden" id="f-id">
                <input type="text" id="f-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500" required>
                <input type="tel" id="f-phone" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-status" class="p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <option value="Prospect">Prospect</option>
                        <option value="Closed Won">Closed Won</option>
                    </select>
                    <input type="number" id="f-value" placeholder="Value ₹" class="p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                </div>
                <input type="date" id="f-date" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                <div class="flex gap-2 pt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-200">SAVE DATA</button>
                    <button type="button" id="del-btn" onclick="Core.delete()" class="hidden bg-red-100 text-red-600 px-6 rounded-2xl font-black"><i class="fas fa-trash-alt"></i></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CORE SYSTEM LOGIC
        const Core = {
            API: "https://sheetdb.io/api/v1/7skn6892hya7x",
            Data: [],
            unlock: () => {
                localStorage.setItem('nexus_logged', 'true');
                document.getElementById('login-gate').remove();
                document.getElementById('app-content').classList.remove('hidden');
                Core.sync();
            },
            sync: async () => {
                const icon = document.getElementById('sync-icon');
                icon.classList.add('fa-spin');
                try {
                    const res = await fetch(Core.API);
                    Core.Data = await res.json();
                    View.refreshStats();
                } catch(e) { alert("Sync Error!"); }
                icon.classList.remove('fa-spin');
            },
            save: async (e) => {
                e.preventDefault();
                const id = document.getElementById('f-id').value;
                const lead = {
                    id: id || Date.now().toString(),
                    name: document.getElementById('f-name').value,
                    phone: document.getElementById('f-phone').value,
                    status: document.getElementById('f-status').value,
                    value: document.getElementById('f-value').value,
                    followup: document.getElementById('f-date').value
                };
                Modal.close();
                const method = id ? 'PATCH' : 'POST';
                const url = id ? `${Core.API}/id/${id}` : Core.API;
                await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: id ? lead : [lead] })
                });
                Core.sync();
            },
            delete: async () => {
                const id = document.getElementById('f-id').value;
                if(confirm("Delete this lead permanently?")) {
                    Modal.close();
                    await fetch(`${Core.API}/id/${id}`, { method: 'DELETE' });
                    Core.sync();
                }
            },
            exportCSV: () => {
                const head = "id,name,phone,status,value,followup\n";
                const rows = Core.Data.map(l => `${l.id},${l.name},${l.phone},${l.status},${l.value},${l.followup}`).join("\n");
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([head+rows], {type:'text/csv'}));
                a.download = "Nexus_Data.csv"; a.click();
            },
            importCSV: (input) => {
                const r = new FileReader();
                r.onload = async (e) => {
                    const rows = e.target.result.split("\n").slice(1);
                    const data = rows.filter(r => r.trim()).map(r => {
                        const v = r.split(",");
                        return { id: v[0], name: v[1], phone: v[2], status: v[3], value: v[4], followup: v[5] };
                    });
                    if(confirm(`Import ${data.length} records?`)) {
                        await fetch(Core.API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data}) });
                        Core.sync();
                    }
                };
                r.readAsText(input.files[0]);
            },
            setTheme: (t) => {
                document.body.className = t === 'dark' ? 'theme-dark' : '';
                localStorage.setItem('nexus_theme', t);
            },
            logout: () => { localStorage.clear(); location.reload(); }
        };

        // UI & NAVIGATION LOGIC
        const View = {
            show: (vId, title = "Dashboard") => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(`view-${vId}`).classList.add('active');
                document.getElementById('current-title').innerText = title;
                
                // Back Button Logic
                const backBtn = document.getElementById('global-back');
                if(vId === 'dash') backBtn.classList.add('hidden');
                else backBtn.classList.remove('hidden');
                window.scrollTo(0,0);
            },
            filter: (type) => {
                const today = new Date().toISOString().split('T')[0];
                let filtered = Core.Data;
                let title = "All Leads";

                if(type === 'today') { filtered = Core.Data.filter(l => l.followup === today); title = "Today's Task"; }
                if(type === 'overdue') { filtered = Core.Data.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won'); title = "Overdue Alerts"; }
                if(type === 'won') { filtered = Core.Data.filter(l => l.status === 'Closed Won'); title = "Success Deals"; }

                View.show('list', title);
                document.getElementById('view-list').innerHTML = View.renderCards(filtered.slice().reverse());
            },
            refreshStats: () => {
                const today = new Date().toISOString().split('T')[0];
                const rev = Core.Data.filter(l => l.status === 'Closed Won').reduce((a, b) => a + Number(b.value || 0), 0);
                
                document.getElementById('stat-rev').innerText = "₹" + rev.toLocaleString();
                document.getElementById('stat-total').innerText = Core.Data.length;
                document.getElementById('stat-today').innerText = Core.Data.filter(l => l.followup === today).length;
                document.getElementById('stat-over').innerText = Core.Data.filter(l => l.followup && l.followup < today && l.status !== 'Closed Won').length;
                
                document.getElementById('recent-stack').innerHTML = View.renderCards(Core.Data.slice(-3).reverse());
            },
            renderCards: (data) => {
                if(!data.length) return '<div class="p-10 text-center opacity-30 font-bold">No Records Found</div>';
                return data.map(l => `
                    <div class="bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm border border-slate-50">
                        <div onclick="Modal.open('${l.id}')" class="flex-1 cursor-pointer">
                            <h4 class="font-bold text-slate-800">${l.name}</h4>
                            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest">${l.status} • ₹${l.value || 0}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="tel:${l.phone}" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><i class="fas fa-phone-alt"></i></a>
                            <a href="https://wa.me/91${l.phone}" class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                `).join('');
            }
        };

        // MODAL LOGIC
        const Modal = {
            open: (id = null) => {
                document.getElementById('modal-screen').classList.remove('hidden');
                const dBtn = document.getElementById('del-btn');
                if(id) {
                    const l = Core.Data.find(x => x.id == id);
                    document.getElementById('f-id').value = l.id;
                    document.getElementById('f-name').value = l.name;
                    document.getElementById('f-phone').value = l.phone;
                    document.getElementById('f-status').value = l.status;
                    document.getElementById('f-value').value = l.value;
                    document.getElementById('f-date').value = l.followup;
                    dBtn.classList.remove('hidden');
                } else {
                    document.querySelector('form').reset();
                    document.getElementById('f-id').value = '';
                    dBtn.classList.add('hidden');
                }
            },
            close: () => document.getElementById('modal-screen').classList.add('hidden')
        };

        // INITIAL CHECK
        if(localStorage.getItem('nexus_logged') === 'true') Core.unlock();
        if(localStorage.getItem('nexus_theme') === 'dark') Core.setTheme('dark');
    </script>
</body>
</html>
